<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="book-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg-glow)"/>

  <circle cx="256" cy="256" r="140" fill="#a78bfa" opacity="0.4" filter="url(#glow-effect)"/>

  <path d="M 120 130 L 400 130 L 400 400 L 120 400 Z" fill="#e2e8f0"/>
  <path d="M 120 130 L 140 130 L 140 400 L 120 400 Z" fill="#cbd5e1"/>
  
  <path d="M 140 110 L 420 110 L 420 420 L 140 420 Z" fill="url(#book-grad)" stroke="url(#gold-grad)" stroke-width="12" stroke-linejoin="round"/>
  
  <path d="M 90 120 L 140 110 L 140 420 L 90 430 Z" fill="#1e1b4b" stroke="url(#gold-grad)" stroke-width="10" stroke-linejoin="round"/>

  <polygon points="350,110 420,110 420,180" fill="url(#gold-grad)"/>
  <polygon points="350,420 420,420 420,350" fill="url(#gold-grad)"/>

  <text x="280" y="300" font-family="Arial, sans-serif" font-size="96" font-weight="900" fill="#fde68a" text-anchor="middle" filter="url(#text-glow)">ABC</text>
  <text x="280" y="300" font-family="Arial, sans-serif" font-size="96" font-weight="900" fill="#ffffff" text-anchor="middle">ABC</text>

  <path d="M 100 80 Q 110 100 130 110 Q 110 120 100 140 Q 90 120 70 110 Q 90 100 100 80 Z" fill="#fef08a" filter="url(#glow-effect)"/>
  <path d="M 430 90 Q 435 105 450 110 Q 435 115 430 130 Q 425 115 410 110 Q 425 105 430 90 Z" fill="#fef08a" filter="url(#glow-effect)"/>
  <path d="M 450 380 Q 460 395 480 400 Q 460 405 450 420 Q 440 405 420 400 Q 440 395 450 380 Z" fill="#fef08a" filter="url(#glow-effect)"/>
  <circle cx="120" cy="380" r="8" fill="#fef08a" filter="url(#text-glow)"/>
  <circle cx="120" cy="380" r="4" fill="#ffffff"/>
  <circle cx="340" cy="80" r="10" fill="#fef08a" filter="url(#text-glow)"/>
  <circle cx="340" cy="80" r="5" fill="#ffffff"/>
</svg>
