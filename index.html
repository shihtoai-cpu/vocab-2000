<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙逆單字傳 - 踏天之路</title>
    
    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Google Fonts: Noto Serif TC for Calligraphy style -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --gold-primary: #facc15;
            --gold-glow: 0 0 20px rgba(250, 204, 21, 0.6);
            --deep-indigo: #1e1b4b;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #020617;
            color: #e2e8f0;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* 琉璃材質面板 */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* 鎏金發光文字 */
        .gold-text {
            color: var(--gold-primary);
            text-shadow: var(--gold-glow);
        }

        /* 仙界石碑特效 */
        .stele-glow {
            box-shadow: inset 0 0 50px rgba(250, 204, 21, 0.1), 0 0 20px rgba(250, 204, 21, 0.2);
        }

        /* 修仙境界動畫 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        @keyframes rotate-magic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .magic-circle {
            animation: rotate-magic 20s linear infinite;
            opacity: 0.2;
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* 閃爍動畫 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-btn {
            background: linear-gradient(90deg, rgba(250,204,21,0) 0%, rgba(250,204,21,0.4) 50%, rgba(250,204,21,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        /* 戰鬥 S 級特效 */
        .rank-s { color: #f87171; text-shadow: 0 0 15px #f87171; }
        
        /* PWA 全螢幕修正 */
        @media screen and (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
        }
    </style>

    <script type="application/json" id="manifest">
    {
        "name": "仙逆單字傳",
        "short_name": "仙逆單字",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#020617",
        "theme_color": "#0f172a",
        "icons": [
            {
                "src": "https://cdn-icons-png.flaticon.com/512/3655/3655581.png",
                "sizes": "512x512",
                "type": "image/png"
            }
        ]
    }
    </script>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- 修仙設定數據 ---
        const REALMS = [
            { name: "凡人", minExp: 0, color: "text-slate-400" },
            { name: "凝氣", minExp: 150, color: "text-emerald-400" },
            { name: "築基", minExp: 1000, color: "text-blue-400" },
            { name: "結丹", minExp: 5000, color: "text-purple-400" },
            { name: "元嬰", minExp: 20000, color: "text-pink-400" },
            { name: "化神", minExp: 80000, color: "text-orange-400" },
            { name: "嬰變", minExp: 250000, color: "text-red-500" },
            { name: "問鼎", minExp: 800000, color: "text-amber-500" },
            { name: "陰虛", minExp: 2000000, color: "text-indigo-500" },
            { name: "陽實", minExp: 5000000, color: "text-yellow-500" },
            { name: "碎涅", minExp: 15000000, color: "text-cyan-400" },
            { name: "空涅", minExp: 50000000, color: "text-blue-600" },
            { name: "空靈", minExp: 150000000, color: "text-purple-600" },
            { name: "空玄", minExp: 500000000, color: "text-rose-600" },
            { name: "空劫", minExp: 1500000000, color: "text-red-700" },
            { name: "踏天", minExp: 5000000000, color: "text-yellow-300 font-black" }
        ];

        // --- 核心邏輯函數 ---
        const calculateExpForLevel = (lvl) => Math.floor(150 * lvl + 12 * Math.pow(lvl, 3));
        
        const getRealmInfo = (exp) => {
            for (let i = REALMS.length - 1; i >= 0; i--) {
                if (exp >= REALMS[i].minExp) return { ...REALMS[i], index: i };
            }
            return { ...REALMS[0], index: 0 };
        };

        // --- Firebase 配置 (使用者需填寫) ---
        const firebaseConfig = {
           apiKey: "AIzaSyAtvZjyKKRsfbbRPt-OI85isFuua6EV1YQ",
  authDomain: "vocab-2000.firebaseapp.com",
  projectId: "vocab-2000",
  storageBucket: "vocab-2000.firebasestorage.app",
  messagingSenderId: "459452518715",
  appId: "1:459452518715:web:2842926df8a8d73831a71e"
        };

        // 初始化 Firebase (若未填寫則進入 Demo 模式)
        let db = null;
        let auth = null;
        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
            }
        } catch (e) { console.error("Firebase Init Error", e); }

        // --- 組件: 閃屏載入 ---
        const LoadingScreen = () => (
            <div className="fixed inset-0 flex flex-col items-center justify-center bg-slate-950 z-50">
                <div className="relative">
                    <div className="w-32 h-32 border-4 border-yellow-500/20 rounded-full animate-ping"></div>
                    <div className="absolute inset-0 flex items-center justify-center">
                        <div className="text-4xl font-black gold-text tracking-[0.5em] animate-pulse">仙逆</div>
                    </div>
                </div>
                <div className="mt-8 text-slate-500 tracking-widest animate-bounce">天道循環，因果始然...</div>
            </div>
        );

        // --- 組件: 背景特效 ---
        const BackgroundEffect = () => (
            <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                <div className="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] magic-circle flex items-center justify-center">
                    <div className="w-[800px] h-[800px] border-[1px] border-yellow-500/10 rounded-full"></div>
                    <div className="absolute w-[600px] h-[600px] border-[1px] border-indigo-500/10 rounded-full"></div>
                </div>
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_#020617_80%)]"></div>
            </div>
        );

        // --- 主應用邏輯 ---
        const App = () => {
            const [loading, setLoading] = useState(true);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); // home, battle, admin, rebirth
            const [profile, setProfile] = useState({
                name: "無名修士",
                exp: 0,
                rebirth: 0,
                roundsToday: 0,
                lastActive: new Date().toDateString(),
                spiritStones: 100,
                savedGame: null
            });
            const [words, setWords] = useState([
                { id: 1, en: "Dao", zh: "道", level: 1 },
                { id: 2, en: "Cultivation", zh: "修煉", level: 1 },
                { id: 3, en: "Tribulation", zh: "天劫", level: 2 },
                { id: 4, en: "Alchemy", zh: "煉丹", level: 2 },
                { id: 5, en: "Talisman", zh: "符籙", level: 2 },
                { id: 6, en: "Reincarnation", zh: "輪迴", level: 3 }
            ]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [settings, setSettings] = useState({
                dailyRounds: 3,
                questionsPerRound: 10,
                retryLimit: 3
            });

            // 模擬初始化
            useEffect(() => {
                setTimeout(() => {
                    setLoading(false);
                    // 模擬從本地讀取
                    const localData = localStorage.getItem('xian_ni_profile');
                    if (localData) setProfile(JSON.parse(localData));
                    
                    const localSettings = localStorage.getItem('xian_ni_settings');
                    if (localSettings) setSettings(JSON.parse(localSettings));
                }, 2000);
            }, []);

            // 持久化儲存
            useEffect(() => {
                localStorage.setItem('xian_ni_profile', JSON.stringify(profile));
                if (db && auth?.currentUser) {
                    db.collection('users').doc(auth.currentUser.uid).set(profile, { merge: true });
                }
            }, [profile]);

            // 處理經驗值增加
            const addExp = (amount) => {
                const multiplier = 1 + (profile.rebirth * 0.5);
                const totalAdd = Math.floor(amount * multiplier);
                setProfile(prev => ({ ...prev, exp: prev.exp + totalAdd }));
                return totalAdd;
            };

            // --- 介面切換器 ---
            const renderContent = () => {
                if (view === 'battle') return <BattleScreen words={words} profile={profile} setProfile={setProfile} setView={setView} settings={settings} addExp={addExp} />;
                if (view === 'admin') return <AdminPanel settings={settings} setSettings={setSettings} setView={setView} words={words} setWords={setWords} />;
                if (view === 'rebirth') return <RebirthScreen profile={profile} setProfile={setProfile} setView={setView} />;
                return <Dashboard profile={profile} setView={setView} leaderboard={leaderboard} />;
            };

            if (loading) return <LoadingScreen />;

            return (
                <div className="relative min-h-screen text-slate-200">
                    <BackgroundEffect />
                    <div className="relative z-10 max-w-md mx-auto min-h-screen flex flex-col">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        // --- 組件: 儀表板 (Dashboard) ---
        const Dashboard = ({ profile, setView, leaderboard }) => {
            const realm = getRealmInfo(profile.exp);
            
            return (
                <div className="flex-1 p-6 flex flex-col">
                    {/* 頂部狀態欄 */}
                    <div className="glass-panel rounded-3xl p-6 mt-4 mb-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-20"><i data-lucide="sparkles"></i></div>
                        <div className="flex items-center space-x-4 mb-4">
                            <div className="w-16 h-16 rounded-full border-2 border-yellow-500/50 flex items-center justify-center bg-slate-800 text-2xl">
                                {profile.rebirth > 0 ? "印" : "修"}
                            </div>
                            <div>
                                <h2 className="text-xl font-bold tracking-wider">{profile.name}</h2>
                                <p className={`text-sm font-bold ${realm.color}`}>{realm.name}修士</p>
                            </div>
                        </div>
                        
                        <div className="space-y-2">
                            <div className="flex justify-between text-xs mb-1">
                                <span>修為進度</span>
                                <span>{profile.exp} / {REALMS[realm.index + 1]?.minExp || 'MAX'}</span>
                            </div>
                            <div className="w-full h-2 bg-slate-900 rounded-full overflow-hidden">
                                <div 
                                    className="h-full bg-gradient-to-r from-yellow-600 to-yellow-300 transition-all duration-1000"
                                    style={{ width: `${(profile.exp / (REALMS[realm.index+1]?.minExp || profile.exp)) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-3 gap-2 mt-6 text-center">
                            <div className="bg-slate-800/50 p-2 rounded-xl">
                                <p className="text-[10px] text-slate-400">轉世次數</p>
                                <p className="text-yellow-500 font-bold">{profile.rebirth}</p>
                            </div>
                            <div className="bg-slate-800/50 p-2 rounded-xl">
                                <p className="text-[10px] text-slate-400">今日輪次</p>
                                <p className="text-emerald-400 font-bold">{profile.roundsToday}/3</p>
                            </div>
                            <div className="bg-slate-800/50 p-2 rounded-xl">
                                <p className="text-[10px] text-slate-400">靈石</p>
                                <p className="text-cyan-400 font-bold">{profile.spiritStones}</p>
                            </div>
                        </div>
                    </div>

                    {/* 功能按鈕區 */}
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <button 
                            onClick={() => setView('battle')}
                            className="h-32 glass-panel rounded-2xl flex flex-col items-center justify-center space-y-2 hover:border-yellow-500/50 transition-all group active:scale-95"
                        >
                            <div className="w-12 h-12 bg-yellow-500/10 rounded-full flex items-center justify-center text-yellow-500 group-hover:scale-110 transition-transform">
                                <i data-lucide="sword"></i>
                            </div>
                            <span className="font-bold tracking-widest">開始修煉</span>
                        </button>
                        <button 
                            onClick={() => setView('rebirth')}
                            className="h-32 glass-panel rounded-2xl flex flex-col items-center justify-center space-y-2 hover:border-red-500/50 transition-all group active:scale-95"
                        >
                            <div className="w-12 h-12 bg-red-500/10 rounded-full flex items-center justify-center text-red-500 group-hover:scale-110 transition-transform">
                                <i data-lucide="flame"></i>
                            </div>
                            <span className="font-bold tracking-widest">嫁衣神功</span>
                        </button>
                    </div>

                    {/* 仙界石碑 (排行榜) */}
                    <div className="flex-1 glass-panel rounded-t-3xl p-6 stele-glow flex flex-col">
                        <h3 className="text-center gold-text text-xl font-black mb-6 tracking-[0.3em]">仙界石碑</h3>
                        <div className="flex-1 overflow-y-auto space-y-4">
                            {[
                                { name: "王林", exp: 999999999, realm: "踏天" },
                                { name: "蘇銘", exp: 888888888, realm: "大界" },
                                { name: "孟浩", exp: 777777777, realm: "九封" },
                                { name: "清水", exp: 50000000, realm: "空涅" }
                            ].map((monk, i) => (
                                <div key={i} className={`flex items-center justify-between p-3 rounded-lg ${i === 0 ? 'bg-yellow-500/10 border border-yellow-500/30' : 'bg-slate-800/30'}`}>
                                    <div className="flex items-center space-x-3">
                                        <span className={`text-lg font-black ${i === 0 ? 'text-yellow-400' : 'text-slate-500'}`}>{i + 1}</span>
                                        <div>
                                            <p className={`font-bold ${i === 0 ? 'text-yellow-400' : ''}`}>{monk.name}</p>
                                            <p className="text-[10px] text-slate-500">{monk.realm}</p>
                                        </div>
                                    </div>
                                    <span className="text-xs font-mono text-slate-400">{monk.exp.toLocaleString()}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 底部導航 */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-md px-6 flex justify-between items-center">
                        <button onClick={() => setView('admin')} className="p-4 glass-panel rounded-full text-slate-400 hover:text-white transition-colors">
                            <i data-lucide="settings"></i>
                        </button>
                        <div className="text-[10px] text-slate-600 tracking-tighter">逆天而行，何懼生死</div>
                        <button className="p-4 glass-panel rounded-full text-slate-400 hover:text-white transition-colors">
                            <i data-lucide="user"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- 組件: 戰鬥修煉 (Battle Screen) ---
        const BattleScreen = ({ words, profile, setProfile, setView, settings, addExp }) => {
            const [step, setStep] = useState(0);
            const [currentRoundWords, setCurrentRoundWords] = useState([]);
            const [options, setOptions] = useState([]);
            const [startTime, setStartTime] = useState(Date.now());
            const [results, setResults] = useState([]);
            const [combo, setCombo] = useState(0);
            const [finished, setFinished] = useState(false);
            const [showFeedback, setShowFeedback] = useState(null); // 'S', 'A', 'B', 'Miss'

            // 初始化一輪
            useEffect(() => {
                const shuffled = [...words].sort(() => 0.5 - Math.random()).slice(0, settings.questionsPerRound);
                setCurrentRoundWords(shuffled);
                generateOptions(shuffled[0]);
                setStartTime(Date.now());
            }, []);

            const generateOptions = (correctWord) => {
                const others = words.filter(w => w.id !== correctWord.id).sort(() => 0.5 - Math.random()).slice(0, 3);
                const opts = [...others, correctWord].sort(() => 0.5 - Math.random());
                setOptions(opts);
            };

            const handleAnswer = (selectedId) => {
                const correct = currentRoundWords[step].id === selectedId;
                const timeTaken = (Date.now() - startTime) / 1000;
                let grade = 'C';
                let pts = 100;

                if (correct) {
                    if (timeTaken < 2) { grade = 'S'; pts = 500; }
                    else if (timeTaken < 5) { grade = 'A'; pts = 300; }
                    else { grade = 'B'; pts = 200; }
                    
                    setShowFeedback(grade);
                    setCombo(c => c + 1);
                    const actualPts = addExp(pts + (combo * 10));
                    setResults([...results, { correct: true, grade, pts: actualPts }]);
                } else {
                    setShowFeedback('Miss');
                    setCombo(0);
                    setResults([...results, { correct: false, grade: 'F', pts: 0 }]);
                }

                setTimeout(() => {
                    setShowFeedback(null);
                    if (step + 1 < currentRoundWords.length) {
                        setStep(step + 1);
                        generateOptions(currentRoundWords[step + 1]);
                        setStartTime(Date.now());
                    } else {
                        setFinished(true);
                        setProfile(prev => ({ ...prev, roundsToday: prev.roundsToday + 1 }));
                    }
                }, 800);
            };

            if (finished) {
                const totalPts = results.reduce((a, b) => a + b.pts, 0);
                const perfect = results.every(r => r.correct);
                return (
                    <div className="flex-1 p-8 flex flex-col items-center justify-center">
                        <div className="glass-panel rounded-3xl p-8 w-full text-center space-y-6">
                            <h2 className="text-3xl font-black gold-text">修煉圓滿</h2>
                            <div className="text-6xl font-black text-yellow-500">{totalPts}</div>
                            <p className="text-slate-400">本次獲得修為</p>
                            
                            <div className="grid grid-cols-4 gap-2">
                                {results.map((r, i) => (
                                    <div key={i} className={`h-1 w-full rounded-full ${r.correct ? 'bg-yellow-500' : 'bg-red-500/30'}`}></div>
                                ))}
                            </div>

                            {perfect && (
                                <div className="bg-emerald-500/20 text-emerald-400 p-3 rounded-xl border border-emerald-500/30 text-sm animate-pulse">
                                    完美通關！根骨提升
                                </div>
                            )}

                            <button 
                                onClick={() => setView('home')}
                                className="w-full py-4 bg-yellow-500 text-slate-950 font-black rounded-xl hover:bg-yellow-400 active:scale-95 transition-all"
                            >
                                出關
                            </button>
                        </div>
                    </div>
                );
            }

            const currentWord = currentRoundWords[step];
            if (!currentWord) return null;

            return (
                <div className="flex-1 p-6 flex flex-col">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => setView('home')} className="text-slate-500 hover:text-white">
                            <i data-lucide="x-circle"></i>
                        </button>
                        <div className="flex-1 mx-8 h-2 bg-slate-900 rounded-full overflow-hidden">
                            <div 
                                className="h-full bg-yellow-500 transition-all"
                                style={{ width: `${(step / currentRoundWords.length) * 100}%` }}
                            ></div>
                        </div>
                        <div className="text-yellow-500 font-mono font-bold">{combo}連擊</div>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center space-y-12 relative">
                        {showFeedback && (
                            <div className={`absolute top-0 text-7xl font-black italic animate-bounce z-20 ${showFeedback === 'S' ? 'rank-s' : 'text-yellow-400'}`}>
                                {showFeedback}
                            </div>
                        )}

                        <div className="text-center">
                            <p className="text-slate-500 text-sm tracking-widest mb-2">請感悟真意</p>
                            <h1 className="text-6xl font-black tracking-tight text-white">{currentWord.en}</h1>
                        </div>

                        <div className="w-full grid grid-cols-1 gap-4">
                            {options.map((opt, i) => (
                                <button
                                    key={i}
                                    onClick={() => handleAnswer(opt.id)}
                                    className="glass-panel py-5 rounded-2xl text-xl font-bold hover:border-yellow-500/50 active:scale-95 transition-all"
                                >
                                    {opt.zh}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="py-8 text-center">
                        <button onClick={() => {/* 暫存退出邏輯 */ setView('home')}} className="text-slate-600 text-sm underline">
                            神魂暫退 (保存進度)
                        </button>
                    </div>
                </div>
            );
        };

        // --- 組件: 嫁衣神功 (Rebirth) ---
        const RebirthScreen = ({ profile, setProfile, setView }) => {
            const canRebirth = profile.exp >= 5000; // 結丹期

            const handleRebirth = () => {
                if (!canRebirth) return;
                if (confirm("散功重修，將使所有修為歸零，但永久獲得 50% 修為加成。確定嗎？")) {
                    setProfile(prev => ({
                        ...prev,
                        exp: 0,
                        rebirth: prev.rebirth + 1,
                        spiritStones: prev.spiritStones + 1000
                    }));
                    setView('home');
                }
            };

            return (
                <div className="flex-1 p-8 flex flex-col items-center justify-center text-center">
                    <div className="w-24 h-24 bg-red-500/20 rounded-full flex items-center justify-center text-red-500 mb-6 animate-pulse">
                        <i data-lucide="flame" size={48}></i>
                    </div>
                    <h1 className="text-3xl font-black text-red-500 mb-4">嫁衣神功</h1>
                    <p className="text-slate-400 mb-8 leading-relaxed">
                        古神有云：欲成大果，必先斷骨。<br/>
                        散盡一身修為，凝聚「轉世印記」。<br/>
                        <span className="text-yellow-500">當前加成：+{profile.rebirth * 50}%</span>
                    </p>

                    <div className="glass-panel p-6 rounded-3xl w-full mb-8">
                        <h3 className="font-bold mb-2">重修要求</h3>
                        <p className={canRebirth ? "text-emerald-400" : "text-red-400"}>
                            境界達到 結丹期 ({profile.exp}/5000)
                        </p>
                    </div>

                    <button 
                        disabled={!canRebirth}
                        onClick={handleRebirth}
                        className={`w-full py-4 rounded-xl font-black tracking-widest transition-all ${canRebirth ? 'bg-red-600 hover:bg-red-500 shimmer-btn' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}
                    >
                        散功重修
                    </button>
                    
                    <button onClick={() => setView('home')} className="mt-6 text-slate-500">罷了，我再想想</button>
                </div>
            );
        };

        // --- 組件: 管理後台 (Admin Panel) ---
        const AdminPanel = ({ settings, setSettings, setView, words, setWords }) => {
            const [pw, setPw] = useState("");
            const [isAuthed, setIsAuthed] = useState(false);
            const [newWord, setNewWord] = useState({ en: "", zh: "" });

            const checkPw = () => {
                if (pw === "123456") setIsAuthed(true);
                else alert("密語錯誤！");
            };

            if (!isAuthed) {
                return (
                    <div className="flex-1 flex flex-col items-center justify-center p-8">
                        <h2 className="text-2xl font-black gold-text mb-6">長輩控制台</h2>
                        <input 
                            type="password" 
                            className="w-full p-4 glass-panel rounded-xl mb-4 text-center"
                            placeholder="請輸入密語"
                            value={pw}
                            onChange={(e) => setPw(e.target.value)}
                        />
                        <button onClick={checkPw} className="w-full py-4 bg-yellow-500 text-slate-950 font-bold rounded-xl">驗證</button>
                        <button onClick={() => setView('home')} className="mt-4 text-slate-500">返回</button>
                    </div>
                );
            }

            return (
                <div className="flex-1 p-6 flex flex-col overflow-y-auto">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl font-black">法門調控</h2>
                        <button onClick={() => setView('home')} className="text-slate-400 hover:text-white">關閉</button>
                    </div>

                    {/* 參數設定 */}
                    <div className="glass-panel p-4 rounded-2xl mb-6 space-y-4">
                        <h3 className="text-sm font-bold text-yellow-500 border-b border-yellow-500/20 pb-2 uppercase tracking-tighter">參數調整</h3>
                        <div className="flex justify-between items-center">
                            <span className="text-xs">每日修煉輪次</span>
                            <input 
                                type="number" 
                                className="w-16 bg-slate-900 border border-slate-700 rounded px-2 text-center"
                                value={settings.dailyRounds}
                                onChange={(e) => setSettings({...settings, dailyRounds: parseInt(e.target.value)})}
                            />
                        </div>
                        <div className="flex justify-between items-center">
                            <span className="text-xs">每輪單字數量</span>
                            <input 
                                type="number" 
                                className="w-16 bg-slate-900 border border-slate-700 rounded px-2 text-center"
                                value={settings.questionsPerRound}
                                onChange={(e) => setSettings({...settings, questionsPerRound: parseInt(e.target.value)})}
                            />
                        </div>
                    </div>

                    {/* 字庫管理 */}
                    <div className="glass-panel p-4 rounded-2xl mb-6">
                        <h3 className="text-sm font-bold text-emerald-500 border-b border-emerald-500/20 pb-2 uppercase tracking-tighter mb-4">萬卷經書 ({words.length})</h3>
                        <div className="flex space-x-2 mb-4">
                            <input 
                                type="text" placeholder="EN" 
                                className="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm"
                                value={newWord.en}
                                onChange={e => setNewWord({...newWord, en: e.target.value})}
                            />
                            <input 
                                type="text" placeholder="中譯" 
                                className="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm"
                                value={newWord.zh}
                                onChange={e => setNewWord({...newWord, zh: e.target.value})}
                            />
                            <button 
                                onClick={() => {
                                    if (!newWord.en || !newWord.zh) return;
                                    setWords([...words, { ...newWord, id: Date.now(), level: 1 }]);
                                    setNewWord({ en: "", zh: "" });
                                }}
                                className="bg-emerald-600 px-3 py-1 rounded text-sm"
                            >
                                添
                            </button>
                        </div>

                        <div className="h-64 overflow-y-auto space-y-2">
                            {words.map(w => (
                                <div key={w.id} className="flex justify-between items-center bg-slate-800/40 p-2 rounded text-xs">
                                    <span>{w.en} - {w.zh}</span>
                                    <button onClick={() => setWords(words.filter(x => x.id !== w.id))} className="text-red-500">刪</button>
                                </div>
                            ))}
                        </div>

                        <button 
                            onClick={() => {
                                if(confirm("確定要施展核彈級禁術，清空所有字庫嗎？")) setWords([]);
                            }}
                            className="w-full mt-4 py-2 border border-red-500/50 text-red-500 rounded text-xs hover:bg-red-500/10"
                        >
                            一鍵核彈級清空
                        </button>
                    </div>

                    <div className="text-[10px] text-slate-600 text-center italic">
                        版本：v1.0.4 | 踏天禁制模組
                    </div>
                </div>
            );
        };

        // --- 渲染根節點 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // --- PWA Service Worker 註冊 ---
        if ('serviceWorker' in navigator) {
            const manifest = document.getElementById('manifest').textContent;
            const blob = new Blob([manifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestURL;
            document.head.appendChild(link);

            // 簡易 SW 代碼
            const swCode = `
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open('xian-ni-v1').then((cache) => cache.addAll(['/'])));
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL);
        }

        // 初始化 Lucide 圖示
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
