<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="修仙單字傳">
    <meta name="mobile-web-app-capable" content="yes">
    <title>單字記憶傳說：仙逆</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet" />
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(()=>{});
            });
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        // 新增了 deleteDoc 的匯入
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc };
        window.firebaseLoaded = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-indigo-100 overscroll-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = '' }) => (
            <span className={`material-symbols-rounded ${className}`} style={{ fontSize: size }}>{name}</span>
        );

        // 首次使用的防呆預設單字
        const INITIAL_WORDS = [
            { id: 1, word: 'to', pos: 'prep.', translation: '向', category: 'Unit 37' },
            { id: 2, word: 'title', pos: 'n.', translation: '標題;頭銜', category: 'Unit 37' },
            { id: 3, word: 'toast', pos: 'n.', translation: '吐司', category: 'Unit 37' },
            { id: 4, word: 'today', pos: 'n.', translation: '今天', category: 'Unit 37' },
            { id: 5, word: 'toe', pos: 'n.', translation: '腳趾', category: 'Unit 37' }
        ];

        const INTERVALS = [0, 1, 3, 7, 14, 30];
        
        // =========================================
        // 🐉 仙逆修為境界動態產生器 (完美多項式曲線)
        // =========================================
        const MAIN_RANKS = [
            { name: "凝氣", color: "text-slate-500", bg: "bg-slate-200" }, 
            { name: "築基", color: "text-emerald-600", bg: "bg-emerald-100" },
            { name: "結丹", color: "text-cyan-600", bg: "bg-cyan-100" },
            { name: "元嬰", color: "text-blue-600", bg: "bg-blue-100" },
            { name: "化神", color: "text-indigo-600", bg: "bg-indigo-100" },
            { name: "嬰變", color: "text-violet-600", bg: "bg-violet-100" },
            { name: "問鼎", color: "text-purple-600", bg: "bg-purple-100" },
            { name: "陰虛", color: "text-fuchsia-600", bg: "bg-fuchsia-200", single: true },
            { name: "陽實", color: "text-fuchsia-700", bg: "bg-fuchsia-300", single: true },
            { name: "窺涅", color: "text-pink-600", bg: "bg-pink-100" },
            { name: "淨涅", color: "text-rose-600", bg: "bg-rose-100" },
            { name: "碎涅", color: "text-red-600", bg: "bg-red-100" },
            { name: "空靈", color: "text-orange-600", bg: "bg-orange-100" }, 
            { name: "空玄", color: "text-amber-600", bg: "bg-amber-100" },
            { name: "空劫", color: "text-yellow-600", bg: "bg-yellow-100" }
        ];
        const SUB_RANKS = ["前期", "中期", "後期", "大圓滿"];

        const RANKS_DB = [{ title: '凡人', score: 0, color: 'text-slate-400', bg: 'bg-slate-100' }];
        let rankIndex = 1;
        MAIN_RANKS.forEach(mr => {
            if (mr.single) {
                RANKS_DB.push({ title: mr.name, score: Math.floor(150 * rankIndex + 12 * Math.pow(rankIndex, 3)), color: mr.color, bg: mr.bg });
                rankIndex++;
            } else {
                SUB_RANKS.forEach(sr => {
                    RANKS_DB.push({ title: mr.name + sr, score: Math.floor(150 * rankIndex + 12 * Math.pow(rankIndex, 3)), color: mr.color, bg: mr.bg });
                    rankIndex++;
                });
            }
        });
        RANKS_DB.push({ title: '踏天境', score: Math.floor(150 * rankIndex + 12 * Math.pow(rankIndex, 3)), color: 'text-yellow-400 font-black drop-shadow-md', bg: 'bg-slate-900' });

        const getRankInfo = (score) => {
            let currentRank = RANKS_DB[0];
            for (let i = 0; i < RANKS_DB.length; i++) {
                if (score >= RANKS_DB[i].score) currentRank = RANKS_DB[i];
                else break;
            }
            const nextRank = RANKS_DB.find(r => r.score > score);
            return { ...currentRank, nextScore: nextRank ? nextRank.score : null };
        };

        const generateBlanks = (word) => {
            return word.split('').map(c => /[a-zA-Z]/.test(c) ? '_' : c).join('');
        };

        function MainApp({ db, appId, authUser }) {
            const { collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseLib;

            const [view, setView] = useState('login'); 
            const [virtualDate, setVirtualDate] = useState(Date.now());
            const [currentUserId, setCurrentUserId] = useState(null);
            
            const [globalWords, setGlobalWords] = useState([]);
            const [lastImportBatchId, setLastImportBatchId] = useState(null);
            const [users, setUsers] = useState([]);
            const [userWordStats, setUserWordStats] = useState({});
            
            const [settings, setSettings] = useState({ newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 });
            const [parentPassword, setParentPassword] = useState("123456"); 
            
            const [studyMode, setStudyMode] = useState('flashcard'); 
            const [isPracticeMode, setIsPracticeMode] = useState(false);
            const [isReviveMode, setIsReviveMode] = useState(false);
            const [studyQueue, setStudyQueue] = useState([]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [cardStartTime, setCardStartTime] = useState(0);
            const [recallDuration, setRecallDuration] = useState(null);
            const [showResult, setShowResult] = useState(null); 
            const [spellInput, setSpellInput] = useState('');
            
            const sessionMistakesRef = useRef(0);
            const sessionMissedWords = useRef([]); 

            const [newUserName, setNewUserName] = useState('');
            const [newUserPassword, setNewUserPassword] = useState('');
            const [newUserAvatar, setNewUserAvatar] = useState(null);
            
            const [passwordModalUser, setPasswordModalUser] = useState(null);
            const [inputPassword, setInputPassword] = useState('');
            const [passwordError, setPasswordError] = useState(false);

            const [isLibraryAdmin, setIsLibraryAdmin] = useState(false);
            const [showLibraryLogin, setShowLibraryLogin] = useState(false);
            const [libraryUnlockCode, setLibraryUnlockCode] = useState('');
            const [libraryUnlockError, setLibraryUnlockError] = useState(false);
            const [manualWord, setManualWord] = useState({ word: '', pos: '', translation: '', category: '' });

            const [localSettings, setLocalSettings] = useState({ newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 });
            const [isSettingsUnlocked, setIsSettingsUnlocked] = useState(false);
            const [settingsUnlockCode, setSettingsUnlockCode] = useState('');
            const [settingsUnlockError, setSettingsUnlockError] = useState(false);
            const [newParentPwd, setNewParentPwd] = useState('');
            const [smartText, setSmartText] = useState('');
            const [isImporting, setIsImporting] = useState(false);

            useEffect(() => {
                if(!db || !appId) return;
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config');
                const unsub = onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.globalWords) setGlobalWords(data.globalWords);
                        if (data.lastImportBatchId !== undefined) setLastImportBatchId(data.lastImportBatchId);
                        if (data.settings) {
                            setSettings(data.settings);
                            setLocalSettings(data.settings);
                        }
                        if (data.parentPassword) setParentPassword(data.parentPassword);
                    } else {
                        setDoc(ref, { 
                            globalWords: INITIAL_WORDS, 
                            settings: { newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 },
                            parentPassword: "123456",
                            lastImportBatchId: null
                        });
                    }
                });
                return () => unsub();
            }, [db, appId]);

            useEffect(() => {
                if(!db || !appId) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const unsub = onSnapshot(q, (snap) => {
                    const arr = [];
                    snap.forEach(d => arr.push(d.data()));
                    setUsers(arr);
                });
                return () => unsub();
            }, [db, appId]);

            useEffect(() => {
                if (!currentUserId || !db) return; // 移除 globalWords.length 的限制，允許空字庫
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', currentUserId);
                const unsub = onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        setUserWordStats(prev => ({ ...prev, [currentUserId]: snap.data().words }));
                    } else {
                        const initialStats = globalWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null }));
                        setDoc(ref, { words: initialStats });
                    }
                });
                return () => unsub();
            }, [db, appId, currentUserId, globalWords]); // 依賴項保留 globalWords 以處理第一次註冊

            const currentUser = useMemo(() => users.find(u => u.id === currentUserId), [users, currentUserId]);
            const currentWords = useMemo(() => userWordStats[currentUserId] || [], [userWordStats, currentUserId]);

            const todayStr = useMemo(() => new Date(virtualDate).toDateString(), [virtualDate]);
            const currentBatches = currentUser?.lastStudyDate === todayStr ? currentUser.dailyBatches : 0;

            const { dueReviewsTotal, failedWordsTotal, newWordsAvailable, masteredWords } = useMemo(() => {
                let reviews = currentWords.filter(w => w.status === 'learning' && w.nextReview <= virtualDate && w.level > 0);
                let failed = currentWords.filter(w => w.status === 'learning' && w.nextReview <= virtualDate && w.level === 0);
                let newWords = currentWords.filter(w => w.status === 'new');
                let mastered = currentWords.filter(w => w.status === 'mastered');
                return { dueReviewsTotal: reviews, failedWordsTotal: failed, newWordsAvailable: newWords, masteredWords: mastered.length };
            }, [currentWords, virtualDate]);

            const dueReviewsPreview = useMemo(() => [...dueReviewsTotal].sort(() => 0.5 - Math.random()).slice(0, settings.maxReviewsPerBatch), [dueReviewsTotal, settings]);
            const reviveWordsPreview = useMemo(() => [...failedWordsTotal].sort(() => 0.5 - Math.random()).slice(0, 3), [failedWordsTotal]);
            const newWordsPreview = useMemo(() => {
                return currentBatches === 0 ? [...newWordsAvailable].sort(() => 0.5 - Math.random()).slice(0, settings.newWordsPerBatch) : [];
            }, [currentBatches, newWordsAvailable, settings]);

            const dashboardQueueTotal = useMemo(() => {
                return [...dueReviewsPreview, ...reviveWordsPreview, ...newWordsPreview];
            }, [dueReviewsPreview, reviveWordsPreview, newWordsPreview]);

            const handleSmartImport = async (rawText) => {
                if (!rawText.trim()) return false;
                try {
                    const existingWordsSet = new Set(globalWords.map(w => w.word.trim().toLowerCase()));
                    let newWords = [];
                    let currentMaxId = globalWords.length > 0 ? Math.max(...globalWords.map(w => w.id)) : 0;
                    const batchId = Date.now().toString();

                    const fullText = rawText.replace(/\n/g, '  ');
                    const unitChunks = fullText.split(/(?=2000\s*單?\s*Unit\s*\d+|Unit\s*\d+)/i);

                    unitChunks.forEach(chunk => {
                        const unitMatch = chunk.match(/Unit\s*(\d+)/i);
                        let currentUnit = unitMatch ? `Unit ${unitMatch[1].padStart(2, '0')}` : 'Unit 未知';
                        const tokens = chunk.split(/(?:\s|^)\b([1-9]|[1-4][0-9]|50)\s+(?=[a-zA-Z])/);
                        
                        for (let i = 1; i < tokens.length; i += 2) {
                            const content = tokens[i+1];
                            const engMatch = content.match(/^([a-zA-Z\-\'\s]+)/);
                            if (!engMatch) continue;
                            const word = engMatch[1].trim();
                            const posMatch = content.match(/\(([a-z\.\/]+)\)/);
                            const pos = posMatch ? posMatch[1] : '';
                            const transMatch = content.match(/([\u4e00-\u9fa5]+[^\w\s]*)/);
                            const translation = transMatch ? transMatch[1].replace(/\s+/g, '') : '無翻譯';

                            if (word.length > 0 && !existingWordsSet.has(word.toLowerCase())) {
                                currentMaxId++;
                                newWords.push({ id: currentMaxId, word, pos, translation, category: currentUnit, batchId });
                                existingWordsSet.add(word.toLowerCase());
                            }
                        }
                    });

                    if (newWords.length === 0) return 0;

                    const updatedGlobal = [...globalWords, ...newWords];
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal, lastImportBatchId: batchId });
                    
                    for (const u of users) {
                        const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                        const snap = await getDoc(uRef);
                        if(snap.exists()) {
                            const currentW = snap.data().words;
                            const addedW = newWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null, batchId }));
                            await updateDoc(uRef, { words: [...currentW, ...addedW] });
                        }
                    }
                    return newWords.length;
                } catch (err) {
                    console.error(err);
                    return -1;
                }
            };

            const handleCsvImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split(/\r?\n/);
                    const newWords = [];
                    const existingWordsSet = new Set(globalWords.map(w => w.word.trim().toLowerCase()));
                    let currentMaxId = globalWords.length > 0 ? Math.max(...globalWords.map(w => w.id)) : 0;
                    const batchId = Date.now().toString();

                    rows.forEach((row) => {
                        const cols = row.split(',').map(c => c.trim());
                        if (cols.length >= 4 && cols[0] && cols[0] !== '單字' && cols[0] !== 'word') {
                            const wordText = cols[0];
                            if (!existingWordsSet.has(wordText.toLowerCase())) {
                                currentMaxId++;
                                newWords.push({ id: currentMaxId, word: wordText, pos: cols[1], translation: cols[2], category: cols[3], batchId });
                                existingWordsSet.add(wordText.toLowerCase());
                            }
                        }
                    });

                    if (newWords.length > 0) {
                        const updatedGlobal = [...globalWords, ...newWords];
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal, lastImportBatchId: batchId });
                        
                        for (const u of users) {
                            const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                            const snap = await getDoc(uRef);
                            if(snap.exists()) {
                                const currentW = snap.data().words;
                                const addedW = newWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null, batchId }));
                                await updateDoc(uRef, { words: [...currentW, ...addedW] });
                            }
                        }
                        alert(`🎉 成功匯入 ${newWords.length} 個新單字！重複的單字已自動濾除。`);
                    } else {
                        alert('⚠️ 匯入失敗或無新單字：請確認 CSV 格式，或所有單字均已存在。');
                    }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const handleUndoLastImport = async () => {
                if (!lastImportBatchId) return alert("沒有可復原的匯入紀錄！");
                if (!window.confirm("確定要【復原最後一次匯入】嗎？這將刪除上一批匯入的所有單字。")) return;

                const updatedGlobal = globalWords.filter(w => w.batchId !== lastImportBatchId);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { 
                    globalWords: updatedGlobal,
                    lastImportBatchId: null 
                });

                for (const u of users) {
                    const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                    const snap = await getDoc(uRef);
                    if (snap.exists()) {
                        const currentW = snap.data().words;
                        const updatedW = currentW.filter(w => w.batchId !== lastImportBatchId);
                        await updateDoc(uRef, { words: updatedW });
                    }
                }
                alert("已成功復原最後一次匯入！");
            };

            // =========================================
            // 💣 毀天滅地：清空所有單字 (包含預設 10 題)
            // =========================================
            const handleNuclearReset = async () => {
                if (!window.confirm("🚨 毀天滅地警告：這將會刪除【所有單字】（包含預設的 10 題測試單字）！\n系統將變成完全空白的狀態。\n\n確定要執行大掃除嗎？")) return;

                // 1. 全局字庫徹底清空
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: [], lastImportBatchId: null });

                // 2. 重置所有使用者的進度清單為空陣列
                for (const u of users) {
                    const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                    const snap = await getDoc(uRef);
                    if (snap.exists()) {
                        await updateDoc(uRef, { words: [] });
                    }
                }
                alert("🧹 陣法已重置！法寶庫現在空空如也，請重新匯入單字。");
            };

            const handleAdminResetPassword = async (targetUserId) => {
                const newPwd = prompt("請輸入該英雄的新密碼：");
                if (newPwd !== null && newPwd.trim() !== "") {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', targetUserId), { password: newPwd.trim() });
                    alert("密碼重設成功！");
                }
            };

            // =========================================
            // 🗑️ 逐出師門：刪除修士
            // =========================================
            const handleDeleteUser = async (targetUserId, targetUserName) => {
                if (!window.confirm(`🚨 危險操作：確定要將修士【${targetUserName}】逐出師門嗎？\n這將永久清除他的所有修為與進度，無法復原！`)) return;
                
                if (targetUserId === currentUserId) {
                    setCurrentUserId(null);
                    setView('login');
                }

                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', targetUserId));
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', targetUserId));
                alert(`已將修士【${targetUserName}】逐出師門！`);
            };

            const handleRebirth = async () => {
                if (currentUser.score < 10000) {
                    return alert("修為不足！至少需要達到【結丹】境界才能承受散功重修的反噬！");
                }
                if (!window.confirm(`⚠️ 警告：散功重修 (嫁衣神功)\n\n這將會散去你現在所有的修為積分 (歸零)，但你將獲得【轉世印記】！\n未來的每一次戰鬥，你將獲得永久 50% 的積分加成！\n轉世次數越多，修煉越快，這是突破凡人極限、面對 8000 單字的唯一方法。\n\n你確定要散功重修嗎？`)) return;

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), {
                    score: 0,
                    rebirth: (currentUser.rebirth || 0) + 1
                });
                alert("🔥 散功重修成功！你已褪去舊凡體，獲得了強大的轉世加成！");
            };

            const handleStartSession = async (reqMode = 'flashcard') => {
                let isPractice = false;
                let newBatches = currentBatches;

                if (currentBatches >= settings.maxBatchesPerDay) {
                    isPractice = true;
                } else {
                    newBatches = currentBatches + 1;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { 
                        lastStudyDate: todayStr, dailyBatches: newBatches 
                    });
                }

                const queue = [...dueReviewsPreview, ...reviveWordsPreview.map(w => ({...w, isRevive: true})), ...(isPractice ? [] : newWordsPreview.map(w => ({...w, isNewBatch: true})))].sort(() => 0.5 - Math.random());
                
                if(queue.length === 0) return alert("目前沒有可練功的單字！");

                setStudyMode(reqMode);
                setIsPracticeMode(isPractice);
                setIsReviveMode(false);
                setStudyQueue(queue); 
                setCurrentCardIndex(0); 
                setIsFlipped(false); 
                setCardStartTime(Date.now());
                setRecallDuration(null); 
                setShowResult(null); 
                setSpellInput('');
                sessionMistakesRef.current = 0; 
                sessionMissedWords.current = [];
                setView('study');
            };

            const handleStartReviveChallenge = () => {
                setStudyMode('flashcard');
                setIsPracticeMode(false);
                setIsReviveMode(true);
                setStudyQueue([...sessionMissedWords.current].sort(() => 0.5 - Math.random())); 
                setCurrentCardIndex(0); 
                setIsFlipped(false); 
                setCardStartTime(Date.now());
                setRecallDuration(null); 
                setShowResult(null); 
                setSpellInput('');
                sessionMistakesRef.current = 0; 
                sessionMissedWords.current = [];
                setView('study');
            };

            const submitSpell = () => {
                const currentWord = studyQueue[currentCardIndex];
                const isCorrect = globalWords.some(w => 
                    w.translation === currentWord.translation &&
                    generateBlanks(w.word) === generateBlanks(currentWord.word) &&
                    spellInput.trim().toLowerCase() === w.word.trim().toLowerCase()
                );
                
                setRecallDuration(Date.now() - cardStartTime);
                evaluateAnswer(isCorrect, true);
            };

            const evaluateAnswer = (isCorrect, fromSpelling = false) => {
                const time = recallDuration || (Date.now() - cardStartTime); 
                const currentWord = studyQueue[currentCardIndex];
                
                let newLevel = currentWord.level; 
                let newStatus = currentWord.status === 'new' ? 'learning' : currentWord.status;
                let grade, basePoints = 0, comment; 
                let isOverdueBonus = false;

                if (!isCorrect) {
                    sessionMistakesRef.current += 1;
                    sessionMissedWords.current.push(currentWord);
                }

                if (isPracticeMode) {
                    if (isCorrect) { grade = 'S'; comment = '練功正確！'; basePoints = 0; } 
                    else { grade = 'D'; comment = '練功錯誤！'; basePoints = 0; }
                } else if (isReviveMode) {
                    if (isCorrect) { grade = 'S'; comment = '復活成功！免除死刑！'; basePoints = 0; newLevel = 1; } 
                    else { grade = 'D'; comment = '復活失敗！乖乖重練！'; basePoints = 0; newLevel = 0; }
                } else {
                    let overdueDays = 0;
                    if (currentWord.nextReview) overdueDays = Math.floor((virtualDate - currentWord.nextReview) / (24 * 60 * 60 * 1000));

                    if (isCorrect) {
                        if (fromSpelling || time <= 2000) { grade = 'S'; basePoints = 50; comment = fromSpelling ? '完美拼寫！' : '秒殺！太神啦！'; newLevel = Math.min(INTERVALS.length - 1, newLevel + 2); } 
                        else if (time <= 5000) { grade = 'A'; basePoints = 30; comment = '非常流暢！'; newLevel = Math.min(INTERVALS.length - 1, newLevel + 1); } 
                        else { grade = 'B'; basePoints = 10; comment = '回想較久，再多練練！'; newLevel = Math.max(1, newLevel); }
                        
                        if (overdueDays >= 2 && (grade === 'S' || grade === 'A')) {
                            basePoints += 20; newLevel = Math.min(INTERVALS.length - 1, newLevel + 1); comment = '記憶力超強！(遲到紅利)'; isOverdueBonus = true;
                        }
                        if (newLevel === INTERVALS.length - 1) newStatus = 'mastered';
                    } else {
                        if (time <= 2000 && !fromSpelling) { grade = 'C'; basePoints = -5; comment = '太心急猜錯囉！'; newLevel = 0; } 
                        else { grade = 'D'; basePoints = -10; comment = fromSpelling ? '拼錯囉！' : '完全忘記，打回冷宮！'; newLevel = 0; }
                    }
                }

                let actualPoints = basePoints;
                if (basePoints > 0) {
                    actualPoints = Math.round(basePoints * (1 + (currentUser.rebirth || 0) * 0.5));
                }

                const daysToAdd = INTERVALS[newLevel];
                const nextReviewTime = virtualDate + (daysToAdd * 24 * 60 * 60 * 1000);

                const payload = { points: actualPoints, newLevel, newStatus, nextReviewTime, currentWordId: currentWord.id };
                setShowResult({ grade, points: actualPoints, comment, isCorrect, payload, isOverdueBonus });
            };

            const proceedToNextCard = async () => {
                if (!showResult) return;
                const { payload } = showResult;

                if (!isPracticeMode) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { 
                        score: Math.max(0, currentUser.score + payload.points), totalReviewed: (currentUser.totalReviewed || 0) + 1 
                    });

                    const updatedWords = currentWords.map(w => w.id === payload.currentWordId ? { ...w, level: payload.newLevel, status: payload.newStatus, nextReview: payload.nextReviewTime } : w);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', currentUserId), { words: updatedWords });
                }

                setShowResult(null); 
                setSpellInput('');

                if (currentCardIndex < studyQueue.length - 1) {
                    setCurrentCardIndex(prev => prev + 1); setIsFlipped(false); setCardStartTime(Date.now()); setRecallDuration(null);
                } else {
                    if (!isPracticeMode && !isReviveMode && sessionMistakesRef.current === 0) {
                        let bonus = Math.round(100 * (1 + (currentUser.rebirth || 0) * 0.5));
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { score: currentUser.score + payload.points + bonus });
                    }
                    setView('result'); 
                }
            };

            const renderLogin = () => (
                <div className="max-w-md md:max-w-2xl lg:max-w-4xl mx-auto p-6 md:p-12 animate-in fade-in zoom-in duration-300 min-h-screen flex flex-col justify-center relative">
                    <div className="absolute top-4 right-4 md:top-8 md:right-8 flex items-center gap-2">
                        <span className="text-xs font-bold text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm">
                            <Icon name="cloud_done" size={16}/> 雲端連線中
                        </span>
                    </div>

                    {passwordModalUser && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl animate-in zoom-in-95 spin-in-2">
                                <div className="flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4 mx-auto"><Icon name="lock" size={32} /></div>
                                <h3 className="text-2xl font-black text-center text-slate-800 mb-1">修士驗證</h3>
                                <p className="text-center text-sm font-medium text-slate-500 mb-6">請輸入 <span className="text-indigo-600 font-bold">{passwordModalUser.name}</span> 的神識密碼</p>
                                <input type="password" placeholder="輸入密碼..." value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && (inputPassword === passwordModalUser.password ? (setCurrentUserId(passwordModalUser.id), setPasswordModalUser(null), setView('dashboard')) : setPasswordError(true))} className={`w-full px-4 py-3 text-lg rounded-xl border-2 focus:outline-none mb-2 transition-colors ${passwordError ? 'border-rose-400 focus:border-rose-500 bg-rose-50' : 'border-slate-200 focus:border-indigo-500'}`} />
                                {passwordError && <p className="text-rose-500 text-xs font-bold mb-4 text-center">陣法排斥，密碼錯誤</p>}
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setPasswordModalUser(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">取消</button>
                                    <button onClick={() => inputPassword === passwordModalUser.password ? (setCurrentUserId(passwordModalUser.id), setPasswordModalUser(null), setView('dashboard')) : setPasswordError(true)} className="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-colors">破陣</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="text-center mb-10 md:mb-16">
                        <div className="inline-flex items-center justify-center w-20 h-20 md:w-28 md:h-28 bg-indigo-600 text-white rounded-full mb-6 shadow-lg shadow-indigo-200">
                            <Icon name="psychology" size={48} className="md:text-[64px]"/>
                        </div>
                        <h1 className="text-4xl md:text-5xl lg:text-6xl font-black text-slate-800 mb-4 tracking-tight">修仙單字傳</h1>
                        <p className="text-slate-500 font-medium md:text-xl">結丹化神，挑戰最強修仙境界</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8">
                            <h2 className="text-sm md:text-base font-bold text-slate-400 mb-6 uppercase tracking-wider flex items-center gap-2">
                                <Icon name="group" size={20}/> 選擇現有修士
                            </h2>
                            <div className="space-y-4 max-h-[40vh] overflow-y-auto pr-2">
                                {users.length === 0 && <p className="text-slate-400 font-medium text-center py-4">尚無修士，請先創建</p>}
                                {users.map(user => (
                                    <button key={user.id} onClick={() => { if (!user.password) { setCurrentUserId(user.id); setView('dashboard'); } else { setPasswordModalUser(user); setInputPassword(''); setPasswordError(false); } }} className="w-full flex items-center justify-between p-4 md:p-5 rounded-2xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left group">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-14 h-14 md:w-16 md:h-16 flex-shrink-0 rounded-full flex items-center justify-center overflow-hidden border-2 border-white shadow-sm ${getRankInfo(user.score).bg} ${getRankInfo(user.score).color}`}>
                                                {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover" alt={user.name} /> : <Icon name="person" size={28} />}
                                            </div>
                                            <div>
                                                <div className="font-bold text-slate-800 text-lg md:text-xl">
                                                    {user.rebirth > 0 && <span className="text-amber-500 text-sm mr-1">【{user.rebirth}轉】</span>}
                                                    {user.name}
                                                </div>
                                                <div className={`text-sm font-bold mt-1 ${getRankInfo(user.score).color}`}>{getRankInfo(user.score).title} ({user.score} PT)</div>
                                            </div>
                                        </div>
                                        <Icon name={user.password ? "lock" : "play_arrow"} size={28} className="text-slate-300 group-hover:text-indigo-500 transition-colors" />
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-100 rounded-3xl p-6 md:p-8 flex flex-col justify-center">
                            <h2 className="text-sm md:text-base font-bold text-slate-400 mb-6 uppercase tracking-wider flex items-center gap-2">
                                <Icon name="person_add" size={20} /> 踏入修真界
                            </h2>
                            <div className="flex flex-col gap-4">
                                <div className="flex justify-center mb-2">
                                    <label className="relative cursor-pointer group">
                                        <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-white border-4 border-slate-200 shadow-sm flex items-center justify-center overflow-hidden transition-transform group-hover:scale-105">
                                            {newUserAvatar ? <img src={newUserAvatar} alt="Preview" className="w-full h-full object-cover" /> : <Icon name="add_a_photo" size={32} className="text-slate-400" />}
                                        </div>
                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => setNewUserAvatar(reader.result); reader.readAsDataURL(file); } }} />
                                        <div className="absolute -bottom-2 bg-slate-800 text-white text-[10px] px-3 py-1 rounded-full left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none">上傳頭貼</div>
                                    </label>
                                </div>
                                <input type="text" placeholder="輸入修士名稱..." value={newUserName} onChange={(e) => setNewUserName(e.target.value)} className="w-full px-5 py-4 text-base md:text-lg rounded-xl border-2 border-transparent focus:border-indigo-500 focus:outline-none shadow-sm" />
                                <input type="password" placeholder="設定神識密碼..." value={newUserPassword} onChange={(e) => setNewUserPassword(e.target.value)} className="w-full px-5 py-4 text-base md:text-lg rounded-xl border-2 border-transparent focus:border-indigo-500 focus:outline-none shadow-sm" />
                                <button onClick={async () => { if (!newUserName.trim() || !newUserPassword.trim()) return; const newUser = { id: Date.now().toString(), name: newUserName.trim(), password: newUserPassword.trim(), score: 0, rebirth: 0, totalReviewed: 0, lastStudyDate: null, dailyBatches: 0, avatar: newUserAvatar }; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', newUser.id), newUser); const initialStats = globalWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null })); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', newUser.id), { words: initialStats }); setNewUserName(''); setNewUserPassword(''); setNewUserAvatar(null); setCurrentUserId(newUser.id); setView('dashboard'); }} disabled={!newUserName.trim() || !newUserPassword.trim()} className={`w-full text-white px-6 py-4 rounded-xl text-lg font-bold transition-all shadow-md ${newUserName.trim() && newUserPassword.trim() ? 'bg-slate-800 hover:bg-slate-900' : 'bg-slate-300 cursor-not-allowed'}`}>
                                    註冊並出發
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderSettings = () => {
                if (!isSettingsUnlocked) {
                    return (
                        <div className="min-h-screen flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-xl border border-slate-100 text-center">
                                <Icon name="admin_panel_settings" size={64} className="text-indigo-600 mb-4" />
                                <h2 className="text-2xl font-black text-slate-800 mb-2">掌門控制台</h2>
                                <p className="text-sm text-slate-500 mb-6">請輸入掌門密碼以修改修煉法則。<br/>(系統預設密碼為 <strong className="text-indigo-600">123456</strong>)</p>
                                <input type="password" placeholder="輸入掌門密碼" value={settingsUnlockCode} onChange={e => setSettingsUnlockCode(e.target.value)} onKeyDown={e => e.key === 'Enter' && (settingsUnlockCode === parentPassword ? (setIsSettingsUnlocked(true), setSettingsUnlockError(false)) : setSettingsUnlockError(true))} className={`w-full px-5 py-4 text-lg rounded-xl border-2 mb-2 focus:outline-none text-center ${settingsUnlockError ? 'border-rose-400 bg-rose-50' : 'border-slate-200 focus:border-indigo-500'}`} />
                                {settingsUnlockError && <p className="text-rose-500 text-xs font-bold mb-4">陣法排斥，密碼錯誤！</p>}
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setView('dashboard')} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">返回</button>
                                    <button onClick={() => settingsUnlockCode === parentPassword ? (setIsSettingsUnlocked(true), setSettingsUnlockError(false)) : setSettingsUnlockError(true)} className="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md">破陣進入</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="max-w-md md:max-w-3xl lg:max-w-5xl mx-auto p-6 md:p-8 animate-in fade-in duration-300 pb-32">
                        <div className="bg-white rounded-3xl shadow-xl p-6 md:p-10 border border-slate-100">
                            <div className="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
                                <div className="flex items-center gap-3">
                                    <Icon name="settings_suggest" size={36} className="text-indigo-600" />
                                    <h2 className="text-3xl font-black text-slate-800">掌門控制台</h2>
                                </div>
                                <button onClick={() => setView('dashboard')} className="p-2 text-slate-400 hover:text-slate-800"><Icon name="close" size={28} /></button>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-10 md:gap-16">
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Icon name="tune" /> 修煉法則調整</h3>
                                    <div className="space-y-8 mb-8">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">每次出戰釋放的全新單字數 (配額)</label>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="1" max="50" value={localSettings.newWordsPerBatch} onChange={e => setLocalSettings({...localSettings, newWordsPerBatch: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                <span className="font-black text-2xl text-indigo-600 w-12 text-right">{localSettings.newWordsPerBatch}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">每日最高可戰鬥次數 (超過則進練功房)</label>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="1" max="10" value={localSettings.maxBatchesPerDay} onChange={e => setLocalSettings({...localSettings, maxBatchesPerDay: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                <span className="font-black text-2xl text-indigo-600 w-12 text-right">{localSettings.maxBatchesPerDay}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">每次挑戰最多切塊幾題「積欠舊字」</label>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="5" max="50" step="5" value={localSettings.maxReviewsPerBatch} onChange={e => setLocalSettings({...localSettings, maxReviewsPerBatch: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                <span className="font-black text-2xl text-indigo-600 w-12 text-right">{localSettings.maxReviewsPerBatch}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">變更掌門防護密碼</label>
                                            <input type="password" placeholder="若不更改請留白" value={newParentPwd} onChange={e => setNewParentPwd(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-indigo-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    <button onClick={async () => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { settings: localSettings, parentPassword: newParentPwd.trim() || parentPassword }); alert('⚙️ 掌門法則已成功儲存並同步至雲端！'); setView('dashboard'); }} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-colors">儲存上述設定</button>

                                    {/* 修士管理區塊：加入刪除帳號功能 */}
                                    <div className="mt-12 bg-slate-50 border border-slate-200 p-6 rounded-2xl">
                                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="vpn_key" /> 修士管理 (逐出師門與密碼)</h3>
                                        <div className="space-y-3 max-h-48 overflow-y-auto pr-2">
                                            {users.map(u => (

                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleAdminResetPassword(u.id)} className="bg-indigo-100 text-indigo-600 font-bold px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-200 transition-colors">重設密碼</button>
                                                        <button onClick={() => handleDeleteUser(u.id, u.name)} className="bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded-lg text-sm hover:bg-rose-200 transition-colors" title="逐出師門 (刪除帳號)"><Icon name="delete" size={16} /></button>
                                                    </div>
                                                </div>

                                            {users.length === 0 && <span className="text-slate-400 text-sm">尚無修士</span>}

                                    <div className="bg-amber-50 rounded-2xl p-6 border border-amber-100 h-full flex flex-col">

                                        <p className="text-sm text-amber-700 mb-4 leading-relaxed">不管 PDF 複製出來的文字左右欄有多亂，只要整坨貼在下方，AI 演算法就會自動梳理並匯入！</p>

                                        <button onClick={async () => { setIsImporting(true); const count = await handleSmartImport(smartText); if (count > 0) { alert(`🎉 神奇！成功萃取出 ${count} 個新單字法寶！`); setSmartText(''); } else if (count === 0) { alert('匯入的單字都已經存在了喔！'); } else { alert('⚠️ 找不到符合天道格式的單字。'); } setIsImporting(false); }} disabled={isImporting || !smartText.trim()} className={`w-full py-4 font-black text-white rounded-xl shadow-md transition-colors flex justify-center items-center gap-2 ${isImporting || !smartText.trim() ? 'bg-amber-300 cursor-not-allowed' : 'bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600'}`}>
                                            {isImporting ? <Icon name="hourglass_empty" className="animate-spin" /> : <Icon name="magic_button" />}
                                            {isImporting ? '陣法解析中...' : '一鍵智能萃取單字'}

            const renderLobby = () => {

                    const mastered = uWords.filter(w => w.status === 'mastered').length;
                    return { ...u, masteredCount: mastered };

                return (
                    <div className="max-w-md md:max-w-3xl lg:max-w-4xl mx-auto p-6 md:p-8 animate-in fade-in duration-300 pb-32 overflow-hidden">

                            <div className="inline-flex items-center justify-center w-16 h-16 bg-yellow-100 text-yellow-600 rounded-full mb-4 shadow-sm border border-yellow-200"><Icon name="military_tech" size={40} /></div>

                        <div className="relative pt-16 pb-24">

                            <div className="absolute left-1/2 top-0 transform -translate-x-1/2 -translate-y-1/2 z-20">
                                <div className="bg-indigo-600 p-3 rounded-full border-4 border-white shadow-lg text-white"><Icon name="flag" size={32} /></div>
                            </div>

                            {rankedUsers.map((u, i) => {
                                const isLeft = i % 2 === 0;
                                return (
                                    <div key={u.id} className={`relative flex items-center w-full mb-12 z-10 ${isLeft ? 'justify-start' : 'justify-end'}`}>
