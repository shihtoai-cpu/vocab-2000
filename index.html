<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙逆單字傳</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 載入 Babel (負責在瀏覽器內即時編譯 React 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 應用程式邏輯區塊 -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // ⚠️ 掌門請注意：在這裡填入你的 Firebase 金鑰
        // ==========================================
        const manualFirebaseConfig = {
            apiKey: "AIzaSyAtvZjyKKRsfbbRPt-OI85isFuua6EV1YQ",
  authDomain: "vocab-2000.firebaseapp.com",
  projectId: "vocab-2000",
  storageBucket: "vocab-2000.firebasestorage.app",
  messagingSenderId: "459452518715",
  appId: "1:459452518715:web:2842926df8a8d73831a71e"
        };

        // 環境偵測 (支援本地端與 Canvas)
        let firebaseConfig = manualFirebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            try { firebaseConfig = JSON.parse(__firebase_config); } catch (e) {}
        }
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'vocab-legend-ultimate';

        // --- 仙逆修真境界演算 (多項式指數升級) ---
        const RANKS_DATA = [
            { title: "凡人", color: "#94a3b8" },
            { title: "凝氣期", color: "#4ade80" },
            { title: "築基期", color: "#60a5fa" },
            { title: "金丹期", color: "#fbbf24" },
            { title: "元嬰期", color: "#f87171" },
            { title: "化神期", color: "#c084fc" },
            { title: "煉虛期", color: "#e879f9" },
            { title: "合體期", color: "#f472b6" },
            { title: "大乘期", color: "#cbd5e1" },
            { title: "渡劫仙尊", color: "#fbbf24", glow: true }
        ];
        const STAGES = ["前期", "中期", "後期", "圓滿"];
        let stepCount = 0;
        const ALL_RANKS = RANKS_DATA.flatMap((r) => {
            if (r.title === "凡人" || r.title === "渡劫仙尊") {
                const min = 150 * stepCount + 12 * Math.pow(stepCount, 3);
                stepCount++;
                return [{ title: r.title, min, color: r.color, glow: r.glow }];
            }
            return STAGES.map((s) => {
                const min = 150 * stepCount + 12 * Math.pow(stepCount, 3);
                stepCount++;
                return { title: `${r.title}${s}`, min, color: r.color, glow: r.glow };
            });
        });

        // ==========================================
        // 主要 React 元件
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [allUsers, setAllUsers] = useState([]);
            const [words, setWords] = useState([]);
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState(null);

            // --- 裁切狀態 ---
            const [cropSource, setCropSource] = useState(null);
            const [cropPos, setCropPos] = useState({ x: 0, y: 0, zoom: 1 });
            const [isDragging, setIsDragging] = useState(false);
            const [lastTouch, setLastTouch] = useState(null);

            // --- 挑戰狀態 ---
            const [currentChallenge, setCurrentChallenge] = useState(null);
            const [challengeResult, setChallengeResult] = useState(null);
            const [showAnswer, setShowAnswer] = useState(false);
            const [pendingAnswer, setPendingAnswer] = useState(null); // 'know' | 'forget' | null

            // --- 拼寫狀態 ---
            const [spellWord, setSpellWord] = useState(null);
            const [spellInput, setSpellInput] = useState("");
            const [spellResult, setSpellResult] = useState(null);

            // --- 後台管理 ---
            const [adminMode, setAdminMode] = useState(false);

            // 通知系統
            const notify = (text, type = "info") => {
                setMessage({ text, type });
                setTimeout(() => setMessage(null), 3500);
            };

            // 初始化 Auth
            useEffect(() => {
                signInAnonymously(auth).catch(e => {
                    console.error("Auth Error", e);
                    notify("伺服器連線異常，請檢查金鑰設定", "error");
                    setLoading(false);
                });
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) setView('login');
                });
                return () => unsub();
            }, []);

            // 資料監聽
            useEffect(() => {
                if (!user) return;
                const uRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'users');
                const wRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'words');

                const unsubU = onSnapshot(uRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllUsers(list.sort((a, b) => (b.points || 0) - (a.points || 0)));
                    const savedId = localStorage.getItem('active_hero_id');
                    const found = list.find(h => h.id === savedId);
                    if (found) {
                        setProfile(found);
                        if (view === 'login') setView('dash');
                    }
                    setLoading(false);
                });

                const unsubW = onSnapshot(wRef, (snap) => {
                    setWords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubU(); unsubW(); };
            }, [user, view]);

            // --- 核心邏輯 ---

            // 頭貼處理
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setCropSource(ev.target.result);
                    setCropPos({ x: 0, y: 0, zoom: 1 });
                    setView('crop');
                };
                reader.readAsDataURL(file);
            };

            const finalizeCrop = async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 300; canvas.height = 300;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = async () => {
                    const size = 300 / cropPos.zoom;
                    ctx.fillStyle = "#020617"; ctx.fillRect(0,0,300,300);
                    ctx.beginPath(); ctx.arc(150, 150, 150, 0, Math.PI * 2); ctx.clip();
                    ctx.drawImage(img, img.width/2 - size/2 - cropPos.x/cropPos.zoom, img.height/2 - size/2 - cropPos.y/cropPos.zoom, size, size, 0, 0, 300, 300);
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    
                    if (profile) {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', profile.id), { avatar: base64 });
                        notify("靈像煉化成功", "success");
                    } else {
                        localStorage.setItem('temp_avatar', base64);
                        notify("元神已暫存", "success");
                    }
                    setView(profile ? 'dash' : 'login');
                };
                img.src = cropSource;
            };

            // 開始每日挑戰 (亂數洗牌)
            const startChallenge = (isBonus = false) => {
                const today = new Date().toLocaleDateString();
                const attempts = profile.lastPlayed === today ? (profile.todayAttempts || 0) : 0;
                
                if (!isBonus && attempts >= 3) {
                    return notify("今日三輪修煉已畢，請進入練功房。");
                }
                if (words.length < 5) return notify("字庫空虛，請掌門匯入法寶。");

                const pool = [...words].sort(() => 0.5 - Math.random()).slice(0, 10);
                setCurrentChallenge({ words: pool, currentIndex: 0, mistakes: [], isBonus, isRevive: false });
                setChallengeResult(null); 
                setShowAnswer(false);
                setPendingAnswer(null);
                setView('challenge');
            };

            const confirmAnswer = () => {
                if (!pendingAnswer) return;
                const correct = pendingAnswer === 'know';
                const cur = currentChallenge;
                const mistakes = correct ? cur.mistakes : [...cur.mistakes, cur.words[cur.currentIndex]];
                
                if (cur.currentIndex < cur.words.length - 1) {
                    setCurrentChallenge({ ...cur, currentIndex: cur.currentIndex + 1, mistakes });
                    setShowAnswer(false);
                    setPendingAnswer(null);
                } else {
                    finishChallenge(mistakes);
                }
            };

            const finishChallenge = async (mistakes) => {
                const isPerfect = mistakes.length === 0;
                const today = new Date().toLocaleDateString();
                
                // 轉世加成演算
                const multiplier = 1 + (profile.rebornCount || 0) * 0.5;
                const gain = currentChallenge.isRevive ? (isPerfect ? 100 : 0) : Math.floor((isPerfect ? 500 : 100) * multiplier);
                
                const newAttempts = (currentChallenge.isBonus || currentChallenge.isRevive) ? profile.todayAttempts : (profile.lastPlayed === today ? (profile.todayAttempts || 0) + 1 : 1);
                
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', profile.id), {
                    points: (profile.points || 0) + gain,
                    todayAttempts: newAttempts,
                    lastPlayed: today
                });

                setChallengeResult({ 
                    mistakes, 
                    isPerfect, 
                    // 只有正式挑戰錯 1~3 題才能敗部復活
                    canRevive: !currentChallenge.isRevive && mistakes.length > 0 && mistakes.length <= 3, 
                    canContinue: isPerfect && newAttempts < 3 && !currentChallenge.isRevive
                });
            };

            // 拼寫特訓
            const startSpell = () => {
                if (words.length === 0) return notify("字庫空虛");
                const randomWord = words[Math.floor(Math.random() * words.length)];
                setSpellWord(randomWord);
                setSpellInput("");
                setSpellResult(null);
                setView('spell');
            };

            const checkSpell = () => {
                if (!spellWord) return;
                const isCorrect = spellInput.trim().toLowerCase() === spellWord.word.trim().toLowerCase();
                setSpellResult(isCorrect);
                if (isCorrect) {
                    updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', profile.id), {
                        points: (profile.points || 0) + 50
                    });
                }
            };

            // 轉世重修
            const handleRebirth = async () => {
                if(confirm("【散功重修】\n確定要施展嫁衣神功嗎？當前修為將全數歸零，但每次轉世將永久獲得 50% 積分獲取加成！")) {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', profile.id), {
                        points: 0,
                        rebornCount: (profile.rebornCount || 0) + 1
                    });
                    notify("破後而立！散功重修成功！", "success");
                }
            };

            // 計算目前境界
            const currentRank = useMemo(() => {
                if (!profile) return ALL_RANKS[0];
                return [...ALL_RANKS].reverse().find(r => (profile.points || 0) >= r.min) || ALL_RANKS[0];
            }, [profile]);


            // --- 共用 UI 元件 ---
            const Btn = ({ children, onClick, color="purple", disabled=false, className="" }) => {
                const styles = {
                    purple: "bg-gradient-to-br from-purple-600 to-indigo-800 shadow-purple-500/30 text-white",
                    gold: "bg-gradient-to-br from-amber-400 to-orange-600 shadow-orange-500/30 text-white",
                    red: "bg-gradient-to-br from-red-500 to-pink-800 shadow-red-500/30 text-white",
                    green: "bg-gradient-to-br from-emerald-500 to-teal-800 shadow-teal-500/30 text-white",
                    gray: "bg-gradient-to-br from-slate-700 to-slate-900 shadow-black/50 text-slate-300 border border-slate-600",
                    outline: "border-2 border-slate-600 text-slate-300 hover:bg-slate-800"
                };
                return (
                    <button disabled={disabled} onClick={onClick} className={`px-6 py-4 rounded-2xl font-bold transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100 shadow-lg ${styles[color]} ${className}`}>
                        {children}
                    </button>
                );
            };

            // ==========================================
            // 頁面渲染
            // ==========================================
            if (loading) return <div className="h-screen flex items-center justify-center text-4xl text-purple-500 animate-pulse">🌌 仙界連結中...</div>;

            return (
                <div className="relative min-h-screen pb-10">
                    {/* 動態背景與通知 */}
                    <div className="fixed inset-0 pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-purple-900/20 blur-[120px] rounded-full animate-pulse" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-blue-900/20 blur-[120px] rounded-full" />
                    </div>

                    {message && (
                        <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl shadow-2xl font-bold text-white transition-all animate-bounce ${message.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                            {message.text}
                        </div>
                    )}

                    <main className="relative z-10 max-w-2xl mx-auto p-4 md:p-6 space-y-6">

                        {/* ================= 登入 / 註冊 ================= */}
                        {view === 'login' && (
                            <div className="flex flex-col items-center justify-center py-10 space-y-10 animate-in fade-in">
                                <div className="text-center space-y-2">
                                    <h1 className="text-6xl font-black bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-amber-300 drop-shadow-lg" style={{ fontFamily: 'serif' }}>仙逆單字傳</h1>
                                    <p className="text-slate-500 tracking-[0.5em] text-sm uppercase">Nirvana · Rebirth</p>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4 w-full px-2">
                                    {allUsers.map(hero => (
                                        <div key={hero.id} onClick={() => {
                                            const p = prompt("請輸入修士密碼：");
                                            if (p === hero.password) {
                                                localStorage.setItem('active_hero_id', hero.id);
                                                setProfile(hero);
                                                setView('dash');
                                            } else notify("神魂不符，密碼錯誤！", "error");
                                        }} className="glass-panel p-4 rounded-3xl cursor-pointer hover:border-purple-500 transition-all text-center group">
                                            <div className="w-20 h-20 mx-auto rounded-2xl overflow-hidden bg-slate-800 mb-3 border border-white/10 group-hover:scale-105 transition-transform">
                                                {hero.avatar ? <img src={hero.avatar} className="w-full h-full object-cover" /> : <div className="flex h-full items-center justify-center text-3xl">👤</div>}
                                            </div>
                                            <p className="font-bold text-lg">{hero.name}</p>
                                        </div>
                                    ))}
                                    <div onClick={() => setView('create')} className="glass-panel border-dashed p-4 rounded-3xl cursor-pointer flex flex-col items-center justify-center text-slate-500 hover:text-purple-400 hover:border-purple-400 transition-all">
                                        <div className="text-4xl mb-2">+</div>
                                        <p className="text-sm font-bold">凝聚元神</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'create' && (
                            <div className="glass-panel p-6 rounded-3xl max-w-sm mx-auto animate-in slide-in-from-bottom">
                                <h2 className="text-2xl font-bold mb-6 text-center text-purple-300">修士登記</h2>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const id = crypto.randomUUID();
                                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', id), {
                                        name: e.target.heroName.value,
                                        password: e.target.heroPwd.value,
                                        avatar: localStorage.getItem('temp_avatar') || "",
                                        points: 0, rebornCount: 0, todayAttempts: 0, lastPlayed: ""
                                    });
                                    localStorage.setItem('active_hero_id', id);
                                    localStorage.removeItem('temp_avatar');
                                    setView('dash');
                                    notify("初入仙途，請多指教", "success");
                                }} className="space-y-6">
                                    <div className="flex justify-center">
                                        <label className="relative cursor-pointer">
                                            <div className="w-28 h-28 rounded-full bg-slate-800 border-2 border-purple-500/50 overflow-hidden">
                                                 {localStorage.getItem('temp_avatar') ? <img src={localStorage.getItem('temp_avatar')} className="w-full h-full object-cover" /> : <div className="flex h-full items-center justify-center text-3xl">📸</div>}
                                            </div>
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                                        </label>
                                    </div>
                                    <input name="heroName" required placeholder="修士名號" className="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3 text-white outline-none focus:border-purple-500" />
                                    <input name="heroPwd" required type="password" placeholder="登入密碼" className="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3 text-white outline-none focus:border-purple-500" />
                                    <div className="flex gap-3">
                                        <Btn color="gray" className="flex-1" onClick={() => setView('login')}>返回</Btn>
                                        <Btn color="purple" className="flex-1" type="submit">確認註冊</Btn>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* ================= 頭貼裁切 ================= */}
                        {view === 'crop' && (
                            <div className="fixed inset-0 z-[300] bg-[#020617] flex flex-col items-center justify-center p-6">
                                <h2 className="text-2xl font-bold mb-8 text-purple-400">煉化靈像</h2>
                                <div 
                                    className="relative w-80 h-80 rounded-full border-4 border-purple-500/50 overflow-hidden touch-none select-none bg-black"
                                    onMouseDown={() => setIsDragging(true)} onMouseUp={() => setIsDragging(false)} onMouseLeave={() => setIsDragging(false)}
                                    onMouseMove={(e) => isDragging && setCropPos(p => ({ ...p, x: p.x + e.movementX, y: p.y + e.movementY }))}
                                    onTouchStart={(e) => setLastTouch({ x: e.touches[0].clientX, y: e.touches[0].clientY })}
                                    onTouchMove={(e) => {
                                        if (lastTouch) {
                                            setCropPos(p => ({ ...p, x: p.x + (e.touches[0].clientX - lastTouch.x), y: p.y + (e.touches[0].clientY - lastTouch.y) }));
                                            setLastTouch({ x: e.touches[0].clientX, y: e.touches[0].clientY });
                                        }
                                    }}
                                    onTouchEnd={() => setLastTouch(null)}
                                >
                                    <img src={cropSource} className="absolute pointer-events-none max-w-none origin-center" style={{ transform: `translate(${cropPos.x}px, ${cropPos.y}px) scale(${cropPos.zoom})`, top: '50%', left: '50%', marginLeft: '-50%', marginTop: '-50%', width: '100%' }} />
                                </div>
                                <div className="w-full max-w-xs mt-10 space-y-8">
                                    <input type="range" min="0.5" max="3" step="0.01" value={cropPos.zoom} onChange={(e) => setCropPos(p => ({ ...p, zoom: parseFloat(e.target.value) }))} className="w-full accent-purple-500" />
                                    <div className="flex gap-4">
                                        <Btn color="gray" className="flex-1" onClick={() => setView(profile ? 'dash' : 'login')}>取消</Btn>
                                        <Btn color="gold" className="flex-1" onClick={finalizeCrop}>確定裁切</Btn>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= 主堡大廳 ================= */}
                        {profile && view === 'dash' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="glass-panel rounded-3xl p-6 relative overflow-hidden">
                                    <div className="flex items-center gap-6">
                                        <div className="relative cursor-pointer" onClick={() => { if(profile.avatar){ setCropSource(profile.avatar); setCropPos({x:0,y:0,zoom:1}); setView('crop'); } }}>
                                            <div className="w-24 h-24 rounded-2xl border-2 border-purple-500/50 overflow-hidden shadow-lg">
                                                {profile.avatar ? <img src={profile.avatar} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-slate-800" />}
                                            </div>
                                            <div className="absolute -bottom-2 -right-2 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-[10px]">更換</div>
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between items-start">
                                                <h3 className="text-3xl font-black text-white">{profile.name}</h3>
                                                <button onClick={() => setView('library')} className="text-xl opacity-70 hover:opacity-100">⚙️</button>
                                            </div>
                                            <div className="flex items-center gap-2 mt-2">
                                                <span className={`px-3 py-1 rounded-full text-[10px] font-bold border ${currentRank.glow ? 'animate-pulse' : ''}`} style={{ borderColor: currentRank.color, color: currentRank.color, backgroundColor: `${currentRank.color}20` }}>
                                                    {currentRank.title}
                                                </span>
                                                <span className="text-xs text-slate-400 font-mono">修為: {profile.points?.toLocaleString()}</span>
                                            </div>
                                        </div>
                                        {profile.rebornCount > 0 && (
                                            <div className="text-right">
                                                <div className="text-4xl font-black text-amber-400">{profile.rebornCount}</div>
                                                <div className="text-[10px] text-slate-500">轉世印記</div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div onClick={() => startChallenge()} className="glass-panel p-6 rounded-3xl text-center cursor-pointer hover:bg-white/5 transition-all">
                                        <div className="text-4xl mb-2">⚔️</div>
                                        <h4 className="font-bold text-lg text-purple-300">每日修煉</h4>
                                        <p className="text-[10px] text-slate-500 mt-1">輪次: {profile.lastPlayed === new Date().toLocaleDateString() ? profile.todayAttempts || 0 : 0}/3</p>
                                    </div>
                                    <div onClick={() => startSpell()} className="glass-panel p-6 rounded-3xl text-center cursor-pointer hover:bg-white/5 transition-all">
                                        <div className="text-4xl mb-2">⌨️</div>
                                        <h4 className="font-bold text-lg text-amber-300">拼寫特訓</h4>
                                        <p className="text-[10px] text-slate-500 mt-1">看中寫英</p>
                                    </div>
                                    <div onClick={() => setView('lobby')} className="glass-panel p-6 rounded-3xl text-center cursor-pointer hover:bg-white/5 transition-all col-span-2">
                                        <div className="text-3xl mb-2">🏆 仙界榜單</div>
                                        <p className="text-[10px] text-slate-500">查看英雄排名</p>
                                    </div>
                                </div>

                                {(profile.points || 0) >= 10000 && (
                                    <Btn color="red" className="w-full text-lg" onClick={handleRebirth}>🔥 嫁衣神功 (散功重修 +加成)</Btn>
                                )}

                                <Btn color="outline" className="w-full" onClick={() => { localStorage.removeItem('active_hero_id'); setProfile(null); setView('login'); }}>🚪 退出仙堡</Btn>
                            </div>
                        )}

                        {/* ================= 戰鬥挑戰 ================= */}
                        {view === 'challenge' && currentChallenge && (
                            <div className="space-y-6 animate-in slide-in-from-right">
                                <div className="flex items-center gap-4 px-2">
                                    <div className="h-1.5 flex-1 bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-gradient-to-r from-purple-500 to-indigo-500 transition-all duration-300" style={{ width: `${((currentChallenge.currentIndex) / currentChallenge.words.length) * 100}%` }} />
                                    </div>
                                    <span className="text-xs font-mono text-slate-500">{currentChallenge.currentIndex + 1}/{currentChallenge.words.length}</span>
                                </div>

                                <div className="glass-panel rounded-3xl p-8 min-h-[300px] flex flex-col items-center justify-center text-center relative">
                                    <span className="absolute top-4 left-4 text-[10px] font-bold text-purple-400 tracking-widest uppercase">
                                        {currentChallenge.isRevive ? '💀 敗部復活' : '修煉本源'}
                                    </span>
                                    <h2 className="text-6xl font-black text-white my-8">{currentChallenge.words[currentChallenge.currentIndex].word}</h2>
                                    
                                    {showAnswer && (
                                        <div className="w-full pt-8 border-t border-white/10 animate-in fade-in">
                                            <p className="text-3xl font-bold text-amber-400 mb-2">{currentChallenge.words[currentChallenge.currentIndex].chinese}</p>
                                            <p className="text-sm text-slate-400 italic">{currentChallenge.words[currentChallenge.currentIndex].type}</p>
                                        </div>
                                    )}
                                </div>

                                {!challengeResult ? (
                                    <div className="space-y-4">
                                        {!showAnswer ? (
                                            <Btn color="purple" className="w-full text-xl h-20" onClick={() => setShowAnswer(true)}>翻開玉簡 (看答案)</Btn>
                                        ) : (
                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <button onClick={() => setPendingAnswer('forget')} className={`p-4 rounded-2xl font-bold text-lg border-2 transition-all ${pendingAnswer === 'forget' ? 'bg-red-500/30 border-red-500 text-white' : 'bg-red-500/5 border-red-500/30 text-red-400 hover:bg-red-500/10'}`}>
                                                        遺忘 (Forget)
                                                    </button>
                                                    <button onClick={() => setPendingAnswer('know')} className={`p-4 rounded-2xl font-bold text-lg border-2 transition-all ${pendingAnswer === 'know' ? 'bg-emerald-500/30 border-emerald-500 text-white' : 'bg-emerald-500/5 border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/10'}`}>
                                                        精熟 (Know)
                                                    </button>
                                                </div>
                                                {/* 強制下一題按鈕防誤觸 */}
                                                <Btn color="purple" className="w-full text-lg" disabled={!pendingAnswer} onClick={confirmAnswer}>
                                                    下一題 ➔
                                                </Btn>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="glass-panel p-8 rounded-3xl text-center space-y-8 animate-in zoom-in">
                                        <h3 className="text-4xl font-black text-amber-400">{challengeResult.isPerfect ? "✨ 圓滿通關 ✨" : "修行結束"}</h3>
                                        <p className="text-slate-400">失誤: {challengeResult.mistakes.length} 題</p>
                                        
                                        <div className="flex flex-col gap-4">
                                            {challengeResult.canRevive && (
                                                <Btn color="red" onClick={() => {
                                                    setCurrentChallenge({...currentChallenge, words: challengeResult.mistakes, currentIndex: 0, mistakes: [], isRevive: true});
                                                    setChallengeResult(null); setShowAnswer(false); setPendingAnswer(null);
                                                }}>進入敗部復活戰</Btn>
                                            )}
                                            {challengeResult.canContinue && (
                                                <Btn color="green" onClick={() => startChallenge(true)}>挑戰下一組 (Bonus)</Btn>
                                            )}
                                            <Btn color="outline" onClick={() => setView('dash')}>返回主堡</Btn>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ================= 拼寫特訓 ================= */}
                        {view === 'spell' && spellWord && (
                            <div className="space-y-6 animate-in slide-in-from-bottom">
                                <div className="glass-panel rounded-3xl p-8 text-center space-y-6">
                                    <h3 className="text-purple-400 font-bold text-sm">拼寫特訓</h3>
                                    <p className="text-4xl font-bold text-amber-400">{spellWord.chinese}</p>
                                    <p className="text-slate-400 italic">{spellWord.type}</p>
                                    
                                    <input 
                                        type="text" 
                                        value={spellInput}
                                        onChange={(e) => setSpellInput(e.target.value)}
                                        placeholder="輸入英文..."
                                        disabled={spellResult !== null}
                                        className="w-full bg-black/40 border-2 border-slate-700 rounded-2xl px-6 py-4 text-2xl text-center text-white focus:border-purple-500 outline-none transition-all font-mono"
                                        autoFocus
                                    />

                                    {spellResult !== null && (
                                        <div className={`p-4 rounded-xl font-bold text-xl animate-in zoom-in ${spellResult ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                                            {spellResult ? '✨ 正確！修為 +50' : `❌ 錯誤，解答：${spellWord.word}`}
                                        </div>
                                    )}
                                </div>
                                
                                <div className="flex flex-col gap-4">
                                    {spellResult === null ? (
                                        <Btn color="purple" className="w-full text-xl" onClick={checkSpell}>驗證</Btn>
                                    ) : (
                                        <Btn color="gold" className="w-full text-xl" onClick={startSpell}>下一題</Btn>
                                    )}
                                    <Btn color="outline" className="w-full" onClick={() => setView('dash')}>返回主堡</Btn>
                                </div>
                            </div>
                        )}

                        {/* ================= 仙界榜單 ================= */}
                        {view === 'lobby' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-3xl font-black text-white">仙界榜單</h2>
                                    <Btn color="outline" className="py-2 px-4" onClick={() => setView('dash')}>返回</Btn>
                                </div>
                                <div className="space-y-4">
                                    {allUsers.map((h, i) => {
                                        const r = [...ALL_RANKS].reverse().find(x => (h.points||0) >= x.min) || ALL_RANKS[0];
                                        return (
                                            <div key={h.id} className={`glass-panel p-4 rounded-3xl flex items-center gap-4 ${h.id === profile?.id ? 'border-purple-500 bg-purple-500/10' : ''}`}>
                                                <div className="w-8 text-center font-black text-slate-500 italic text-xl">#{i+1}</div>
                                                <div className="w-14 h-14 rounded-xl overflow-hidden bg-slate-800">
                                                    {h.avatar && <img src={h.avatar} className="w-full h-full object-cover" />}
                                                </div>
                                                <div className="flex-1">
                                                    <p className="font-bold text-lg">{h.name}</p>
                                                    <p className="text-[10px] font-bold" style={{color: r.color}}>{r.title} {h.rebornCount ? `· ${h.rebornCount}轉` : ''}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-amber-400 font-mono font-bold text-xl">{h.points?.toLocaleString()}</p>
                                                    <p className="text-[8px] text-slate-500 uppercase">Points</p>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {/* ================= 藏經閣 (管理員) ================= */}
                        {view === 'library' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-3xl font-black text-white">家長設定</h2>
                                    <Btn color="outline" className="py-2 px-4" onClick={() => setView('dash')}>返回</Btn>
                                </div>
                                
                                {!adminMode ? (
                                    <div className="text-center py-20">
                                        <Btn color="purple" onClick={() => { if(prompt("密碼(預設123456)：")==='123456') setAdminMode(true); else notify("密碼錯誤","error"); }}>解鎖掌門權限</Btn>
                                    </div>
                                ) : (
                                    <div className="space-y-6 pb-10">
                                        <div className="glass-panel p-6 rounded-3xl space-y-4">
                                            <h4 className="font-bold text-amber-400 border-b border-white/10 pb-2">CSV 批次匯入防重複</h4>
                                            <textarea id="csvIn" placeholder="單字 中文 詞性 (一行一個)" className="w-full h-32 bg-black/50 border border-slate-700 rounded-xl p-3 text-sm text-slate-300 font-mono outline-none focus:border-amber-500" />
                                            <div className="flex gap-2">
                                                <Btn color="gold" className="flex-1 text-sm py-3" onClick={async () => {
                                                    const text = document.getElementById('csvIn').value;
                                                    const lines = text.split('\n');
                                                    let count = 0;
                                                    for (let l of lines) {
                                                        const p = l.split(/[,\s\t]+/);
                                                        if (p.length >= 2) {
                                                            // 防重複比對
                                                            if (!words.some(w => w.word.toLowerCase() === p[0].toLowerCase())) {
                                                                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'words'), { word: p[0], chinese: p[1], type: p[2] || "n." });
                                                                count++;
                                                            }
                                                        }
                                                    }
                                                    notify(`成功新增 ${count} 筆單字！`, "success");
                                                }}>匯入單字</Btn>
                                                <Btn color="red" className="flex-1 text-sm py-3" onClick={async () => {
                                                    if (confirm("【核彈警告】確定清空所有單字？")) {
                                                        for (let w of words) await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'words', w.id));
                                                        notify("字庫已清空", "success");
                                                    }
                                                }}>核彈清空</Btn>
                                            </div>
                                        </div>

                                        <div className="glass-panel p-6 rounded-3xl space-y-4">
                                            <h4 className="font-bold text-purple-400 border-b border-white/10 pb-2">修士管理</h4>
                                            <div className="space-y-2">
                                                {allUsers.map(u => (
                                                    <div key={u.id} className="flex justify-between items-center bg-black/30 p-3 rounded-xl border border-white/5">
                                                        <span className="font-bold text-sm">{u.name} (修為: {u.points})</span>
                                                        <div className="flex gap-2">
                                                            <button className="text-xs text-blue-400 hover:text-blue-300" onClick={() => {
                                                                const p = prompt("新密碼：");
                                                                if(p) updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', u.id), { password: p });
                                                            }}>改密碼</button>
                                                            <button className="text-xs text-red-400 hover:text-red-300" onClick={() => {
                                                                if(confirm(`刪除 ${u.name}？`)) deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', u.id));
                                                            }}>逐出</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        // 啟動 React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
