<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天逆珠・仙逆單字傳 (雲端同步版)</title>
    
    <!-- PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <!-- 字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --gold: #facc15;
            --deep-slate: #020617;
            --glass: rgba(15, 23, 42, 0.85);
        }
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--deep-slate);
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
        }
        .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
        }
        .gold-text {
            background: linear-gradient(135deg, #fef08a 0%, #ca8a04 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));
        }
        .soul-tablet {
            border-left: 4px solid rgba(250, 204, 21, 0.2);
            transition: all 0.3s ease;
        }
        .soul-tablet:hover {
            border-left-color: var(--gold);
            background: rgba(30, 41, 59, 0.6);
            transform: translateX(5px);
        }
        .bead-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 90vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
            z-index: -1;
            animation: rotate-bead 150s linear infinite;
        }
        @keyframes rotate-bead { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .avatar-box { width: 160px; height: 160px; border-radius: 50%; overflow: hidden; border: 3px solid var(--gold); position: relative; }
        .avatar-img { position: absolute; max-width: none; cursor: move; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // ==========================================
        // 【仙界通道：Firebase 配置專區】
        // 請填入您在 Firebase Console 申請的 API 密鑰
        // ==========================================
        const firebaseConfig = {
           apiKey: "AIzaSyAtvZjyKKRsfbbRPt-OI85isFuua6EV1YQ",
  authDomain: "vocab-2000.firebaseapp.com",
  projectId: "vocab-2000",
  storageBucket: "vocab-2000.firebasestorage.app",
  messagingSenderId: "459452518715",
  appId: "1:459452518715:web:2842926df8a8d73831a71e"
        };

        // 初始化 Firebase (若未填寫則僅運作於本地)
        let db = null;
        try {
            if (firebaseConfig.apiKey.includes("請填入") === false) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("✅ 已成功連接仙界 (Firebase Connected)");
            }
        } catch (e) {
            console.warn("⚠️ 仙界通道未開啟，目前正處於凡間修煉模式 (Local Mode)");
        }

        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // 1. 境界數據 (比照《仙逆》正統體系)
        // ==========================================
        const SUB_STAGES = ["初期", "中期", "後期", "後期巔峰", "圓滿"];
        const QI_STAGES = Array.from({ length: 15 }, (_, i) => `${i + 1}層`);
        const BASE_STAGES = ["初期", "中期", "後期", "後期巔峰", "圓滿", "假丹"];
        const CORE_STAGES = ["初期", "中期", "後期", "後期巔峰", "圓滿", "假嬰"];

        const REALM_MAP = [
            { name: "凡人", stages: ["一介凡夫"], color: "text-slate-400" },
            { name: "凝氣", stages: QI_STAGES, color: "text-emerald-400" },
            { name: "築基", stages: BASE_STAGES, color: "text-blue-400" },
            { name: "結丹", stages: CORE_STAGES, color: "text-purple-400" },
            { name: "元嬰", stages: SUB_STAGES, color: "text-pink-400" },
            { name: "化神", stages: SUB_STAGES, color: "text-orange-400" },
            { name: "嬰變", stages: SUB_STAGES, color: "text-rose-500" },
            { name: "問鼎", stages: SUB_STAGES, color: "text-amber-500" },
            { name: "陰虛", stages: SUB_STAGES, color: "text-indigo-500" },
            { name: "陽實", stages: SUB_STAGES, color: "text-yellow-500" },
            { name: "窺涅", stages: SUB_STAGES, color: "text-cyan-400" },
            { name: "淨涅", stages: SUB_STAGES, color: "text-sky-400" },
            { name: "碎涅", stages: SUB_STAGES, color: "text-indigo-400" },
            { name: "空涅", stages: SUB_STAGES, color: "text-blue-600" },
            { name: "空靈", stages: SUB_STAGES, color: "text-purple-600" },
            { name: "空玄", stages: SUB_STAGES, color: "text-rose-600" },
            { name: "空劫", stages: ["大尊初期", "大尊中期", "大尊後期", "金尊", "天尊", "躍天尊"], color: "text-red-700" },
            { name: "半步踏天", stages: ["第一橋", "第二橋", "第三橋", "第四橋", "第五橋", "第六橋", "第七橋", "第八橋"], color: "text-yellow-500" },
            { name: "踏天境", stages: ["第九橋(永恆)"], color: "text-yellow-200 font-black" }
        ];

        const ALL_SUB_REALMS = REALM_MAP.flatMap(r => r.stages.map(s => ({ realm: r.name, sub: s, color: r.color })));

        // ==========================================
        // 2. 智慧分類與經驗邏輯
        // ==========================================
        const guessCategory = (zh) => {
            const keywords = {
                "動作": ["走", "看", "聽", "說", "跑", "跳", "打", "取", "動", "修"],
                "情緒": ["喜", "怒", "哀", "樂", "悲", "驚", "憂", "恐", "愛", "恨"],
                "天氣": ["風", "雨", "雷", "電", "雲", "霧", "雪", "晴", "陰", "氣"],
                "金融": ["錢", "金", "幣", "買", "賣", "寶", "費", "財", "稅"],
                "物品": ["桌", "椅", "筆", "書", "劍", "器", "具", "物", "丹"],
                "動物": ["虎", "狼", "龍", "鳳", "鳥", "獸", "馬", "羊", "犬"],
                "植物": ["花", "草", "樹", "林", "木", "葉", "果", "藥"]
            };
            for (let cat in keywords) { if (keywords[cat].some(k => zh.includes(k))) return cat; }
            return "其他類別";
        };

        const getExpForLevel = (idx) => {
            if (idx < 15) return 100 + idx * 20; 
            return Math.floor(200 * Math.pow(1.15, idx - 14) + 10 * Math.pow(idx, 2.2));
        };

        const getRealmInfo = (exp) => {
            let total = 0;
            for (let i = 0; i < ALL_SUB_REALMS.length; i++) {
                const req = getExpForLevel(i);
                if (exp < total + req) return { ...ALL_SUB_REALMS[i], index: i, next: total + req, start: total };
                total += req;
            }
            return { ...ALL_SUB_REALMS[ALL_SUB_REALMS.length - 1], index: ALL_SUB_REALMS.length - 1, next: Infinity, start: total };
        };

        // ==========================================
        // 3. 主應用程式 (整合 Cloud Sync)
        // ==========================================
        const App = () => {
            const [view, setView] = useState('gate'); 
            const [users, setUsers] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [words, setWords] = useState([]);
            const [batches, setBatches] = useState([]);
            const [settings, setSettings] = useState({
                maxRounds: 3, qPerRound: 10, maxErrRes: 3, adminPw: "123456"
            });

            // 初始加載：先從本地拿，再嘗試連雲端
            useEffect(() => {
                const localUsers = JSON.parse(localStorage.getItem('sn_users') || '[]');
                const localWords = JSON.parse(localStorage.getItem('sn_words') || '[]');
                const localBatches = JSON.parse(localStorage.getItem('sn_batches') || '[]');
                const localSettings = JSON.parse(localStorage.getItem('sn_settings') || '{}');

                setUsers(localUsers);
                setWords(localWords);
                setBatches(localBatches);
                if(localSettings.adminPw) setSettings(localSettings);

                // 雲端同步：獲取最新的修士名單與單字
                if (db) {
                    db.collection("global").doc("data").onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            if(data.words) setWords(data.words);
                            if(data.batches) setBatches(data.batches);
                            if(data.settings) setSettings(data.settings);
                        }
                    });
                    db.collection("users").onSnapshot(snap => {
                        const cloudUsers = snap.docs.map(d => d.data());
                        if(cloudUsers.length > 0) setUsers(cloudUsers);
                    });
                }
            }, []);

            // 資料同步：本地備份 + 雲端更新
            const syncData = (newUsers, newWords, newBatches, newSettings) => {
                if(newUsers) { setUsers(newUsers); localStorage.setItem('sn_users', JSON.stringify(newUsers)); }
                if(newWords) { setWords(newWords); localStorage.setItem('sn_words', JSON.stringify(newWords)); }
                if(newBatches) { setBatches(newBatches); localStorage.setItem('sn_batches', JSON.stringify(newBatches)); }
                if(newSettings) { setSettings(newSettings); localStorage.setItem('sn_settings', JSON.stringify(newSettings)); }

                if (db) {
                    if(newWords || newBatches || newSettings) {
                        db.collection("global").doc("data").set({
                            words: newWords || words,
                            batches: newBatches || batches,
                            settings: newSettings || settings
                        }, { merge: true });
                    }
                    if(newUsers) {
                        newUsers.forEach(u => db.collection("users").doc(u.name).set(u));
                    }
                }
            };

            // 視圖切換邏輯
            const renderContent = () => {
                switch(view) {
                    case 'gate': return <HallOfSoul tablets={users} setView={setView} setLoginUser={setCurrentUser} />;
                    case 'register': return <Registration setView={setView} addUser={(u) => syncData([...users, u])} />;
                    case 'home': return <Home user={currentUser} settings={settings} setView={setView} setUser={setCurrentUser} onUpdate={(u) => syncData(users.map(x => x.name === u.name ? u : x))} />;
                    case 'battle': return <TrialView words={words} settings={settings} user={currentUser} setUser={setCurrentUser} setView={setView} onUpdate={(u) => syncData(users.map(x => x.name === u.name ? u : x))} />;
                    case 'training': return <Training words={words} user={currentUser} setView={setView} />;
                    case 'admin': return <AdminPanel settings={settings} setSettings={(s)=>syncData(null,null,null,s)} words={words} setWords={(w)=>syncData(null,w,null,null)} batches={batches} setBatches={(b)=>syncData(null,null,b,null)} setView={setView} users={users} setUsers={(u)=>syncData(u)} />;
                    default: return <div>加載中...</div>;
                }
            };

            return (
                <div className="relative min-h-screen">
                    <div className="bead-bg"></div>
                    <div className="relative z-10 max-w-md mx-auto min-h-screen flex flex-col">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. 子組件：仙魂碑 (Hall of Soul)
        // ==========================================
        const HallOfSoul = ({ tablets, setView, setLoginUser }) => {
            const [pwIn, setPwIn] = useState("");
            const [target, setTarget] = useState(null);

            const login = () => {
                if (pwIn === target.pw) {
                    const today = new Date().toDateString();
                    if (target.stats.lastDate !== today) {
                        target.stats = { ...target.stats, lastDate: today, rounds: 0, spiritCount: 0 };
                    }
                    setLoginUser(target);
                    setView('home');
                } else { alert("神識不匹配！"); }
            };

            return (
                <div className="flex-1 p-6 flex flex-col">
                    <div className="text-center py-10">
                        <h1 className="text-5xl font-calligraphy gold-text">仙魂碑</h1>
                        <p className="text-slate-500 text-xs tracking-widest mt-2">喚醒沉睡的神識進修</p>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-4">
                        {tablets.map((u, i) => {
                            const realm = getRealmInfo(u.exp);
                            return (
                                <div key={i} onClick={() => setTarget(u)} className="soul-tablet glass-panel p-4 rounded-2xl flex items-center space-x-4 cursor-pointer">
                                    <div className="w-12 h-12 rounded-full overflow-hidden border border-yellow-500/30">
                                        <img src={u.avatar.src} className="max-w-none" style={{ transform: `translate(${u.avatar.pos.x/3}px, ${u.avatar.pos.y/3}px) scale(${u.avatar.pos.scale/3})` }} />
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="font-bold">{u.name}</h3>
                                        <p className={`text-[10px] font-black uppercase ${realm.color}`}>{realm.realm} - {realm.sub}</p>
                                    </div>
                                    <span className="text-[10px] text-slate-500">Exp: {u.exp}</span>
                                </div>
                            );
                        })}
                        <button onClick={() => setView('register')} className="w-full py-6 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-500 hover:text-yellow-500 transition-all">
                            <i data-lucide="user-plus" className="mb-1"></i>
                            <span className="text-xs">踏入山門 (註冊修士)</span>
                        </button>
                    </div>
                    {target && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80">
                            <div className="glass-panel w-full max-w-xs p-8 rounded-3xl text-center space-y-6">
                                <h3 className="text-xl font-bold">喚醒 {target.name}</h3>
                                <input type="password" placeholder="輸入神識密語" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center" value={pwIn} onChange={e => setPwIn(e.target.value)} autoFocus />
                                <div className="flex space-x-2">
                                    <button onClick={() => setTarget(null)} className="flex-1 text-slate-500 text-xs">取消</button>
                                    <button onClick={login} className="flex-1 py-3 bg-yellow-600 rounded-xl font-bold text-slate-950">確認</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 5. 子組件：修士註冊 (Registration)
        // ==========================================
        const Registration = ({ setView, addUser }) => {
            const [name, setName] = useState("");
            const [pw, setPw] = useState("");
            const [imgSrc, setImgSrc] = useState(null);
            const [imgPos, setImgPos] = useState({ x: 0, y: 0, scale: 1 });
            const dragging = useRef(false);
            const lastPos = useRef({ x: 0, y: 0 });

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { setImgSrc(ev.target.result); setImgPos({x:0, y:0, scale:1}); };
                    reader.readAsDataURL(file);
                }
            };

            const handleMove = (e) => {
                if (!dragging.current) return;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                setImgPos(p => ({ ...p, x: p.x + (clientX - lastPos.current.x), y: p.y + (clientY - lastPos.current.y) }));
                lastPos.current = { x: clientX, y: clientY };
            };

            const submit = () => {
                if (!name || !pw || !imgSrc) return alert("資料不全！");
                addUser({
                    name, pw, exp: 0, avatar: { src: imgSrc, pos: imgPos },
                    stats: { rounds: 0, spiritCount: 0, lastDate: new Date().toDateString() }
                });
                setView('gate');
            };

            return (
                <div className="flex-1 p-8 flex flex-col items-center justify-center space-y-8">
                    <h2 className="text-3xl font-calligraphy gold-text">初登仙冊</h2>
                    <div className="avatar-box" onMouseDown={e => { dragging.current=true; lastPos.current={x:e.clientX, y:e.clientY}; }} onMouseMove={handleMove} onMouseUp={()=>dragging.current=false} onTouchStart={e=>{ dragging.current=true; lastPos.current={x:e.touches[0].clientX, y:e.touches[0].clientY}; }} onTouchMove={handleMove} onTouchEnd={()=>dragging.current=false}>
                        {imgSrc ? <img src={imgSrc} className="avatar-img" style={{ transform: `translate(${imgPos.x}px, ${imgPos.y}px) scale(${imgPos.scale})` }} draggable="false" /> : <div className="w-full h-full flex items-center justify-center text-slate-700 text-xs">上傳顯像</div>}
                    </div>
                    <div className="flex space-x-2">
                        <input type="file" id="up" hidden onChange={handleFile} accept="image/*" />
                        <label htmlFor="up" className="px-4 py-2 glass-panel rounded-full text-[10px] cursor-pointer">上傳</label>
                        <button onClick={() => setImgPos(p => ({...p, scale: p.scale + 0.1}))} className="w-8 h-8 glass-panel rounded-full">+</button>
                        <button onClick={() => setImgPos(p => ({...p, scale: Math.max(0.1, p.scale - 0.1)}))} className="w-8 h-8 glass-panel rounded-full">-</button>
                    </div>
                    <div className="w-full space-y-4">
                        <input type="text" placeholder="修士道號" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center" value={name} onChange={e => setName(e.target.value)} />
                        <input type="password" placeholder="神識密語" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center" value={pw} onChange={e => setPw(e.target.value)} />
                    </div>
                    <div className="flex space-x-4 w-full">
                        <button onClick={()=>setView('gate')} className="flex-1 text-slate-500">返回</button>
                        <button onClick={submit} className="flex-2 py-4 bg-yellow-600 rounded-xl font-bold text-slate-950 px-8">確認入冊</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. 子組件：主界面 (Home)
        // ==========================================
        const Home = ({ user, settings, setView, setUser, onUpdate }) => {
            const realm = getRealmInfo(user.exp);
            const progress = ((user.exp - realm.start) / (realm.next - realm.start)) * 100;

            return (
                <div className="flex-1 p-6 flex flex-col space-y-6">
                    <div className="flex justify-between items-center mt-4">
                        <div className="flex items-center space-x-3">
                            <div className="w-14 h-14 rounded-full border-2 border-yellow-500 overflow-hidden relative">
                                <img src={user.avatar.src} className="absolute max-w-none" style={{ transform: `translate(${user.avatar.pos.x/3}px, ${user.avatar.pos.y/3}px) scale(${user.avatar.pos.scale/3})` }} />
                            </div>
                            <div>
                                <h2 className="text-xl font-bold">{user.name}</h2>
                                <p className={`text-[10px] font-black ${realm.color}`}>{realm.realm} - {realm.sub}</p>
                            </div>
                        </div>
                        <button onClick={() => setView('admin')} className="p-3 glass-panel rounded-full text-slate-400"><i data-lucide="settings"></i></button>
                    </div>
                    <div className="glass-panel p-6 rounded-3xl space-y-4">
                        <div className="flex justify-between text-[10px] text-slate-500 uppercase tracking-widest">
                            <span>修為進度</span>
                            <span>{user.exp.toLocaleString()} / {realm.next.toLocaleString()}</span>
                        </div>
                        <div className="w-full h-2 bg-slate-900 rounded-full overflow-hidden p-0.5 border border-white/5">
                            <div className="h-full bg-gradient-to-r from-yellow-700 via-yellow-400 to-yellow-600 rounded-full" style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4 text-center">
                        <div className="glass-panel p-4 rounded-2xl"><p className="text-[10px] text-slate-500">今日試煉</p><p className="text-xl font-bold text-emerald-400">{user.stats.rounds} / {settings.maxRounds}</p></div>
                        <div className="glass-panel p-4 rounded-2xl"><p className="text-[10px] text-slate-500">天逆空間</p><p className="text-xl font-bold text-blue-400">{user.stats.spiritCount} / 30</p></div>
                    </div>
                    <div className="space-y-4 flex-1">
                        <button onClick={() => setView('battle')} className="w-full h-24 glass-panel rounded-3xl flex items-center justify-between px-8 hover:border-yellow-500/50 transition-all group">
                            <h3 className="text-xl font-bold gold-text">三輪試煉</h3>
                            <div className="w-12 h-12 bg-yellow-500/10 rounded-full flex items-center justify-center text-yellow-500 group-hover:scale-110 transition-transform"><i data-lucide="sword"></i></div>
                        </button>
                        <button onClick={() => setView('training')} className="w-full h-24 glass-panel rounded-3xl flex items-center justify-between px-8 hover:border-blue-500/50 transition-all group">
                            <h3 className="text-xl font-bold text-blue-400">天逆空間</h3>
                            <div className="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center text-blue-400 group-hover:scale-110 transition-transform"><i data-lucide="zap"></i></div>
                        </button>
                    </div>
                    <button onClick={() => { setView('gate'); setUser(null); }} className="w-full py-4 text-slate-600 text-[10px] tracking-widest uppercase">神魂離體 (登出)</button>
                </div>
            );
        };

        // ==========================================
        // 7. 子組件：三輪試煉 (TrialView)
        // ==========================================
        const TrialView = ({ words, settings, user, setUser, setView, onUpdate }) => {
            const [round, setRound] = useState(1);
            const [step, setStep] = useState(0);
            const [qList, setQList] = useState([]);
            const [wrongs, setWrongs] = useState([]);
            const [resMode, setResMode] = useState(false);
            const [mode, setMode] = useState('choice');
            const [spellIn, setSpellIn] = useState("");
            const [fb, setFb] = useState(null);

            useEffect(() => {
                if (words.length < 10) { alert("單字不足！"); return setView('home'); }
                if (user.stats.rounds >= settings.maxRounds) { alert("今日次數已滿！"); return setView('home'); }
                initRound();
            }, []);

            const initRound = () => {
                const picked = [...words].sort(() => 0.5 - Math.random()).slice(0, settings.qPerRound);
                setQList(picked); setStep(0); setWrongs([]); setResMode(false); setMode(Math.random() > 0.5 ? 'choice' : 'spell');
            };

            const handleAns = (isCorrect) => {
                if (fb) return;
                if (isCorrect) {
                    setFb('ok');
                    user.exp += 15;
                } else {
                    setFb('no');
                    setWrongs(p => [...p, qList[step]]);
                }
                setTimeout(() => {
                    setFb(null); setSpellIn("");
                    if (step + 1 < qList.length) setStep(step + 1);
                    else handleRoundEnd();
                }, 600);
            };

            const handleRoundEnd = () => {
                const errCount = wrongs.length + (fb === 'no' ? 1 : 0);
                if (errCount === 0) {
                    if (round < settings.maxRounds) { alert("圓滿！進入下一輪"); setRound(round+1); initRound(); }
                    else { finish(true); }
                } else if (errCount <= settings.maxErrRes) {
                    alert("復活重生啟動！"); setResMode(true); setQList([...wrongs]); setWrongs([]); setStep(0); setMode('spell');
                } else { alert("失敗！"); finish(false); }
            };

            const finish = (ok) => {
                user.stats.rounds += 1;
                onUpdate(user);
                if (ok) confetti();
                setView('home');
            };

            const cur = qList[step];
            if (!cur) return null;

            return (
                <div className="flex-1 p-6 flex flex-col">
                    <div className="flex justify-between items-center mb-8"><span className="text-xs text-slate-500">輪 {round} - 進度 {step+1}/{qList.length}</span>{resMode && <span className="bg-red-500/20 text-red-500 text-[10px] px-2 py-1 rounded">復活中</span>}</div>
                    <div className="flex-1 flex flex-col items-center justify-center space-y-12">
                        <div className="text-center space-y-2"><p className="text-slate-500 text-xs">{cur.category}</p><h2 className="text-5xl font-bold tracking-tight">{mode === 'choice' ? cur.en : cur.zh}</h2></div>
                        {mode === 'choice' ? (
                            <div className="w-full space-y-3">{words.slice(0, 3).concat(cur).sort(()=>0.5-Math.random()).map((o,i)=>(<button key={i} onClick={()=>handleAns(o.en===cur.en)} className={`w-full py-4 glass-panel rounded-2xl border-2 transition-all ${fb && o.en===cur.en?'border-emerald-500':'border-transparent'}`}>{o.zh}</button>))}</div>
                        ) : (
                            <input autoFocus className="w-full bg-transparent border-b-2 border-slate-700 text-4xl text-center outline-none focus:border-yellow-500 p-2" value={spellIn} onChange={e=>{setSpellIn(e.target.value);if(e.target.value.toLowerCase()===cur.en.toLowerCase())handleAns(true);}} />
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 8. 子組件：天逆空間 (Training)
        // ==========================================
        const Training = ({ words, user, setView }) => {
            const [cur, setCur] = useState(null);
            const [mode, setMode] = useState('choice');
            useEffect(() => { next(); }, []);
            const next = () => { setCur(words[Math.floor(Math.random()*words.length)]); setMode(Math.random()>0.5?'choice':'spell'); };
            const ans = (ok) => { if(ok) user.stats.spiritCount+=1; next(); };
            if (!cur) return null;
            return (
                <div className="flex-1 p-6 flex flex-col">
                    <header className="flex justify-between items-center"><button onClick={()=>setView('home')}><i data-lucide="arrow-left"></i></button><span className="text-blue-400 font-bold">天逆空間 ({user.stats.spiritCount}/30)</span></header>
                    <div className="flex-1 flex flex-col items-center justify-center space-y-12">
                        <h2 className="text-5xl font-bold">{mode==='choice'?cur.en:cur.zh}</h2>
                        {mode==='choice'?(<div className="w-full space-y-3">{words.slice(0,3).concat(cur).sort(()=>0.5-Math.random()).map((o,i)=>(<button key={i} onClick={()=>ans(o.en===cur.en)} className="w-full py-4 glass-panel rounded-xl">{o.zh}</button>))}</div>):(<input autoFocus className="w-full bg-transparent border-b-2 border-blue-500 text-4xl text-center outline-none" onKeyUp={e=>e.key==='Enter'&&ans(e.target.value.toLowerCase()===cur.en.toLowerCase())} />)}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 9. 子組件：仙界主宰 (AdminPanel)
        // ==========================================
        const AdminPanel = ({ settings, setSettings, words, setWords, batches, setBatches, setView, users, setUsers }) => {
            const [isAuth, setIsAuth] = useState(false);
            const [pw, setPw] = useState("");

            const handleCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const lines = ev.target.result.split('\n').filter(l => l.trim());
                    const bid = Date.now();
                    const news = lines.map(l => {
                        const [en, pos, zh] = l.split(',');
                        if (!en || !zh) return null;
                        return { en: en.trim(), pos: pos.trim(), zh: zh.trim(), category: guessCategory(zh.trim()) };
                    }).filter(x => x);

                    setWords(prev => {
                        const map = new Map();
                        prev.forEach(w => map.set(w.en.toLowerCase(), w));
                        news.forEach(n => {
                            const key = n.en.toLowerCase();
                            if (map.has(key)) {
                                const exist = map.get(key);
                                if (!exist.zh.includes(n.zh)) exist.zh += `; ${n.zh}`;
                                map.set(key, exist);
                            } else {
                                map.set(key, { ...n, batchId: bid, batches: [bid], mastery: 0, nextReview: Date.now() });
                            }
                        });
                        return Array.from(map.values());
                    });
                    setBatches(p => [...p, { id: bid, name: `匯入: ${new Date().toLocaleString()}`, count: news.length }]);
                    alert("匯入成功！已同步至雲端。");
                };
                reader.readAsText(file);
            };

            if (!isAuth) return (
                <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-6">
                    <h2 className="text-2xl font-bold gold-text">主宰禁制</h2>
                    <input type="password" placeholder="輸入主宰密碼" className="w-full p-4 glass-panel rounded-xl text-center" value={pw} onChange={e => setPw(e.target.value)} />
                    <button onClick={() => pw === settings.adminPw ? setIsAuth(true) : alert("錯誤")} className="w-full py-4 bg-yellow-600 text-slate-950 font-bold rounded-xl">破解</button>
                    <button onClick={()=>setView('home')} className="text-slate-500">返回</button>
                </div>
            );

            return (
                <div className="flex-1 p-6 flex flex-col space-y-8 overflow-y-auto">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-bold gold-text">仙界主宰</h2><button onClick={()=>setView('home')}><i data-lucide="x"></i></button></div>
                    <section className="glass-panel p-6 rounded-3xl space-y-4">
                        <h3 className="text-xs font-bold text-emerald-500 border-b border-white/5 pb-2 uppercase">載入仙冊 (CSV)</h3>
                        <input type="file" id="csv" hidden accept=".csv" onChange={handleCSV} />
                        <label htmlFor="csv" className="w-full py-4 bg-emerald-600 rounded-xl flex items-center justify-center space-x-2 cursor-pointer active:scale-95 transition-all"><i data-lucide="file-up"></i><span className="font-bold">選取 CSV 檔案</span></label>
                    </section>
                    <section className="glass-panel p-6 rounded-3xl space-y-4">
                        <h3 className="text-xs font-bold text-blue-400 border-b border-white/5 pb-2 uppercase">修士管理</h3>
                        {users.map((u, i) => (
                            <div key={i} className="flex justify-between items-center text-xs">
                                <span>{u.name} (Exp: {u.exp})</span>
                                <div className="space-x-2">
                                    <button onClick={() => { const np = prompt("新密語"); if(np) u.pw = np; setUsers([...users]); }} className="text-blue-400">重置</button>
                                    <button onClick={() => setUsers(users.filter(x => x.name !== u.name))} className="text-red-500">逐出</button>
                                </div>
                            </div>
                        ))}
                    </section>
                    <section className="glass-panel p-6 rounded-3xl space-y-4">
                        <h3 className="text-xs font-bold text-yellow-500 border-b border-white/5 pb-2 uppercase">法則設定</h3>
                        <div className="space-y-4 text-xs">
                            <div className="flex justify-between">每日挑戰輪次：<input type="number" className="w-12 bg-slate-800 rounded px-1" value={settings.maxRounds} onChange={e => setSettings({...settings, maxRounds: parseInt(e.target.value)})} /></div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
