<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天逆珠・仙逆單字傳 - 踏天終焉</title>
    
    <!-- PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --gold: #facc15; --bg: #020617; --glass: rgba(15, 23, 42, 0.95); --error: #ef4444; }
        body { font-family: 'Noto Serif TC', serif; background-color: var(--bg); color: #f1f5f9; margin: 0; overflow: hidden; user-select: none; }
        .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        
        /* 鎏金對比 UI */
        .btn-gold { background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%); color: #000; font-weight: 900; border-radius: 0.75rem; border: 2px solid #000; box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); text-transform: uppercase; }
        .btn-gold:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-gold:disabled { filter: grayscale(1); opacity: 0.5; }
        
        .btn-exit { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 9999px; padding: 0.4rem 1rem; font-size: 0.75rem; font-weight: 800; transition: 0.3s; }
        .btn-exit:hover { background: rgba(239, 68, 68, 0.3); }

        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tablet { border-left: 5px solid var(--gold); background: linear-gradient(90deg, rgba(250, 204, 21, 0.1) 0%, transparent 100%); transition: 0.3s; cursor: pointer; }
        .tablet:hover { transform: translateX(8px); background: rgba(250, 204, 21, 0.2); }

        /* 拼寫底線核心樣式 */
        .u-line { display: inline-block; width: 1.8rem; margin: 0 0.2rem; border-bottom: 3px solid #334155; text-align: center; font-size: 2rem; font-weight: 900; color: var(--gold); height: 2.8rem; vertical-align: bottom; }
        .u-line.filled { border-bottom-color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .u-space { display: inline-block; width: 1.2rem; }

        /* 旋轉天逆珠背景 */
        .vortex { position: fixed; top: 50%; left: 50%; width: 120vw; height: 120vw; background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%); z-index: -1; transform: translate(-50%, -50%); animation: spin 200s linear infinite; }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 進度條 */
        .bar-container { height: 10px; background: #0f172a; border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #ca8a04, #facc15, #fef08a); box-shadow: 0 0 15px var(--gold); transition: width 1s ease-in-out; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // Firebase 配置 (前輩的 API)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAtvZjyKKRsfbbRPt-OI85isFuua6EV1YQ",
            authDomain: "vocab-2000.firebaseapp.com",
            projectId: "vocab-2000",
            storageBucket: "vocab-2000.firebasestorage.app",
            messagingSenderId: "459452518715",
            appId: "1:459452518715:web:2842926df8a8d73831a71e"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // 境界體系 (100% 遵照前輩指令)
        // ==========================================
        const QI = Array.from({ length: 15 }, (_, i) => `凝氣期 ${i + 1} 層`);
        const STAGES = ["初期", "中期", "後期", "後期巔峰", "圓滿"];
        const REALMS = [
            { n: "凡人", s: ["一介凡夫"], c: "text-slate-500" },
            { n: "凝氣", s: QI, c: "text-emerald-400" },
            { n: "築基", s: [...STAGES, "假丹"], c: "text-blue-400" },
            { n: "結丹", s: [...STAGES, "假嬰"], c: "text-purple-400" },
            { n: "元嬰", s: STAGES, c: "text-pink-400" },
            { n: "化神", s: STAGES, c: "text-orange-400" },
            { n: "嬰變", s: STAGES, c: "text-rose-500" },
            { n: "問鼎", s: STAGES, c: "text-amber-500" },
            { n: "陰虛", s: STAGES, c: "text-indigo-500" },
            { n: "陽實", s: STAGES, c: "text-yellow-500" },
            { n: "窺涅", s: STAGES, c: "text-cyan-400" },
            { n: "淨涅", s: STAGES, c: "text-sky-400" },
            { n: "碎涅", s: STAGES, c: "text-indigo-400" },
            { n: "空涅", s: STAGES, c: "text-blue-600" },
            { n: "空靈", s: STAGES, c: "text-purple-600" },
            { n: "空玄", s: STAGES, c: "text-rose-600" },
            { n: "空劫", s: ["大尊初期", "大尊中期", "大尊後期", "金尊", "天尊", "躍天尊"], c: "text-red-700" },
            { n: "半步踏天", s: ["第一橋", "第二橋", "第三橋", "第四橋", "第五橋", "第六橋", "第七橋", "第八橋"], c: "text-yellow-500" },
            { n: "踏天境", s: ["第九橋(永恆)"], c: "text-yellow-200" }
        ];
        const ALL_SUB = REALMS.flatMap(r => r.s.map(s => ({ m: r.n, s, c: r.c })));

        const getRealmInfo = (exp) => {
            let acc = 0;
            for (let i = 0; i < ALL_SUB.length; i++) {
                const req = i < 15 ? 100 + i * 20 : Math.floor(250 * Math.pow(1.18, i-14) + 40 * Math.pow(i, 2));
                if (exp < acc + req) return { ...ALL_SUB[i], idx: i, current: acc, next: acc + req };
                acc += req;
            }
            return { ...ALL_SUB[ALL_SUB.length-1], idx: ALL_SUB.length-1, current: acc, next: Infinity };
        };
const autoCategorize = (zh) => {
    const dict = {
        "動物": ["虎", "狼", "龍", "鳥", "獸", "馬", "羊", "犬", "貓", "魚", "蟲", "象", "獅"],
        "植物": ["花", "草", "樹", "林", "木", "葉", "果", "藥", "根", "枝", "花", "卉"],
        "交通": ["車", "船", "飛機", "路", "徑", "航", "運", "站", "港", "速"],
        "食物": ["飯", "麵", "肉", "菜", "飲", "食", "味", "甜", "鹹", "餐", "米", "麥"],
        "天氣": ["風", "雨", "雷", "電", "雲", "雪", "晴", "氣", "霧", "霜", "露", "虹"],
        "時間": ["年", "月", "日", "時", "分", "秒", "早", "晚", "昔", "今", "永", "暫"],
        "情緒": ["怒", "喜", "憂", "傷", "愛", "恨", "驚", "恐", "悲", "樂", "愁", "願"],
        "動作": ["跑", "跳", "走", "看", "說", "打", "取", "修", "聽", "讀", "寫", "飛", "遁"],
        "物品": ["桌", "椅", "筆", "劍", "器", "具", "服", "物", "寶", "珠", "鏡", "爐"],
        "自然": ["山", "川", "河", "海", "陸", "石", "土", "金", "火", "水", "星", "月"],
        "學術": ["書", "考", "文", "學", "理", "算", "術", "史", "法", "論", "道"],
        "空間": ["大", "小", "遠", "近", "高", "低", "前", "後", "左", "右", "內", "外"]
    };
    for (let cat in dict) {
        if (dict[cat].some(k => zh.includes(k))) return cat;
    }
    return "其他類別";
};
        // ==========================================
        // 核心邏輯模組
        // ==========================================
        const App = () => {
            const [view, setView] = useState('gate'); 
            const [users, setUsers] = useState([]);
            const [user, setUser] = useState(null);
            const [words, setWords] = useState([]);
            const [batches, setBatches] = useState([]);
            const [settings, setSettings] = useState({ rounds: 3, questions: 10, errors: 3, adminPw: "123456" });

            // 初始同步
          // 初始同步：修正後的「滅鬼」邏輯
            useEffect(() => {
                const load = (k, d) => JSON.parse(localStorage.getItem(k) || d);
                // 先讀取本地作為備緩
                setWords(load('sn_w', '[]'));
                setBatches(load('sn_b', '[]'));
                const s = load('sn_s', 'null');
                if (s) setSettings(s);

                // 核心：雲端修士偵聽 (這是唯一真相)
                if (db) {
                    const unsubscribe = db.collection("users").onSnapshot(snapshot => {
                        const cloudUsers = snapshot.docs.map(doc => doc.data());
                        if (cloudUsers.length > 0) {
                            setUsers(cloudUsers);
                            localStorage.setItem('sn_u', JSON.stringify(cloudUsers));
                        } else if (snapshot.metadata.fromCache === false) {
                            // 如果雲端空了，本地也得清空
                            setUsers([]);
                            localStorage.setItem('sn_u', JSON.stringify([]));
                        }
                    });
                    return () => unsubscribe();
                } else {
                    // 無雲端時才使用本地名單
                    setUsers(load('sn_u', '[]'));
                }
            }, []);

            const persist = (u, w, b, s) => {
                if (u) { setUsers(u); localStorage.setItem('sn_u', JSON.stringify(u)); if(db) u.forEach(x => db.collection("users").doc(x.name).set(x)); }
                if (w) { setWords(w); localStorage.setItem('sn_w', JSON.stringify(w)); }
                if (b) { setBatches(b); localStorage.setItem('sn_b', JSON.stringify(b)); }
                if (s) { setSettings(s); localStorage.setItem('sn_s', JSON.stringify(s)); }
            };

            const onUserUpdate = (updated) => {
                const newList = users.map(x => x.name === updated.name ? updated : x);
                persist(newList); setUser(updated);
            };

            return (
                <div className="relative min-h-screen flex flex-col items-center overflow-hidden">
                    <div className="vortex"></div>
                    <div className="relative z-10 w-full max-w-md min-h-screen flex flex-col">
                        {view === 'gate' && <Gate users={users} setView={setView} setUser={setUser} />}
                        {view === 'reg' && <Register onBack={()=>setView('gate')} onDone={(u)=>{ persist([...users, u]); setView('gate'); }} />}
                        {view === 'lobby' && <Lobby user={user} settings={settings} setView={setView} onLogout={()=>setView('gate')} onUpdate={onUserUpdate} />}
                        {view === 'trial' && <Trial user={user} settings={settings} words={words} onUpdate={onUserUpdate} setView={setView} />}
                        {view === 'train' && <Training user={user} words={words} onUpdate={onUserUpdate} setView={setView} />}
                        {view === 'admin' && <Admin settings={settings} setSettings={(s)=>persist(null,null,null,s)} words={words} setWords={(w)=>persist(null,w,null,null)} batches={batches} setBatches={(b)=>persist(null,null,b,null)} users={users} setUsers={(u)=>persist(u)} setView={setView} curUser={user} setCurUser={setUser} />}
                    </div>
                </div>
            );
        };
        
        // ==========================================
        // 子組件: 仙魂碑入口 (Gate)
        // ==========================================
        const Gate = ({ users, setView, setUser }) => {
            const [target, setTarget] = useState(null);
            const [pw, setPw] = useState("");
            return (
                <div className="flex-1 flex flex-col p-6 animate-in fade-in duration-700">
                    <div className="text-center py-10 space-y-2">
                        <h1 className="text-5xl font-calligraphy gold-text">仙界入口</h1>
                        <p className="text-slate-500 text-[10px] tracking-[0.4em] uppercase">喚醒神識・再續前緣</p>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                        {users.map((u, i) => {
                            const info = getRealmInfo(u.exp);
                            return (
                                <div key={i} onClick={()=>{setTarget(u); setPw("");}} className="tablet p-5 rounded-xl flex items-center space-x-4">
                                    <img src={u.avatar} className="w-14 h-14 rounded-full border-2 border-yellow-500/30 object-cover" />
                                    <div className="flex-1">
                                        <div className="flex justify-between items-start">
                                            <span className="font-bold text-lg">{u.name}</span>
                                            <span className="text-[10px] text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded">積分: {u.exp}</span>
                                        </div>
                                        <p className={`text-[10px] font-black uppercase mt-1 ${info.c}`}>{info.m}・{info.s}</p>
                                    </div>
                                </div>
                            );
                        })}
                        <button onClick={()=>setView('reg')} className="w-full py-8 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-500 hover:text-yellow-500 transition-all group">
                            <i data-lucide="user-plus" className="mb-2"></i>
                            <span className="text-xs font-bold uppercase">註冊新修士</span>
                        </button>
                    </div>
                    {target && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
                            <div className="glass w-full max-w-xs p-8 rounded-3xl text-center space-y-6">
                                <h3 className="text-xl font-bold">修士 {target.name}</h3>
                                <input type="password" placeholder="輸入密語" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center focus:border-yellow-500 outline-none text-2xl" value={pw} onChange={e=>setPw(e.target.value)} autoFocus onKeyUp={e=>e.key==='Enter' && (pw===target.pw ? (setUser(target), setView('lobby')) : alert("錯"))} />
                                <div className="flex space-x-2">
                                    <button onClick={()=>setTarget(null)} className="flex-1 py-3 text-slate-500">返回</button>
                                    <button onClick={()=>(pw===target.pw ? (setUser(target), setView('lobby')) : alert("錯"))} className="flex-2 btn-gold p-3 px-8">確認</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Register = ({ onBack, onDone }) => {
            const [n, setN] = useState(""); const [p, setP] = useState(""); const [a, setA] = useState("");
            const hFile = (e) => {
                const f = e.target.files[0]; if(f){ const r=new FileReader(); r.onload=(ev)=>setA(ev.target.result); r.readAsDataURL(f); }
            };
            return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen space-y-8 animate-in slide-in-from-bottom">
                    <h2 className="text-4xl font-calligraphy gold-text">初登仙冊</h2>
                    <div className="w-32 h-32 rounded-full border-4 border-yellow-500 bg-slate-800 overflow-hidden relative">
                        {a ? <img src={a} className="w-full h-full object-cover" /> : <div className="p-8 text-center text-[10px]">上傳影像</div>}
                        <input type="file" id="u" hidden onChange={hFile} accept="image/*" />
                        <label htmlFor="u" className="absolute inset-0 cursor-pointer"></label>
                    </div>
                    <div className="w-full space-y-4">
                        <input placeholder="名號" className="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none focus:border-yellow-500" value={n} onChange={e=>setN(e.target.value)} />
                        <input type="password" placeholder="神識密語" className="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none focus:border-yellow-500" value={p} onChange={e=>setP(e.target.value)} />
                    </div>
                    <div className="w-full flex space-x-4">
                        <button onClick={onBack} className="flex-1 py-4 text-slate-500">返回</button>
                        <button onClick={()=> (n && p && a) ? onDone({ name: n, pw: p, avatar: a, exp: 0, stats: { rounds: 0, spirit: 0, lastDate: new Date().toDateString() }}) : alert("不全")} className="flex-2 btn-gold p-4 px-10">確認入冊</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 子組件: 修士洞府 (Lobby)
        // ==========================================
        const Lobby = ({ user, settings, setView, onLogout, onUpdate }) => {
            const info = getRealmInfo(user.exp);
            const prog = ((user.exp - info.current) / (info.next - info.current)) * 100;
            
            useEffect(() => {
                const today = new Date().toDateString();
                if(user.stats.lastDate !== today) { user.stats.rounds = 0; user.stats.spirit = 0; user.stats.lastDate = today; onUpdate(user); }
                lucide.createIcons();
            }, []);

            return (
                <div className="p-6 flex flex-col h-screen space-y-6 pb-24">
                    <header className="flex justify-between items-center mt-6">
                        <div className="flex items-center space-x-4">
                            <img src={user.avatar} className="w-16 h-16 rounded-full border-2 border-yellow-500 object-cover shadow-2xl" />
                            <div>
                                <h2 className="text-2xl font-bold">{user.name}</h2>
                                <p className={`text-[11px] font-black uppercase ${info.c}`}>{info.m}・{info.s}</p>
                            </div>
                        </div>
                        <button onClick={()=>setView('admin')} className="p-4 glass rounded-full text-yellow-500"><i data-lucide="shield-check"></i></button>
                    </header>

                    <div className="glass p-7 rounded-[2rem] space-y-4">
                        <div className="flex justify-between text-[10px] font-black tracking-widest text-slate-500 uppercase"><span>修為進度</span><span>{user.exp.toLocaleString()} / {info.next.toLocaleString()}</span></div>
                        <div className="bar-container"><div className="bar-fill" style={{ width: `${Math.min(100, prog)}%` }}></div></div>
                        <p className="text-[10px] text-center text-slate-500 italic">距離突破還需 {info.next - user.exp} 積分</p>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass p-5 rounded-3xl text-center"><p className="text-[10px] text-slate-500 font-bold">今日試煉</p><p className="text-3xl font-black text-emerald-400 font-mono">{user.stats.rounds} / {settings.rounds}</p></div>
                        <div className="glass p-5 rounded-3xl text-center"><p className="text-[10px] text-slate-500 font-bold">時光屋</p><p className="text-3xl font-black text-blue-400 font-mono">{user.stats.spirit} 題</p></div>
                    </div>

                    <div className="flex-1 space-y-5">
                        <button onClick={()=>setView('trial')} className="w-full h-32 glass rounded-[2.5rem] flex items-center justify-between px-10 border-yellow-500/10 hover:border-yellow-500/50 group">
                            <div className="text-left"><h3 className="text-2xl font-black gold-text uppercase">三輪試煉</h3><p className="text-[10px] text-slate-500">生死關頭 提升修為</p></div>
                            <div className="w-16 h-16 btn-gold rounded-full flex items-center justify-center text-black group-hover:rotate-12 transition-transform"><i data-lucide="sword" size={32}></i></div>
                        </button>
                        <button onClick={()=>setView('train')} className="w-full h-32 glass rounded-[2.5rem] flex items-center justify-between px-10 border-blue-500/10 hover:border-blue-500/50 group">
                            <div className="text-left"><h3 className="text-2xl font-black text-blue-400 uppercase">天逆空間</h3><p className="text-[10px] text-slate-500">精神時光屋 磨練神識</p></div>
                            <div className="w-16 h-16 bg-blue-500 rounded-full flex items-center justify-center text-black group-hover:rotate-[-12deg] transition-transform"><i data-lucide="zap" size={32}></i></div>
                        </button>
                    </div>
                    <button onClick={onLogout} className="text-slate-600 text-xs font-black tracking-[0.5em] uppercase py-4">神魂離體 (登出)</button>
                </div>
            );
        };

        // ==========================================
        // 子組件: 拼寫核心引擎 (SpellingEngine)
        // ==========================================
        const Engine = ({ word, zh, onResult, onBack }) => {
            const [val, setVal] = useState("");
            const [fb, setFb] = useState(null); // 'ok', 'no'
            const [reveal, setReveal] = useState(false);

            const submit = () => {
                if (val.trim().toLowerCase() === word.trim().toLowerCase()) {
                    setFb('ok');
                    setTimeout(() => { setVal(""); setFb(null); onResult(true); }, 800);
                } else {
                    setFb('no'); setReveal(true);
                    setTimeout(() => { setVal(""); setFb(null); setReveal(false); onResult(false); }, 3500);
                }
            };

            const renderLines = () => {
                let charIdx = 0;
                return word.split('').map((char, i) => {
                    if (char === ' ') return <span key={i} className="u-space" />;
                    const filled = val[charIdx] || ""; charIdx++;
                    return <span key={i} className={`u-line ${filled ? 'filled' : ''}`}>{filled}</span>;
                });
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-center space-y-12 w-full">
                    <button onClick={onBack} className="btn-exit fixed top-8 left-8">儲存進度並遁走</button>
                    <div className="text-center space-y-4">
                        <p className="text-slate-500 text-xs font-black tracking-widest">請感悟真意</p>
                        <h2 className="text-7xl font-bold tracking-tighter text-white">{zh}</h2>
                    </div>
                    <div className="flex flex-wrap justify-center py-6 px-4">{renderLines()}</div>
                    <div className="w-full px-8 relative">
                        <input autoFocus className="opacity-0 absolute inset-0 w-full h-full cursor-default" value={val} 
                               onChange={e => { const v = e.target.value.replace(/ /g, ''); if(v.length <= word.replace(/ /g, '').length) setVal(v); }} 
                               onKeyUp={e => e.key === 'Enter' && !fb && submit()} />
                        
                        {reveal ? (
                            <div className="text-center space-y-3 animate-bounce">
                                <p className="text-red-500 font-black text-sm uppercase">感悟失敗！正確答案：</p>
                                <p className="text-5xl font-black text-white tracking-widest underline decoration-red-500 decoration-4">{word.toUpperCase()}</p>
                            </div>
                        ) : (
                            <button onClick={submit} className="w-full py-5 btn-gold text-2xl shadow-2xl">確認真意 (送出)</button>
                        )}
                        <p className="text-center text-slate-600 text-[10px] mt-6 uppercase tracking-widest animate-pulse">直接輸入字母並按 Enter 鍵</p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 子組件: 試煉與時光屋
        // ==========================================
        const Trial = ({ user, settings, words, setView, onUpdate }) => {
            const [r, setR] = useState(1); const [idx, setIdx] = useState(0); 
            const [q, setQ] = useState([]); const [errs, setErrs] = useState([]); const [res, setRes] = useState(false);

            useEffect(() => {
                if (words.length < 5) { alert("仙冊不足！"); setView('lobby'); return; }
                if (user.stats.rounds >= settings.rounds) { alert("今日修為已滿"); setView('lobby'); return; }
                init();
            }, []);

            const init = () => {
                const picked = [...words].sort(() => 0.5 - Math.random()).slice(0, settings.questions);
                setQ(picked); setIdx(0); setErrs([]); setRes(false);
            };

            const next = (ok) => {
                if(!ok) setErrs(p => [...p, q[idx]]); else user.exp += 30;
                if(idx + 1 < q.length) setIdx(idx + 1);
                else {
                    const finalErrs = !ok ? [...errs, q[idx]] : errs;
                    if(finalErrs.length === 0) {
                        if(r < settings.rounds) { alert("此輪圓滿！進入下一輪"); setR(r+1); init(); }
                        else { done(true); }
                    } else if(finalErrs.length <= settings.errors && !res) {
                        alert(`進入敗部復活試煉！`); setRes(true); setQ([...finalErrs]); setErrs([]); setIdx(0);
                    } else { alert("道心受損，試煉終止！"); done(false); }
                }
            };

            const done = (ok) => { user.stats.rounds++; onUpdate(user); if(ok) confetti(); setView('lobby'); };

            if (!q[idx]) return null;
            return (
                <div className="p-6 h-screen flex flex-col animate-in fade-in duration-500">
                    <header className="flex justify-between items-center mt-12 mb-4">
                        <span className="text-xs text-slate-500 font-black">輪次 {r} - 進度 {idx+1}/{q.length}</span>
                        {res && <span className="bg-red-600 px-3 py-1 rounded-full text-[10px] font-black animate-pulse">重生中</span>}
                    </header>
                    <Engine word={q[idx].en} zh={q[idx].zh} onResult={next} onBack={() => { onUpdate(user); setView('lobby'); }} />
                </div>
            );
        };

        const Training = ({ user, words, setView, onUpdate }) => {
            const [cur, setCur] = useState(null);
            useEffect(() => { if(words.length) next(); }, []);
            const next = () => setCur(words[Math.floor(Math.random() * words.length)]);
            if (!cur) return null;
            return (
                <div className="p-6 h-screen flex flex-col">
                    <header className="flex justify-between items-center mt-12 mb-4"><span className="text-blue-400 font-black text-xs uppercase tracking-widest tracking-widest">空間累積: {user.stats.spirit}</span></header>
                    <Engine word={cur.en} zh={cur.zh} onResult={(ok)=>{ if(ok) user.stats.spirit++; next(); }} onBack={()=>{ onUpdate(user); setView('lobby'); }} />
                </div>
            );
        };

        // ==========================================
        // 子組件: 仙界主宰 (Admin)
        // ==========================================
 const Admin = ({ settings, setSettings, words, setWords, batches, setBatches, users, setUsers, setView, curUser, setCurUser }) => {
    const [auth, setAuth] = useState(false);
    const [pw, setPw] = useState("");

    const handleCSV = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            const lines = ev.target.result.split('\n').filter(l => l.trim());
            const bid = Date.now();
            const news = lines.map(line => {
                const p = line.split(',');
                if (p.length < 3) return null;
                const en = p[0].trim();
                const pos = p[1].trim();
                const zh = p[2].trim();
                return { en, pos, zh, cat: autoCategorize(zh), bid };
            }).filter(x => x);
            const nw = [...words];
            news.forEach(n => {
                const i = nw.findIndex(w => w.en.toLowerCase() === n.en.toLowerCase());
                if (i !== -1) { if(!nw[i].zh.includes(n.zh)) nw[i].zh += `; ${n.zh}`; } else nw.push(n);
            });
            setWords(nw); localStorage.setItem('sn_w', JSON.stringify(nw));
            setBatches([...batches, { id: bid, d: new Date().toLocaleString(), c: news.length }]);
            localStorage.setItem('sn_b', JSON.stringify([...batches, { id: bid, d: new Date().toLocaleString(), c: news.length }]));
            alert("經書匯入成功！");
        };
        r.readAsText(f);
    };

    // 處理修士頭像變更
    const handleAvatarChange = (index, e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const newUsers = [...users];
                newUsers[index].avatar = ev.target.result;
                setUsers(newUsers);
                localStorage.setItem('sn_u', JSON.stringify(newUsers));
                alert("修士顯像已重塑！");
            };
            reader.readAsDataURL(file);
        }
    };

    if (!auth) return (
        <div className="p-8 flex flex-col items-center justify-center min-h-screen space-y-6 animate-in zoom-in">
            <h2 className="text-2xl font-bold gold-text uppercase">主宰禁制</h2>
            <input type="password" placeholder="輸入主宰密碼" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center" value={pw} onChange={e=>setPw(e.target.value)} onKeyUp={e=>e.key==='Enter'&&(pw===settings.adminPw?setAuth(true):alert("錯"))} />
            <button onClick={() => pw === settings.adminPw ? setAuth(true) : alert("錯")} className="w-full py-4 btn-gold">解禁</button>
            <button onClick={() => setView('lobby')} className="text-slate-500 text-xs">返回</button>
        </div>
    );

    return (
        <div className="p-6 flex flex-col space-y-8 overflow-y-auto h-screen pb-24">
            <div className="flex justify-between items-center mt-4">
                <h2 className="text-xl font-bold gold-text">仙界主宰殿</h2>
                <button onClick={()=>setView('lobby')} className="p-2 glass rounded-full"><i data-lucide="x"></i></button>
            </div>
            
            {/* 1. 法則設定 */}
            <section className="glass p-6 rounded-2xl space-y-4">
                <h3 className="text-xs font-black text-yellow-500 border-b border-white/5 pb-2 uppercase tracking-widest">天道法則設定</h3>
                <div className="space-y-4 text-[10px]">
                    <div className="flex justify-between items-center"><span>挑戰輪次: {settings.rounds}</span><input type="range" min="3" max="10" value={settings.rounds} onChange={e=>setSettings({...settings, rounds:parseInt(e.target.value)})} className="w-24 accent-yellow-500" /></div>
                    <div className="flex justify-between items-center"><span>每輪題數: {settings.questions}</span><input type="range" min="10" max="20" value={settings.questions} onChange={e=>setSettings({...settings, questions:parseInt(e.target.value)})} className="w-24 accent-yellow-500" /></div>
                    <div className="flex justify-between items-center"><span>復活容錯: {settings.errors}</span><input type="range" min="0" max="50" value={settings.errors} onChange={e=>setSettings({...settings, errors:parseInt(e.target.value)})} className="w-24 accent-yellow-500" /></div>
                    <div className="pt-2 border-t border-white/5">
                        <span className="text-slate-500">主宰密碼修改：</span>
                        <input type="text" className="w-full bg-slate-900 border border-white/10 rounded mt-1 p-2 text-center text-yellow-500 font-bold" value={settings.adminPw} onChange={e=>setSettings({...settings, adminPw:e.target.value})} />
                    </div>
                </div>
            </section>

            {/* 2. 修士名錄維護 */}
            {/* 修士名錄維護區塊 */}
<section className="glass p-6 rounded-2xl space-y-4">
    <h3 className="text-xs font-black text-purple-400 border-b border-white/5 pb-2 uppercase tracking-widest">修士名錄維護</h3>
    <div className="space-y-6">
                    {users.map((u, i) => (
                        <div key={u.name || i} className="bg-slate-900/80 p-4 rounded-xl border border-yellow-500/20 space-y-4 shadow-xl">
                            <div className="flex items-center space-x-4">
                                {/* 1. 頭像重塑邏輯 - 點擊頭像即可更換 */}
                                <div className="relative group">
                                    <img 
                                        src={u.avatar} 
                                        className="w-16 h-16 rounded-full border-2 border-yellow-500 object-cover cursor-pointer hover:brightness-125 transition-all" 
                                        title="點擊重塑神識顯像"
                                        onClick={() => document.getElementById(`avatar-upload-${i}`).click()}
                                    />
                                    <input 
                                        type="file" 
                                        id={`avatar-upload-${i}`} 
                                        hidden 
                                        accept="image/*" 
                                        onChange={(e) => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const reader = new FileReader();
                                                reader.onload = async (ev) => {
                                                    const dataUrl = ev.target.result;
                                                    if (db) await db.collection("users").doc(u.name).update({ avatar: dataUrl });
                                                    const newList = [...users];
                                                    newList[i].avatar = dataUrl;
                                                    setUsers(newList);
                                                    localStorage.setItem('sn_u', JSON.stringify(newList));
                                                };
                                                reader.readAsDataURL(file);
                                            }
                                        }} 
                                    />
                                </div>

                                <div className="flex-1">
                                    <p className="text-sm font-bold text-yellow-500">{u.name}</p>
                                    <p className="text-[10px] text-slate-500 italic">修為積分: {u.exp}</p>
                                </div>
                            </div>
                            
                            {/* 2. 管理功能按鈕 - 使用「單點同步」防止殘魂歸來 */}
                            <div className="grid grid-cols-2 gap-2 mt-4">
                                <button onClick={async () => {
                                    const oldName = u.name;
                                    const newName = prompt("輸入新道號", oldName);
                                    if (newName && newName !== oldName) {
                                        if (db) {
                                            const newData = { ...u, name: newName };
                                            await db.collection("users").doc(newName).set(newData);
                                            await db.collection("users").doc(oldName).delete();
                                        } else {
                                            const newList = users.map(x => x.name === oldName ? {...x, name: newName} : x);
                                            setUsers(newList);
                                            localStorage.setItem('sn_u', JSON.stringify(newList));
                                        }
                                        alert("更名成功");
                                    }
                                }} className="text-[10px] bg-slate-800 p-2 rounded border border-white/5 hover:bg-slate-700">更名</button>

                                <button onClick={async () => {
                                    const p = prompt("重置神識密語", u.pw);
                                    if (p) {
                                        if (db) await db.collection("users").doc(u.name).update({ pw: p });
                                        const newList = users.map(x => x.name === u.name ? {...x, pw: p} : x);
                                        setUsers(newList);
                                        localStorage.setItem('sn_u', JSON.stringify(newList));
                                        alert("密語已重塑");
                                    }
                                }} className="text-[10px] bg-slate-800 p-2 rounded border border-white/5 hover:bg-slate-700">改密</button>

                                <button onClick={async () => {
                                    const e = prompt("調整修為積分", u.exp);
                                    if (e !== null) {
                                        const newExp = parseInt(e);
                                        if (db) await db.collection("users").doc(u.name).update({ exp: newExp });
                                        const newList = users.map(x => x.name === u.name ? {...x, exp: newExp} : x);
                                        setUsers(newList);
                                        localStorage.setItem('sn_u', JSON.stringify(newList));
                                        alert("修為已變動");
                                    }
                                }} className="text-[10px] bg-slate-800 p-2 rounded border border-white/5 hover:bg-slate-700">調Exp</button>

                                <button onClick={async () => {
                                    if (confirm(`確定要將修士 ${u.name} 逐出仙門？雲端殘魂將被徹底抹除！`)) {
                                        if (db) await db.collection("users").doc(u.name).delete();
                                        const newList = users.filter(x => x.name !== u.name);
                                        setUsers(newList);
                                        localStorage.setItem('sn_u', JSON.stringify(newList));
                                        alert("已抹除其修煉痕跡");
                                    }
                                }} className="text-[10px] bg-red-900/30 text-red-400 p-2 rounded border border-red-500/20">逐出仙門</button>
                            </div>
                        </div>
                    ))}
                </div>
            </section>
            {/* 3. 經書管理 */}
            <section className="glass p-6 rounded-2xl space-y-4">
                <h3 className="text-xs font-black text-emerald-500 border-b border-white/5 pb-2 uppercase tracking-widest">經書管理</h3>
                <input type="file" accept=".csv" onChange={handleCSV} className="text-[10px] w-full file:bg-emerald-600 file:border-none file:px-3 file:py-1 file:rounded file:text-black file:font-bold" />
                <div className="space-y-2 max-h-40 overflow-y-auto">
                    {batches.map(b=><div key={b.id} className="flex justify-between items-center text-[10px] bg-slate-800/50 p-2 rounded">
                        <span>{b.d} ({b.c}題)</span>
                        <button onClick={()=>{if(confirm("焚毀？")){
                            setWords(words.filter(w=>w.bid!==b.id)); 
                            setBatches(batches.filter(x=>x.id!==b.id));
                        }}} className="text-red-500 px-2 font-bold">焚</button>
                    </div>)}
                </div>
            </section>
            {/* 儲存並返回按鈕 */}
            <div className="pt-4 pb-12">
                <button 
                    onClick={() => {
                    // 1. 執行基礎存檔
                    localStorage.setItem('sn_s', JSON.stringify(settings));
                    localStorage.setItem('sn_u', JSON.stringify(users));
                    localStorage.setItem('sn_w', JSON.stringify(words));
                    localStorage.setItem('sn_b', JSON.stringify(batches));
                    
                    // 2. 關鍵修正：同步更新當前登入修士的「元神」
                    if (curUser) {
                        const updatedSelf = users.find(u => u.name === curUser.name);
                        if (updatedSelf) setCurUser(updatedSelf);
                    }
                    
                    alert("主宰法旨已封存，修為數值已同步！");
                    setView('lobby');
                }}
                    className="w-full py-5 btn-gold text-2xl shadow-[0_0_30px_rgba(250,204,21,0.6)] flex items-center justify-center space-x-3"
                >
                    <i data-lucide="save"></i>
                    <span>儲存法旨・返回洞府</span>
                </button>
                <p className="text-center text-[10px] text-slate-600 mt-4 uppercase tracking-[0.3em]">
                    點擊後將立即永久保存所有變更
                </p>
            </div>
        </div>
    );
};
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
