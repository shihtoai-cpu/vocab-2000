<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="單字傳說">
    <meta name="mobile-web-app-capable" content="yes">
    <title>單字記憶傳說</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet" />
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(()=>{});
            });
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc };
        window.firebaseLoaded = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-tap-highlight-color: transparent; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-indigo-100 overscroll-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = '' }) => (
            <span className={`material-symbols-rounded ${className}`} style={{ fontSize: size }}>{name}</span>
        );

        const INITIAL_WORDS = [
            { id: 1, word: 'to', pos: 'prep.', translation: '向', category: 'Unit 37' },
            { id: 2, word: 'title', pos: 'n.', translation: '標題;頭銜', category: 'Unit 37' },
            { id: 3, word: 'toast', pos: 'n.', translation: '吐司', category: 'Unit 37' },
            { id: 4, word: 'today', pos: 'n.', translation: '今天', category: 'Unit 37' },
            { id: 5, word: 'toe', pos: 'n.', translation: '腳趾', category: 'Unit 37' },
            { id: 6, word: 'tofu', pos: 'n.', translation: '豆腐', category: 'Unit 37' },
            { id: 7, word: 'together', pos: 'adv.', translation: '一起', category: 'Unit 37' },
            { id: 8, word: 'toilet', pos: 'n.', translation: '公共廁所', category: 'Unit 37' },
            { id: 9, word: 'tomato', pos: 'n.', translation: '番茄', category: 'Unit 37' },
            { id: 10, word: 'tomorrow', pos: 'n. adv.', translation: '明天', category: 'Unit 37' }
        ];

        const INTERVALS = [0, 1, 3, 7, 14, 30];
        
        // 修仙境界系統
        const getRankInfo = (score) => {
            if (score < 100) return { title: '凡人', color: 'text-slate-500', bg: 'bg-slate-200' };
            if (score < 300) return { title: '練氣期', color: 'text-emerald-600', bg: 'bg-emerald-100' };
            if (score < 600) return { title: '築基期', color: 'text-cyan-600', bg: 'bg-cyan-100' };
            if (score < 1000) return { title: '金丹期', color: 'text-yellow-600', bg: 'bg-yellow-100' };
            if (score < 1500) return { title: '元嬰期', color: 'text-purple-600', bg: 'bg-purple-100' };
            if (score < 2500) return { title: '化神期', color: 'text-rose-600', bg: 'bg-rose-100' };
            if (score < 4000) return { title: '煉虛期', color: 'text-orange-600', bg: 'bg-orange-100' };
            if (score < 6000) return { title: '合體期', color: 'text-red-600', bg: 'bg-red-100' };
            if (score < 10000) return { title: '大乘期', color: 'text-indigo-600', bg: 'bg-indigo-100' };
            return { title: '渡劫仙尊', color: 'text-amber-400 animate-pulse font-black', bg: 'bg-slate-900' };
        };

        // 產生拼寫底線
        const generateBlanks = (word) => {
            return word.split('').map(c => /[a-zA-Z]/.test(c) ? '_' : c).join('');
        };

        function MainApp({ db, appId, authUser }) {
            const { collection, doc, setDoc, getDoc, onSnapshot, updateDoc } = window.FirebaseLib;

            const [view, setView] = useState('login'); 
            const [virtualDate, setVirtualDate] = useState(Date.now());
            const [currentUserId, setCurrentUserId] = useState(null);
            
            const [globalWords, setGlobalWords] = useState([]);
            const [lastImportBatchId, setLastImportBatchId] = useState(null);
            const [users, setUsers] = useState([]);
            const [userWordStats, setUserWordStats] = useState({});
            
            const [settings, setSettings] = useState({ newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 });
            const [parentPassword, setParentPassword] = useState("123456"); // 預設密碼改為 123456
            
            // 戰鬥與特訓狀態
            const [studyMode, setStudyMode] = useState('flashcard'); // 'flashcard' 或 'spelling'
            const [isPracticeMode, setIsPracticeMode] = useState(false);
            const [isReviveMode, setIsReviveMode] = useState(false);
            const [studyQueue, setStudyQueue] = useState([]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [cardStartTime, setCardStartTime] = useState(0);
            const [recallDuration, setRecallDuration] = useState(null);
            const [showResult, setShowResult] = useState(null); 
            const [spellInput, setSpellInput] = useState('');
            
            const sessionMistakesRef = useRef(0);
            const sessionMissedWords = useRef([]); // 記錄當局錯題，給復活賽用

            const [newUserName, setNewUserName] = useState('');
            const [newUserPassword, setNewUserPassword] = useState('');
            const [newUserAvatar, setNewUserAvatar] = useState(null);
            
            const [passwordModalUser, setPasswordModalUser] = useState(null);
            const [inputPassword, setInputPassword] = useState('');
            const [passwordError, setPasswordError] = useState(false);

            const [isLibraryAdmin, setIsLibraryAdmin] = useState(false);
            const [showLibraryLogin, setShowLibraryLogin] = useState(false);
            const [libraryUnlockCode, setLibraryUnlockCode] = useState('');
            const [libraryUnlockError, setLibraryUnlockError] = useState(false);
            const [manualWord, setManualWord] = useState({ word: '', pos: '', translation: '', category: '' });

            const [localSettings, setLocalSettings] = useState({ newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 });
            const [isSettingsUnlocked, setIsSettingsUnlocked] = useState(false);
            const [settingsUnlockCode, setSettingsUnlockCode] = useState('');
            const [settingsUnlockError, setSettingsUnlockError] = useState(false);
            const [newParentPwd, setNewParentPwd] = useState('');
            const [smartText, setSmartText] = useState('');
            const [isImporting, setIsImporting] = useState(false);

            useEffect(() => {
                if(!db || !appId) return;
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config');
                const unsub = onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.globalWords) setGlobalWords(data.globalWords);
                        if (data.lastImportBatchId) setLastImportBatchId(data.lastImportBatchId);
                        if (data.settings) {
                            setSettings(data.settings);
                            setLocalSettings(data.settings);
                        }
                        if (data.parentPassword) setParentPassword(data.parentPassword);
                    } else {
                        setDoc(ref, { 
                            globalWords: INITIAL_WORDS, 
                            settings: { newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 },
                            parentPassword: "123456",
                            lastImportBatchId: null
                        });
                    }
                });
                return () => unsub();
            }, [db, appId]);

            useEffect(() => {
                if(!db || !appId) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const unsub = onSnapshot(q, (snap) => {
                    const arr = [];
                    snap.forEach(d => arr.push(d.data()));
                    setUsers(arr);
                });
                return () => unsub();
            }, [db, appId]);

            useEffect(() => {
                if (!currentUserId || globalWords.length === 0 || !db) return;
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', currentUserId);
                const unsub = onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        setUserWordStats(prev => ({ ...prev, [currentUserId]: snap.data().words }));
                    } else {
                        const initialStats = globalWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null }));
                        setDoc(ref, { words: initialStats });
                    }
                });
                return () => unsub();
            }, [db, appId, currentUserId, globalWords]);

            const currentUser = useMemo(() => users.find(u => u.id === currentUserId), [users, currentUserId]);
            const currentWords = useMemo(() => userWordStats[currentUserId] || [], [userWordStats, currentUserId]);

            const todayStr = useMemo(() => new Date(virtualDate).toDateString(), [virtualDate]);
            const currentBatches = currentUser?.lastStudyDate === todayStr ? currentUser.dailyBatches : 0;

            const { dueReviewsTotal, failedWordsTotal, newWordsAvailable, masteredWords } = useMemo(() => {
                let reviews = currentWords.filter(w => w.status === 'learning' && w.nextReview <= virtualDate && w.level > 0);
                let failed = currentWords.filter(w => w.status === 'learning' && w.nextReview <= virtualDate && w.level === 0);
                let newWords = currentWords.filter(w => w.status === 'new');
                let mastered = currentWords.filter(w => w.status === 'mastered');
                return { dueReviewsTotal: reviews, failedWordsTotal: failed, newWordsAvailable: newWords, masteredWords: mastered.length };
            }, [currentWords, virtualDate]);

            // --- 智能與批次匯入 ---
            const handleSmartImport = async (rawText) => {
                if (!rawText.trim()) return false;
                try {
                    const existingWordsSet = new Set(globalWords.map(w => w.word.trim().toLowerCase()));
                    let newWords = [];
                    let currentMaxId = globalWords.length > 0 ? Math.max(...globalWords.map(w => w.id)) : 0;
                    const batchId = Date.now().toString();

                    const fullText = rawText.replace(/\n/g, '  ');
                    const unitChunks = fullText.split(/(?=2000\s*單?\s*Unit\s*\d+|Unit\s*\d+)/i);

                    unitChunks.forEach(chunk => {
                        const unitMatch = chunk.match(/Unit\s*(\d+)/i);
                        let currentUnit = unitMatch ? `Unit ${unitMatch[1].padStart(2, '0')}` : 'Unit 未知';
                        const tokens = chunk.split(/(?:\s|^)\b([1-9]|[1-4][0-9]|50)\s+(?=[a-zA-Z])/);
                        
                        for (let i = 1; i < tokens.length; i += 2) {
                            const content = tokens[i+1];
                            const engMatch = content.match(/^([a-zA-Z\-\'\s]+)/);
                            if (!engMatch) continue;
                            const word = engMatch[1].trim();
                            const posMatch = content.match(/\(([a-z\.\/]+)\)/);
                            const pos = posMatch ? posMatch[1] : '';
                            const transMatch = content.match(/([\u4e00-\u9fa5]+[^\w\s]*)/);
                            const translation = transMatch ? transMatch[1].replace(/\s+/g, '') : '無翻譯';

                            // 防重複比對
                            if (word.length > 0 && !existingWordsSet.has(word.toLowerCase())) {
                                currentMaxId++;
                                newWords.push({ id: currentMaxId, word, pos, translation, category: currentUnit, batchId });
                                existingWordsSet.add(word.toLowerCase());
                            }
                        }
                    });

                    if (newWords.length === 0) return 0;

                    const updatedGlobal = [...globalWords, ...newWords];
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal, lastImportBatchId: batchId });
                    
                    for (const u of users) {
                        const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                        const snap = await getDoc(uRef);
                        if(snap.exists()) {
                            const currentW = snap.data().words;
                            const addedW = newWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null, batchId }));
                            await updateDoc(uRef, { words: [...currentW, ...addedW] });
                        }
                    }
                    return newWords.length;
                } catch (err) {
                    console.error(err);
                    return -1;
                }
            };

            const handleCsvImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split(/\r?\n/);
                    const newWords = [];
                    const existingWordsSet = new Set(globalWords.map(w => w.word.trim().toLowerCase()));
                    let currentMaxId = globalWords.length > 0 ? Math.max(...globalWords.map(w => w.id)) : 0;
                    const batchId = Date.now().toString();

                    rows.forEach((row) => {
                        const cols = row.split(',').map(c => c.trim());
                        if (cols.length >= 4 && cols[0] && cols[0] !== '單字' && cols[0] !== 'word') {
                            const wordText = cols[0];
                            if (!existingWordsSet.has(wordText.toLowerCase())) {
                                currentMaxId++;
                                newWords.push({ id: currentMaxId, word: wordText, pos: cols[1], translation: cols[2], category: cols[3], batchId });
                                existingWordsSet.add(wordText.toLowerCase());
                            }
                        }
                    });

                    if (newWords.length > 0) {
                        const updatedGlobal = [...globalWords, ...newWords];
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal, lastImportBatchId: batchId });
                        
                        for (const u of users) {
                            const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                            const snap = await getDoc(uRef);
                            if(snap.exists()) {
                                const currentW = snap.data().words;
                                const addedW = newWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null, batchId }));
                                await updateDoc(uRef, { words: [...currentW, ...addedW] });
                            }
                        }
                        alert(`🎉 成功匯入 ${newWords.length} 個新單字！重複的單字已自動濾除。`);
                    } else {
                        alert('⚠️ 匯入失敗或無新單字：請確認 CSV 格式，或所有單字均已存在。');
                    }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const handleUndoLastImport = async () => {
                if (!lastImportBatchId) return alert("沒有可復原的匯入紀錄！");
                if (!window.confirm("確定要【復原最後一次匯入】嗎？這將刪除上一批匯入的所有單字。")) return;

                const updatedGlobal = globalWords.filter(w => w.batchId !== lastImportBatchId);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { 
                    globalWords: updatedGlobal,
                    lastImportBatchId: null 
                });

                for (const u of users) {
                    const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                    const snap = await getDoc(uRef);
                    if (snap.exists()) {
                        const currentW = snap.data().words;
                        const updatedW = currentW.filter(w => w.batchId !== lastImportBatchId);
                        await updateDoc(uRef, { words: updatedW });
                    }
                }
                alert("已成功復原最後一次匯入！");
            };

            const handleAdminResetPassword = async (targetUserId) => {
                const newPwd = prompt("請輸入該英雄的新密碼：");
                if (newPwd !== null && newPwd.trim() !== "") {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', targetUserId), { password: newPwd.trim() });
                    alert("密碼重設成功！");
                }
            };

            // --- 戰鬥與特訓邏輯 ---
            const handleStartSession = async (reqMode = 'flashcard') => {
                let isPractice = false;
                let newBatches = currentBatches;

                if (currentBatches >= settings.maxBatchesPerDay) {
                    isPractice = true;
                } else {
                    newBatches = currentBatches + 1;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { 
                        lastStudyDate: todayStr, dailyBatches: newBatches 
                    });
                }

                // 亂數洗牌機制 (取代字母順序)
                const shuffledDue = [...dueReviewsTotal].sort(() => 0.5 - Math.random()).slice(0, settings.maxReviewsPerBatch);
                // 練功房不派發新單字
                const shuffledNew = isPractice ? [] : [...newWordsAvailable].sort(() => 0.5 - Math.random()).slice(0, settings.newWordsPerBatch).map(w => ({...w, isNewBatch: true}));

                // 混合後再次洗牌
                const queue = [...shuffledDue, ...shuffledNew].sort(() => 0.5 - Math.random());
                if(queue.length === 0) return alert("目前沒有可練功的單字！");

                setStudyMode(reqMode);
                setIsPracticeMode(isPractice);
                setIsReviveMode(false);
                setStudyQueue(queue); 
                setCurrentCardIndex(0); 
                setIsFlipped(false); 
                setCardStartTime(Date.now());
                setRecallDuration(null); 
                setShowResult(null); 
                setSpellInput('');
                sessionMistakesRef.current = 0; 
                sessionMissedWords.current = [];
                setView('study');
            };

            const handleStartReviveChallenge = () => {
                setStudyMode('flashcard');
                setIsPracticeMode(false);
                setIsReviveMode(true);
                // 將剛才錯的題目洗牌後進入復活戰
                setStudyQueue([...sessionMissedWords.current].sort(() => 0.5 - Math.random())); 
                setCurrentCardIndex(0); 
                setIsFlipped(false); 
                setCardStartTime(Date.now());
                setRecallDuration(null); 
                setShowResult(null); 
                setSpellInput('');
                sessionMistakesRef.current = 0; 
                sessionMissedWords.current = [];
                setView('study');
            };

            const submitSpell = () => {
                const currentWord = studyQueue[currentCardIndex];
                const isCorrect = spellInput.trim().toLowerCase() === currentWord.word.trim().toLowerCase();
                setRecallDuration(Date.now() - cardStartTime);
                evaluateAnswer(isCorrect, true);
            };

            const evaluateAnswer = (isCorrect, fromSpelling = false) => {
                const time = recallDuration || (Date.now() - cardStartTime); 
                const currentWord = studyQueue[currentCardIndex];
                
                let newLevel = currentWord.level; 
                let newStatus = currentWord.status === 'new' ? 'learning' : currentWord.status;
                let grade, points = 0, comment; 
                let isOverdueBonus = false;

                if (!isCorrect) {
                    sessionMistakesRef.current += 1;
                    sessionMissedWords.current.push(currentWord);
                }

                if (isPracticeMode) {
                    // 練功房不計分、不升降級
                    if (isCorrect) { grade = 'S'; comment = '練功正確！'; points = 0; } 
                    else { grade = 'D'; comment = '練功錯誤！'; points = 0; }
                } else if (isReviveMode) {
                    // 復活戰：對了回到 Level 1，錯了維持 Level 0，均不給分
                    if (isCorrect) { grade = 'S'; comment = '復活成功！免除死刑！'; points = 0; newLevel = 1; } 
                    else { grade = 'D'; comment = '復活失敗！乖乖重練！'; points = 0; newLevel = 0; }
                } else {
                    // 正規戰鬥
                    let overdueDays = 0;
                    if (currentWord.nextReview) overdueDays = Math.floor((virtualDate - currentWord.nextReview) / (24 * 60 * 60 * 1000));

                    if (isCorrect) {
                        if (fromSpelling || time <= 2000) { grade = 'S'; points = 50; comment = fromSpelling ? '完美拼寫！' : '秒殺！太神啦！'; newLevel = Math.min(INTERVALS.length - 1, newLevel + 2); } 
                        else if (time <= 5000) { grade = 'A'; points = 30; comment = '非常流暢！'; newLevel = Math.min(INTERVALS.length - 1, newLevel + 1); } 
                        else { grade = 'B'; points = 10; comment = '回想較久，再多練練！'; newLevel = Math.max(1, newLevel); }
                        
                        if (overdueDays >= 2 && (grade === 'S' || grade === 'A')) {
                            points += 20; newLevel = Math.min(INTERVALS.length - 1, newLevel + 1); comment = '記憶力超強！(遲到紅利)'; isOverdueBonus = true;
                        }
                        if (newLevel === INTERVALS.length - 1) newStatus = 'mastered';
                    } else {
                        if (time <= 2000 && !fromSpelling) { grade = 'C'; points = -5; comment = '太心急猜錯囉！'; newLevel = 0; } 
                        else { grade = 'D'; points = -10; comment = fromSpelling ? '拼錯囉！' : '完全忘記，打回冷宮！'; newLevel = 0; }
                    }
                }

                const daysToAdd = INTERVALS[newLevel];
                const nextReviewTime = virtualDate + (daysToAdd * 24 * 60 * 60 * 1000);

                const payload = { points, newLevel, newStatus, nextReviewTime, currentWordId: currentWord.id };
                setShowResult({ grade, points, comment, isCorrect, payload, isOverdueBonus });
            };

            const proceedToNextCard = async () => {
                if (!showResult) return;
                const { payload } = showResult;

                if (!isPracticeMode) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { 
                        score: Math.max(0, currentUser.score + payload.points), totalReviewed: (currentUser.totalReviewed || 0) + 1 
                    });

                    const updatedWords = currentWords.map(w => w.id === payload.currentWordId ? { ...w, level: payload.newLevel, status: payload.newStatus, nextReview: payload.nextReviewTime } : w);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', currentUserId), { words: updatedWords });
                }

                setShowResult(null); 
                setSpellInput('');

                if (currentCardIndex < studyQueue.length - 1) {
                    setCurrentCardIndex(prev => prev + 1); setIsFlipped(false); setCardStartTime(Date.now()); setRecallDuration(null);
                } else {
                    if (!isPracticeMode && !isReviveMode && sessionMistakesRef.current === 0) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { score: currentUser.score + payload.points + 100 });
                    }
                    setView('result'); 
                }
            };

            // ================= 畫面元件 =================
            const renderLogin = () => (
                <div className="max-w-md md:max-w-2xl lg:max-w-4xl mx-auto p-6 md:p-12 animate-in fade-in zoom-in duration-300 min-h-screen flex flex-col justify-center relative">
                    <div className="absolute top-4 right-4 md:top-8 md:right-8 flex items-center gap-2">
                        <span className="text-xs font-bold text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm">
                            <Icon name="cloud_done" size={16}/> 雲端連線中
                        </span>
                    </div>

                    {passwordModalUser && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl animate-in zoom-in-95 spin-in-2">
                                <div className="flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4 mx-auto"><Icon name="lock" size={32} /></div>
                                <h3 className="text-2xl font-black text-center text-slate-800 mb-1">英雄驗證</h3>
                                <p className="text-center text-sm font-medium text-slate-500 mb-6">請輸入 <span className="text-indigo-600 font-bold">{passwordModalUser.name}</span> 的專屬密碼</p>
                                <input type="password" placeholder="輸入密碼..." value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && confirmPasswordLogin()} className={`w-full px-4 py-3 text-lg rounded-xl border-2 focus:outline-none mb-2 transition-colors ${passwordError ? 'border-rose-400 focus:border-rose-500 bg-rose-50' : 'border-slate-200 focus:border-indigo-500'}`} />
                                {passwordError && <p className="text-rose-500 text-xs font-bold mb-4 text-center">密碼錯誤，請再試一次</p>}
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setPasswordModalUser(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">取消</button>
                                    <button onClick={confirmPasswordLogin} className="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-colors">登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="text-center mb-10 md:mb-16">
                        <div className="inline-flex items-center justify-center w-20 h-20 md:w-28 md:h-28 bg-indigo-600 text-white rounded-full mb-6 shadow-lg shadow-indigo-200">
                            <Icon name="psychology" size={48} className="md:text-[64px]"/>
                        </div>
                        <h1 className="text-4xl md:text-5xl lg:text-6xl font-black text-slate-800 mb-4 tracking-tight">單字記憶傳說</h1>
                        <p className="text-slate-500 font-medium md:text-xl">加入戰場，挑戰最強修仙境界</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8">
                            <h2 className="text-sm md:text-base font-bold text-slate-400 mb-6 uppercase tracking-wider flex items-center gap-2">
                                <Icon name="group" size={20}/> 選擇現有英雄
                            </h2>
                            <div className="space-y-4 max-h-[40vh] overflow-y-auto pr-2">
                                {users.length === 0 && <p className="text-slate-400 font-medium text-center py-4">尚無英雄，請先創建</p>}
                                {users.map(user => (
                                    <button key={user.id} onClick={() => { if (!user.password) { setCurrentUserId(user.id); setView('dashboard'); } else { setPasswordModalUser(user); setInputPassword(''); setPasswordError(false); } }} className="w-full flex items-center justify-between p-4 md:p-5 rounded-2xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left group">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-14 h-14 md:w-16 md:h-16 flex-shrink-0 rounded-full flex items-center justify-center overflow-hidden border-2 border-white shadow-sm ${getRankInfo(user.score).bg} ${getRankInfo(user.score).color}`}>
                                                {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover" alt={user.name} /> : <Icon name="person" size={28} />}
                                            </div>
                                            <div>
                                                <div className="font-bold text-slate-800 text-lg md:text-xl">{user.name}</div>
                                                <div className={`text-sm font-bold mt-1 ${getRankInfo(user.score).color}`}>{getRankInfo(user.score).title} ({user.score} PT)</div>
                                            </div>
                                        </div>
                                        <Icon name={user.password ? "lock" : "play_arrow"} size={28} className="text-slate-300 group-hover:text-indigo-500 transition-colors" />
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-100 rounded-3xl p-6 md:p-8 flex flex-col justify-center">
                            <h2 className="text-sm md:text-base font-bold text-slate-400 mb-6 uppercase tracking-wider flex items-center gap-2">
                                <Icon name="person_add" size={20} /> 創建新英雄
                            </h2>
                            <div className="flex flex-col gap-4">
                                <div className="flex justify-center mb-2">
                                    <label className="relative cursor-pointer group">
                                        <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-white border-4 border-slate-200 shadow-sm flex items-center justify-center overflow-hidden transition-transform group-hover:scale-105">
                                            {newUserAvatar ? <img src={newUserAvatar} alt="Preview" className="w-full h-full object-cover" /> : <Icon name="add_a_photo" size={32} className="text-slate-400" />}
                                        </div>
                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => setNewUserAvatar(reader.result); reader.readAsDataURL(file); } }} />
                                        <div className="absolute -bottom-2 bg-slate-800 text-white text-[10px] px-3 py-1 rounded-full left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none">上傳頭貼</div>
                                    </label>
                                </div>
                                <input type="text" placeholder="輸入英雄名稱..." value={newUserName} onChange={(e) => setNewUserName(e.target.value)} className="w-full px-5 py-4 text-base md:text-lg rounded-xl border-2 border-transparent focus:border-indigo-500 focus:outline-none shadow-sm" />
                                <input type="password" placeholder="設定通關密碼..." value={newUserPassword} onChange={(e) => setNewUserPassword(e.target.value)} className="w-full px-5 py-4 text-base md:text-lg rounded-xl border-2 border-transparent focus:border-indigo-500 focus:outline-none shadow-sm" />
                                <button onClick={async () => { if (!newUserName.trim() || !newUserPassword.trim()) return; const newUser = { id: Date.now().toString(), name: newUserName.trim(), password: newUserPassword.trim(), score: 0, totalReviewed: 0, lastStudyDate: null, dailyBatches: 0, avatar: newUserAvatar }; await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', newUser.id), newUser); const initialStats = globalWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null })); await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', newUser.id), { words: initialStats }); setNewUserName(''); setNewUserPassword(''); setNewUserAvatar(null); setCurrentUserId(newUser.id); setView('dashboard'); }} disabled={!newUserName.trim() || !newUserPassword.trim()} className={`w-full text-white px-6 py-4 rounded-xl text-lg font-bold transition-all shadow-md ${newUserName.trim() && newUserPassword.trim() ? 'bg-slate-800 hover:bg-slate-900' : 'bg-slate-300 cursor-not-allowed'}`}>
                                    註冊並出發
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderSettings = () => {
                if (!isSettingsUnlocked) {
                    return (
                        <div className="min-h-screen flex items-center justify-center p-6 animate-in fade-in">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-xl border border-slate-100 text-center">
                                <Icon name="admin_panel_settings" size={64} className="text-indigo-600 mb-4" />
                                <h2 className="text-2xl font-black text-slate-800 mb-2">家長控制台</h2>
                                <p className="text-sm text-slate-500 mb-6">請輸入家長管理密碼以修改學習參數。<br/>(系統預設密碼為 <strong className="text-indigo-600">123456</strong>)</p>
                                <input type="password" placeholder="輸入家長密碼" value={settingsUnlockCode} onChange={e => setSettingsUnlockCode(e.target.value)} onKeyDown={e => e.key === 'Enter' && (settingsUnlockCode === parentPassword ? (setIsSettingsUnlocked(true), setSettingsUnlockError(false)) : setSettingsUnlockError(true))} className={`w-full px-5 py-4 text-lg rounded-xl border-2 mb-2 focus:outline-none text-center ${settingsUnlockError ? 'border-rose-400 bg-rose-50' : 'border-slate-200 focus:border-indigo-500'}`} />
                                {settingsUnlockError && <p className="text-rose-500 text-xs font-bold mb-4">密碼錯誤，請重試！</p>}
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setView('dashboard')} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">返回</button>
                                    <button onClick={() => settingsUnlockCode === parentPassword ? (setIsSettingsUnlocked(true), setSettingsUnlockError(false)) : setSettingsUnlockError(true)} className="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md">解鎖進入</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="max-w-md md:max-w-3xl lg:max-w-5xl mx-auto p-6 md:p-8 animate-in fade-in duration-300 pb-32">
                        <div className="bg-white rounded-3xl shadow-xl p-6 md:p-10 border border-slate-100">
                            <div className="flex items-center justify-between mb-8 pb-6 border-b border-slate-100">
                                <div className="flex items-center gap-3">
                                    <Icon name="settings_suggest" size={36} className="text-indigo-600" />
                                    <h2 className="text-3xl font-black text-slate-800">家長控制台</h2>
                                </div>
                                <button onClick={() => setView('dashboard')} className="p-2 text-slate-400 hover:text-slate-800"><Icon name="close" size={28} /></button>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-10 md:gap-16">
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><Icon name="tune" /> 學習參數調整</h3>
                                    <div className="space-y-8 mb-8">
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">每次挑戰釋放的新單字數 (配額)</label>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="1" max="50" value={localSettings.newWordsPerBatch} onChange={e => setLocalSettings({...localSettings, newWordsPerBatch: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                <span className="font-black text-2xl text-indigo-600 w-12 text-right">{localSettings.newWordsPerBatch}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">每日最高可戰鬥次數 (超過則進練功房)</label>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="1" max="10" value={localSettings.maxBatchesPerDay} onChange={e => setLocalSettings({...localSettings, maxBatchesPerDay: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                <span className="font-black text-2xl text-indigo-600 w-12 text-right">{localSettings.maxBatchesPerDay}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">每次挑戰最多切塊幾題「積欠舊字」</label>
                                            <div className="flex items-center gap-4">
                                                <input type="range" min="5" max="50" step="5" value={localSettings.maxReviewsPerBatch} onChange={e => setLocalSettings({...localSettings, maxReviewsPerBatch: parseInt(e.target.value)})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                                <span className="font-black text-2xl text-indigo-600 w-12 text-right">{localSettings.maxReviewsPerBatch}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-slate-700 mb-2">變更家長管理密碼</label>
                                            <input type="password" placeholder="若不更改請留白" value={newParentPwd} onChange={e => setNewParentPwd(e.target.value)} className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-indigo-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    <button onClick={async () => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { settings: localSettings, parentPassword: newParentPwd.trim() || parentPassword }); alert('⚙️ 家長設定已成功儲存並同步至雲端！'); setView('dashboard'); }} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-colors">儲存上述設定</button>

                                    <div className="mt-12 bg-slate-50 border border-slate-200 p-6 rounded-2xl">
                                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="vpn_key" /> 英雄管理 (重設密碼)</h3>
                                        <div className="space-y-3 max-h-48 overflow-y-auto pr-2">
                                            {users.map(u => (
                                                <div key={u.id} className="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                                    <span className="font-bold text-slate-700">{u.name}</span>
                                                    <button onClick={() => handleAdminResetPassword(u.id)} className="bg-rose-100 text-rose-600 font-bold px-3 py-1.5 rounded-lg text-sm hover:bg-rose-200 transition-colors">重設密碼</button>
                                                </div>
                                            ))}
                                            {users.length === 0 && <span className="text-slate-400 text-sm">尚無英雄</span>}
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <div className="bg-amber-50 rounded-2xl p-6 border border-amber-100 h-full flex flex-col">
                                        <h3 className="text-xl font-bold text-amber-800 mb-3 flex items-center gap-2"><Icon name="auto_fix_high" /> 智能 PDF 文字解析引擎</h3>
                                        <p className="text-sm text-amber-700 mb-4 leading-relaxed">不管 PDF 複製出來的文字左右欄有多亂，只要整坨貼在下方，AI 演算法就會自動梳理並匯入！</p>
                                        <textarea value={smartText} onChange={e => setSmartText(e.target.value)} placeholder="請直接從 PDF 複製文字並貼在這裡..." className="flex-1 w-full p-4 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-sm text-slate-600 resize-none min-h-[200px] mb-4"></textarea>
                                        <button onClick={async () => { setIsImporting(true); const count = await handleSmartImport(smartText); if (count > 0) { alert(`🎉 神奇！成功萃取出 ${count} 個新單字！`); setSmartText(''); } else if (count === 0) { alert('匯入的單字都已經存在了喔！'); } else { alert('⚠️ 找不到符合格式的單字。'); } setIsImporting(false); }} disabled={isImporting || !smartText.trim()} className={`w-full py-4 font-black text-white rounded-xl shadow-md transition-colors flex justify-center items-center gap-2 ${isImporting || !smartText.trim() ? 'bg-amber-300 cursor-not-allowed' : 'bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600'}`}>
                                            {isImporting ? <Icon name="hourglass_empty" className="animate-spin" /> : <Icon name="magic_button" />}
                                            {isImporting ? '演算法解析中...' : '一鍵智能萃取單字'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderDashboard = () => {
                const rank = getRankInfo(currentUser.score);
                const canDoMoreRounds = currentBatches < settings.maxBatchesPerDay;
                
                return (
                    <div className="max-w-md md:max-w-3xl lg:max-w-5xl mx-auto p-6 md:p-8 animate-in fade-in duration-300 pb-28">
                        <div className="flex items-center justify-between mb-8 md:mb-12 bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-100 relative">
                            <button onClick={() => { setSettingsUnlockCode(''); setSettingsUnlockError(false); setIsSettingsUnlocked(false); setView('settings'); }} className="absolute top-4 right-16 md:top-6 md:right-20 p-2 text-slate-300 hover:text-indigo-600 transition-colors" title="家長設定">
                                <Icon name="settings" size={28} />
                            </button>
                            <button onClick={() => { setCurrentUserId(null); setView('login'); }} className="absolute top-4 right-4 md:top-6 md:right-6 p-2 text-slate-300 hover:text-rose-500 transition-colors" title="登出">
                                <Icon name="logout" size={28} />
                            </button>

                            <div className="flex items-center gap-4">
                                <label className="relative cursor-pointer group">
                                    <div className={`w-16 h-16 md:w-20 md:h-20 flex-shrink-0 rounded-full flex items-center justify-center shadow-inner overflow-hidden border-4 border-white ${rank.bg} ${rank.color}`}>
                                        {currentUser.avatar ? <img src={currentUser.avatar} alt={currentUser.name} className="w-full h-full object-cover group-hover:opacity-50 transition-opacity" /> : <Icon name="emoji_events" size={40} className="group-hover:opacity-50 transition-opacity" />}
                                    </div>
                                    <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10"><Icon name="photo_camera" size={28} className="text-slate-800 drop-shadow-md" /></div>
                                    <input type="file" accept="image/*" className="hidden" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = async () => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUserId), { avatar: reader.result }); }; reader.readAsDataURL(file); } }} />
                                </label>
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">{currentUser.name}</h1>
                                    <span className={`text-sm md:text-base font-bold px-3 py-1 rounded-full mt-2 inline-block ${rank.bg} ${rank.color}`}>{rank.title} | {currentUser.score} PT</span>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                            <div className="bg-indigo-50 rounded-3xl p-6 text-center shadow-sm border border-indigo-100 relative overflow-hidden flex flex-col justify-center">
                                <div className="text-5xl md:text-6xl font-black text-indigo-600 mb-2">{dueReviewsTotal.length}</div>
                                <div className="text-sm md:text-base font-bold text-indigo-800 flex items-center justify-center gap-1"><Icon name="replay" size={18} /> 待複習總數</div>
                                {dueReviewsTotal.length > settings.maxReviewsPerBatch && <div className="absolute top-2 right-2 bg-indigo-200 text-indigo-800 text-[10px] px-2 py-1 rounded-full font-bold">已切塊</div>}
                            </div>
                            <div className="bg-rose-50 rounded-3xl p-6 text-center shadow-sm border border-rose-100 relative flex flex-col justify-center">
                                <div className="text-5xl md:text-6xl font-black text-rose-600 mb-2">{failedWordsTotal.length}</div>
                                <div className="text-sm md:text-base font-bold text-rose-800 flex items-center justify-center gap-1"><Icon name="healing" size={18} /> 冷宮總數</div>
                            </div>
                            <div className="bg-amber-50 rounded-3xl p-6 text-center shadow-sm border border-amber-100 col-span-2 md:col-span-1 flex flex-col justify-center">
                                <div className="text-5xl md:text-6xl font-black text-amber-600 mb-2">{currentBatches} / {settings.maxBatchesPerDay}</div>
                                <div className="text-sm md:text-base font-bold text-amber-800 flex items-center justify-center gap-1"><Icon name="auto_awesome" size={18}/> 今日正規戰鬥</div>
                            </div>
                        </div>

                        {dashboardQueueTotal.length === 0 ? (
                            <div className="w-full py-6 rounded-2xl text-xl font-bold bg-slate-200 text-slate-400 flex flex-col items-center justify-center gap-1 mb-8">全數殲滅，太神啦！</div>
                        ) : (
                            <div className="grid md:grid-cols-2 gap-4 mb-8">
                                <button onClick={() => handleStartSession('flashcard')} className={`w-full py-5 md:py-6 rounded-2xl text-xl font-black shadow-lg transition-transform hover:scale-[1.02] flex items-center justify-center gap-2 ${canDoMoreRounds ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white' : 'bg-slate-300 text-slate-700'}`}>
                                    <Icon name={canDoMoreRounds ? "play_arrow" : "fitness_center"} size={32} /> 
                                    {canDoMoreRounds ? '開始本輪戰鬥 (翻牌)' : '進入練功房 (翻牌/不計分)'}
                                </button>
                                <button onClick={() => handleStartSession('spelling')} className={`w-full py-5 md:py-6 rounded-2xl text-xl font-black shadow-lg transition-transform hover:scale-[1.02] flex items-center justify-center gap-2 ${canDoMoreRounds ? 'bg-gradient-to-r from-emerald-500 to-teal-600 text-white' : 'bg-slate-300 text-slate-700'}`}>
                                    <Icon name="keyboard" size={32} />
                                    {canDoMoreRounds ? '拼寫特訓 (鍵盤)' : '進入練功房 (鍵盤/不計分)'}
                                </button>
                            </div>
                        )}

                        <div className="bg-slate-800 rounded-3xl p-6 md:p-8 shadow-xl text-white max-w-2xl mx-auto">
                            <div className="flex items-center justify-between mb-4">
                                <span className="text-base md:text-lg font-bold flex items-center gap-2 text-indigo-300"><Icon name="calendar_today" size={20} /> 精神時光屋 (演算法測試)</span>
                                <span className="text-sm font-mono bg-slate-700 px-3 py-1.5 rounded-lg text-indigo-100">{new Date(virtualDate).toLocaleDateString()}</span>
                            </div>
                            <p className="text-sm md:text-base text-slate-400 mb-6 leading-relaxed">按下快轉將時間往後推 24 小時。用於測試遺忘曲線或製造「積欠單字」來測試遲到紅利效果！</p>
                            <button onClick={() => setVirtualDate(prev => prev + (24 * 60 * 60 * 1000))} className="w-full bg-slate-700 hover:bg-indigo-500 text-white text-base md:text-lg font-bold py-4 rounded-xl transition-colors flex justify-center items-center gap-2">
                                <Icon name="fast_forward" /> 快轉時間 (+24 小時)
                            </button>
                        </div>
                    </div>
                );
            };

            const renderStudy = () => {
                const currentWord = studyQueue[currentCardIndex];
                if (!currentWord) return null;

                return (
                    <div className="max-w-md md:max-w-2xl lg:max-w-4xl mx-auto p-4 md:p-8 flex flex-col h-[100dvh] md:h-auto md:min-h-screen relative">
                        <div className="flex justify-between items-center mb-6 md:mb-10 mt-4">
                            <button onClick={() => setView('dashboard')} className="p-2 md:px-4 md:py-2 text-slate-400 hover:text-slate-700 hover:bg-slate-200 rounded-xl transition-colors flex items-center gap-2 text-sm md:text-base font-bold"><Icon name="logout" size={20} /> 撤退</button>
                            <div className="text-sm md:text-base font-bold text-indigo-600 bg-indigo-50 px-4 md:px-6 py-2 rounded-full border border-indigo-100 flex items-center gap-2">
                                {isPracticeMode && <span className="bg-slate-500 text-white text-[10px] md:text-xs px-2 py-0.5 rounded uppercase">練功房</span>}
                                {isReviveMode && <span className="bg-rose-500 text-white text-[10px] md:text-xs px-2 py-0.5 rounded uppercase flex items-center gap-1"><Icon name="skull" size={12}/> 敗部復活戰</span>}
                                {!isPracticeMode && !isReviveMode && currentWord.isNewBatch && <span className="bg-amber-500 text-white text-[10px] md:text-xs px-2 py-0.5 rounded uppercase">✨ 全新單字</span>}
                                進度: {currentCardIndex + 1} / {studyQueue.length}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center w-full relative perspective-1000">
                            {/* 結果覆蓋層 (強制點擊按鈕才能下一題) */}
                            {showResult && (
                                <div className="absolute inset-[-20px] z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm animate-in fade-in duration-200">
                                    <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-2xl text-center border-4 border-white animate-in zoom-in spin-in-6 duration-300 flex flex-col items-center max-w-sm w-full mx-4">
                                        <div className={`text-6xl md:text-8xl font-black mb-4 ${showResult.grade === 'S' ? 'text-amber-500 drop-shadow-lg' : showResult.grade === 'A' ? 'text-blue-500' : showResult.grade === 'B' ? 'text-emerald-500' : 'text-rose-500'}`}>{showResult.grade} 級</div>
                                        <div className="text-xl md:text-2xl font-bold text-slate-800 mb-2">{showResult.comment}</div>
                                        
                                        {!isPracticeMode && !isReviveMode && (
                                            <div className={`text-2xl md:text-3xl font-black mb-2 ${showResult.points > 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{showResult.points > 0 ? '+' : ''}{showResult.points} PT</div>
                                        )}
                                        {isReviveMode && <div className="text-lg font-bold text-slate-500 mb-2">0 PT (復活不計分)</div>}
                                        
                                        {showResult.isOverdueBonus && <div className="text-sm md:text-base font-bold text-amber-600 mb-2 animate-bounce bg-amber-50 px-4 py-1.5 rounded-full inline-block border border-amber-200">🔥 遲到記憶紅利，大跳級！</div>}
                                        
                                        {studyMode === 'spelling' && !showResult.isCorrect && (
                                            <div className="mt-4 bg-rose-50 border border-rose-200 p-3 rounded-xl">
                                                <div className="text-sm text-rose-500 font-bold mb-1">正確答案應為：</div>
                                                <div className="text-2xl font-black text-rose-700">{payload?.currentWordId ? currentWords.find(w=>w.id===payload.currentWordId)?.word : ''}</div>
                                            </div>
                                        )}

                                        {/* 強制下一題按鈕 */}
                                        <button onClick={proceedToNextCard} className="mt-8 bg-indigo-600 text-white font-black py-4 px-12 rounded-2xl text-xl w-full hover:bg-indigo-700 hover:scale-105 transition-transform shadow-lg flex justify-center items-center gap-2">
                                            下一題 <Icon name="arrow_forward" />
                                        </button>
                                    </div>
                                </div>
                            )}

                            {studyMode === 'spelling' ? (
                                /* 拼寫模式卡片 */
                                <div className={`w-full bg-white p-8 rounded-[2rem] md:rounded-[3rem] shadow-xl h-[60vh] md:h-[500px] flex flex-col items-center justify-center transition-all ${showResult ? 'opacity-50 scale-95 blur-sm' : ''}`}>
                                    <h3 className="text-4xl md:text-6xl font-black text-slate-800 mb-4">{currentWord.translation}</h3>
                                    <span className="bg-indigo-50 text-indigo-600 font-bold px-4 py-1.5 rounded-lg mb-8">{currentWord.pos}</span>
                                    
                                    <div className="text-4xl md:text-6xl font-mono text-slate-300 mb-8 tracking-widest break-all text-center px-4">{generateBlanks(currentWord.word)}</div>
                                    
                                    <input type="text" value={spellInput} onChange={e => setSpellInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && submitSpell()} className="w-full max-w-sm text-center text-3xl md:text-4xl font-black border-b-4 border-slate-300 focus:border-indigo-500 focus:outline-none py-2 mb-8 bg-transparent text-slate-800" placeholder="輸入英文..." autoFocus={!showResult} autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" />
                                    
                                    <button onClick={submitSpell} disabled={!spellInput.trim()} className={`font-bold py-4 px-10 rounded-xl text-xl shadow-md transition-colors ${spellInput.trim() ? 'bg-slate-800 text-white hover:bg-slate-900' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>確認答案</button>
                                </div>
                            ) : (
                                /* 翻牌模式卡片 */
                                <div onClick={() => { if (!isFlipped && !showResult) { setIsFlipped(true); setRecallDuration(Date.now() - cardStartTime); } }} className={`w-full h-[60vh] md:h-[500px] lg:h-[600px] rounded-[2rem] md:rounded-[3rem] shadow-xl transition-all duration-500 flex flex-col items-center justify-center p-8 md:p-12 text-center relative overflow-hidden preserve-3d ${isFlipped ? 'bg-white border-4 border-indigo-100' : 'bg-slate-800 hover:bg-slate-900 cursor-pointer'} ${showResult ? 'opacity-50 scale-95 blur-sm' : ''}`}>
                                    {!isFlipped ? (
                                        <div className="animate-in fade-in duration-300 flex flex-col items-center justify-center w-full h-full">
                                            <span className="text-slate-400 text-sm md:text-base font-bold mb-6 block tracking-widest bg-slate-700/50 px-4 py-1.5 rounded-full">{currentWord.category}</span>
                                            <h2 className="text-6xl md:text-8xl lg:text-9xl font-black text-white tracking-tight">{currentWord.word}</h2>
                                            <div className="absolute bottom-8 text-slate-400 text-base md:text-xl flex items-center gap-2 animate-pulse font-medium"><Icon name="flip_camera_android" size={24} /> 點擊翻開</div>
                                        </div>
                                    ) : (
                                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-300 w-full flex flex-col justify-center h-full">
                                            <h2 className="text-5xl md:text-7xl font-black text-slate-800 mb-4">{currentWord.word}</h2>
                                            <div className="flex items-center justify-center gap-3 mb-6 text-indigo-600 font-bold"><span className="bg-indigo-50 px-4 py-1.5 md:text-xl rounded-lg">{currentWord.pos}</span></div>
                                            {recallDuration && <div className={`text-sm md:text-lg font-black px-5 py-2.5 rounded-full inline-block mb-8 shadow-sm mx-auto ${recallDuration < 2000 ? 'bg-amber-100 text-amber-800 border border-amber-200' : recallDuration < 5000 ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>⏱️ 反應: {(recallDuration / 1000).toFixed(1)} 秒</div>}
                                            <h3 className="text-4xl md:text-6xl font-black text-slate-700">{currentWord.translation}</h3>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 翻牌模式的對錯按鈕 */}
                        {studyMode === 'flashcard' && (
                            <div className={`mt-8 md:mt-12 mb-10 transition-all duration-300 ${isFlipped && !showResult ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}>
                                <div className="grid grid-cols-2 gap-4 md:gap-8 max-w-2xl mx-auto">
                                    <button onClick={() => evaluateAnswer(false, false)} className="flex flex-col items-center justify-center p-6 md:p-8 rounded-3xl bg-white border-2 border-rose-100 text-rose-600 hover:bg-rose-50 hover:border-rose-300 hover:shadow-md transition-all active:scale-95">
                                        <Icon name="cancel" size={40} className="mb-3 md:mb-4" />
                                        <span className="text-xl md:text-2xl font-black">答錯了</span>
                                        <span className="text-sm md:text-base font-medium text-rose-400 mt-2">打回冷宮</span>
                                    </button>
                                    <button onClick={() => evaluateAnswer(true, false)} className="flex flex-col items-center justify-center p-6 md:p-8 rounded-3xl bg-white border-2 border-emerald-100 text-emerald-600 hover:bg-emerald-50 hover:border-emerald-300 hover:shadow-md transition-all active:scale-95">
                                        <Icon name="check_circle" size={40} className="mb-3 md:mb-4" />
                                        <span className="text-xl md:text-2xl font-black">答對了</span>
                                        <span className="text-sm md:text-base font-medium text-emerald-400 mt-2">結算給分</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderResult = () => {
                const isPerfect = sessionMistakesRef.current === 0;
                const mistakes = sessionMistakesRef.current;
                const canDoRevive = !isPracticeMode && !isReviveMode && mistakes > 0 && mistakes <= 3; // 錯 1~3 題才能復活

                if (isPracticeMode || isReviveMode) {
                    return (
                        <div className="max-w-md md:max-w-2xl mx-auto p-6 flex flex-col items-center justify-center min-h-screen text-center animate-in fade-in zoom-in duration-500">
                            <div className="bg-slate-100 w-full p-8 md:p-12 rounded-[3rem] shadow-md border-4 border-slate-200 mb-8">
                                <Icon name="fitness_center" size={80} className="text-slate-400 mx-auto mb-6" />
                                <h1 className="text-3xl md:text-4xl font-black text-slate-700 mb-2">{isReviveMode ? '復活戰結束！' : '練功完成！'}</h1>
                                <p className="text-lg font-bold text-slate-500 mb-6">持續熟悉單字，實力默默累積中！</p>
                                <div className="bg-white inline-block px-6 py-3 rounded-full shadow-sm font-black text-xl text-slate-500">失誤次數: {mistakes} 題</div>
                            </div>
                            <button onClick={() => setView('dashboard')} className="w-full bg-slate-800 text-white py-5 rounded-2xl text-xl font-black shadow-lg hover:bg-slate-900 transition-colors flex justify-center items-center gap-2">
                                <Icon name="home" size={28} /> 返回主堡
                            </button>
                        </div>
                    );
                }

                return (
                    <div className="max-w-md md:max-w-2xl mx-auto p-6 flex flex-col items-center justify-center min-h-screen text-center animate-in fade-in zoom-in duration-500">
                        {isPerfect ? (
                            <div className="bg-amber-50 w-full p-8 md:p-12 rounded-[3rem] shadow-xl border-4 border-amber-200 mb-8">
                                <Icon name="workspace_premium" size={100} className="text-yellow-400 drop-shadow-lg mx-auto mb-6 animate-bounce" />
                                <h1 className="text-4xl md:text-5xl font-black text-amber-600 mb-2">完美通關！</h1>
                                <p className="text-lg font-bold text-amber-500 mb-6">神級記憶力，零失誤達成</p>
                                <div className="bg-white inline-block px-6 py-3 rounded-full shadow-sm font-black text-2xl text-emerald-500">+100 完美積分</div>
                            </div>
                        ) : (
                            <div className="bg-slate-100 w-full p-8 md:p-12 rounded-[3rem] shadow-md border-4 border-slate-200 mb-8">
                                <Icon name="health_and_safety" size={80} className="text-indigo-400 mx-auto mb-6" />
                                <h1 className="text-3xl md:text-4xl font-black text-slate-700 mb-2">戰鬥結算</h1>
                                <p className="text-lg font-bold text-slate-500 mb-6">跌倒了再站起來，下次會更好！</p>
                                <div className="bg-white inline-block px-6 py-3 rounded-full shadow-sm font-black text-xl text-rose-500">失誤次數: {mistakes} 題</div>
                            </div>
                        )}

                        {isPerfect ? (
                            <div className="w-full">
                                <button onClick={() => setView('dashboard')} className="w-full bg-slate-800 text-white py-5 rounded-2xl text-xl font-black shadow-lg hover:bg-slate-900 transition-colors flex justify-center items-center gap-2 mb-4">
                                    <Icon name="home" size={28} /> 返回主堡
                                </button>
                            </div>
                        ) : canDoRevive ? (
                            <div className="w-full">
                                <p className="text-slate-500 font-bold mb-4">你只錯了 {mistakes} 題，差一點就完美了！</p>
                                <button onClick={handleStartReviveChallenge} className="w-full bg-gradient-to-r from-rose-500 to-pink-600 text-white py-5 rounded-2xl text-xl font-black shadow-lg hover:scale-105 transition-transform flex justify-center items-center gap-2 mb-4">
                                    <Icon name="skull" size={28} /> 進入【敗部復活戰】 (免除死刑)
                                </button>
                                <button onClick={() => setView('dashboard')} className="w-full py-4 text-slate-400 font-bold hover:text-slate-600 transition-colors">算了，打回冷宮</button>
                            </div>
                        ) : (
                            <div className="w-full">
                                <p className="text-slate-400 font-medium mb-6 px-4">失誤超過 3 題，無緣敗部復活！休息一下明天再來吧。</p>
                                <button onClick={() => setView('dashboard')} className="w-full bg-slate-800 text-white py-5 rounded-2xl text-xl font-black shadow-lg hover:bg-slate-900 transition-colors flex justify-center items-center gap-2">
                                    <Icon name="home" size={28} /> 返回主堡
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            const renderLibrary = () => (
                <div className="max-w-md md:max-w-3xl lg:max-w-5xl mx-auto p-6 md:p-8 animate-in fade-in duration-300 pb-28 md:pb-32">
                    
                    <div className="flex justify-end mb-4">
                        {!isLibraryAdmin ? (
                            <button onClick={() => setShowLibraryLogin(!showLibraryLogin)} className="text-sm font-bold text-slate-400 hover:text-indigo-600 flex items-center gap-1 transition-colors bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-100">
                                <Icon name="lock" size={16} /> 進入管理員模式 (擴充題庫)
                            </button>
                        ) : (
                            <button onClick={() => setIsLibraryAdmin(false)} className="text-sm font-bold text-emerald-600 hover:text-emerald-700 flex items-center gap-1 transition-colors bg-emerald-50 px-3 py-1.5 rounded-full shadow-sm border border-emerald-100">
                                <Icon name="lock_open" size={16} /> 已解鎖管理員模式 (點擊鎖定)
                            </button>
                        )}
                    </div>

                    {showLibraryLogin && !isLibraryAdmin && (
                        <div className="bg-white border border-slate-200 p-4 rounded-2xl mb-6 flex flex-col md:flex-row gap-3 animate-in fade-in slide-in-from-top-4 shadow-md max-w-md ml-auto">
                            <input 
                                type="password" 
                                placeholder="輸入家長/管理員密碼..." 
                                value={libraryUnlockCode} 
                                onChange={e=>setLibraryUnlockCode(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && (libraryUnlockCode === parentPassword ? (setIsLibraryAdmin(true), setShowLibraryLogin(false), setLibraryUnlockCode(''), setLibraryUnlockError(false)) : setLibraryUnlockError(true))}
                                className={`flex-1 px-4 py-2.5 rounded-xl border-2 focus:outline-none ${libraryUnlockError ? 'border-rose-400 bg-rose-50' : 'bg-slate-50 border-slate-200 focus:border-indigo-400'}`} 
                            />
                            <div className="flex gap-2">
                                <button onClick={() => setShowLibraryLogin(false)} className="bg-slate-100 text-slate-600 px-4 py-2.5 rounded-xl font-bold hover:bg-slate-200">取消</button>
                                <button onClick={() => libraryUnlockCode === parentPassword ? (setIsLibraryAdmin(true), setShowLibraryLogin(false), setLibraryUnlockCode(''), setLibraryUnlockError(false)) : setLibraryUnlockError(true)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-md hover:bg-indigo-700">解鎖</button>
                            </div>
                        </div>
                    )}

                    {isLibraryAdmin && (
                        <div className="bg-indigo-50 border-2 border-indigo-100 rounded-3xl p-6 md:p-8 mb-8 shadow-sm animate-in fade-in zoom-in-95">
                            <h3 className="text-xl md:text-2xl font-black text-indigo-800 mb-6 flex items-center gap-2">
                                <Icon name="admin_panel_settings" size={28} /> 管理員擴充專區
                            </h3>
                            
                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 col-span-1 md:col-span-2">
                                    <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="edit_square" size={20} className="text-indigo-500"/> 手動新增單筆</h4>
                                    <div className="space-y-3">
                                        <div className="flex flex-col md:flex-row gap-2">
                                            <input type="text" placeholder="單字 (必填)" value={manualWord.word} onChange={e=>setManualWord({...manualWord, word: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-50 rounded-xl border border-transparent focus:border-indigo-300 focus:outline-none" />
                                            <input type="text" placeholder="詞性 (如 n.)" value={manualWord.pos} onChange={e=>setManualWord({...manualWord, pos: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-50 rounded-xl border border-transparent focus:border-indigo-300 focus:outline-none" />
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-2">
                                            <input type="text" placeholder="中文翻譯 (必填)" value={manualWord.translation} onChange={e=>setManualWord({...manualWord, translation: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-50 rounded-xl border border-transparent focus:border-indigo-300 focus:outline-none" />
                                            <input type="text" placeholder="單元 (如 Unit 01)" value={manualWord.category} onChange={e=>setManualWord({...manualWord, category: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-50 rounded-xl border border-transparent focus:border-indigo-300 focus:outline-none" />
                                        </div>
                                        <button onClick={handleManualAddWord} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 transition-colors mt-2 shadow-md">
                                            確認新增單字
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-indigo-600 p-5 rounded-2xl shadow-sm flex flex-col justify-between text-white relative overflow-hidden col-span-1">
                                    <div className="absolute -bottom-6 -right-6 text-indigo-400 opacity-30"><Icon name="upload_file" size={120} /></div>
                                    <div className="relative z-10">
                                        <h4 className="font-black mb-2 flex items-center gap-2"><Icon name="upload_file" size={20}/> 大量匯入 (CSV)</h4>
                                        <p className="text-xs text-indigo-100 mb-6 leading-relaxed">
                                            將 Excel 另存為 .csv 檔匯入，自動過濾重複。<br/>
                                            格式：<span className="font-mono bg-indigo-800 text-white px-1.5 py-0.5 rounded">單字,詞性,中文,分類</span>
                                        </p>
                                    </div>
                                    <label className="relative z-10 w-full bg-white text-indigo-700 hover:bg-indigo-50 font-black py-3 px-4 rounded-xl cursor-pointer transition-colors text-center shadow-lg text-sm">
                                        <input type="file" accept=".csv" className="hidden" onChange={handleCsvImport} />
                                        選擇 CSV 檔案上傳
                                    </label>
                                </div>
                            </div>

                            <div className="mt-6 bg-amber-50 border border-amber-200 p-5 rounded-2xl shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
                                <div>
                                    <h4 className="font-bold text-amber-800 mb-1 flex items-center gap-2"><Icon name="undo" size={20}/> 復原上次匯入</h4>
                                    <p className="text-xs text-amber-600">如果剛才大量匯入發生錯誤，點擊此按鈕可精準抽掉上一批匯入的單字。</p>
                                </div>
                                <button onClick={handleUndoLastImport} disabled={!lastImportBatchId} className={`w-full md:w-auto font-bold py-3 px-6 rounded-xl transition-colors shadow-md text-sm whitespace-nowrap ${lastImportBatchId ? 'bg-amber-500 text-white hover:bg-amber-600' : 'bg-amber-200 text-amber-100 cursor-not-allowed'}`}>
                                    復原最後一次匯入
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="mb-8 mt-4 flex items-end justify-between">
                        <div>
                            <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-2">全字庫檢視</h2>
                            <p className="text-slate-500 font-medium md:text-lg">目前總字數: <span className="text-indigo-600 font-bold">{globalWords.length}</span> 個 / 目標: 2000 個</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        {currentWords.map(word => (
                            <div key={word.id} className={`bg-white p-5 md:p-6 rounded-2xl shadow-sm border flex items-center justify-between hover:shadow-md transition-shadow ${word.level === 0 && word.status === 'learning' ? 'border-rose-200 bg-rose-50/30' : 'border-slate-100'}`}>
                                <div>
