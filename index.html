<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天逆珠：仙逆單字傳</title>
    
    <!-- PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <!-- 外部資源 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --gold: #facc15; /* 高亮度金 */
            --bg-dark: #020617;
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            user-select: none;
        }

        .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }

        /* 高對比按鈕 */
        .btn-gold {
            background-color: var(--gold);
            color: #000000;
            font-weight: 900;
            border-radius: 0.75rem;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }
        .btn-gold:active { transform: scale(0.95); filter: brightness(0.9); }

        .btn-slate {
            background-color: #1e293b;
            color: #ffffff;
            border: 1px solid #334155;
            border-radius: 0.75rem;
        }

        /* 琉璃面板 */
        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 修士魂碑列表 */
        .tablet-item {
            border-left: 5px solid var(--gold);
            background: linear-gradient(90deg, rgba(250, 204, 21, 0.1) 0%, transparent 100%);
            transition: all 0.3s;
        }
        .tablet-item:hover { background: rgba(250, 204, 21, 0.2); transform: translateX(5px); }

        /* 旋轉天逆珠背景 */
        .bead-effect {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            z-index: -1; transform: translate(-50%, -50%);
            animation: spin 180s linear infinite;
        }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 進度條發光 */
        .progress-glow {
            box-shadow: 0 0 10px var(--gold);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // ==========================================
        // 【仙界通道：Firebase 配置專區】
        // ==========================================
        const firebaseConfig = {
           apiKey: "AIzaSyAtvZjyKKRsfbbRPt-OI85isFuua6EV1YQ",
  authDomain: "vocab-2000.firebaseapp.com",
  projectId: "vocab-2000",
  storageBucket: "vocab-2000.firebasestorage.app",
  messagingSenderId: "459452518715",
  appId: "1:459452518715:web:2842926df8a8d73831a71e"
        };

        // 初始化 Firebase (失敗會降級到 Local 模式)
        let db = null;
        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            }
        } catch (e) { console.warn("Firebase Init Failed. Using LocalStorage."); }

        const { useState, useEffect, useRef, useMemo } = React;

        // ==========================================
        // 1. 境界數據體系 (比照仙逆)
        // ==========================================
        const QI = Array.from({ length: 15 }, (_, i) => `凝氣期 ${i + 1} 層`);
        const NORMAL = ["初期", "中期", "後期", "後期巔峰", "圓滿"];
        
        const REALMS = [
            { name: "凡人", stages: ["一介凡夫"], color: "text-slate-400" },
            { name: "凝氣", stages: QI, color: "text-emerald-400" },
            { name: "築基", stages: [...NORMAL, "假丹"], color: "text-blue-400" },
            { name: "結丹", stages: [...NORMAL, "假嬰"], color: "text-purple-400" },
            { name: "元嬰", stages: NORMAL, color: "text-pink-400" },
            { name: "化神", stages: NORMAL, color: "text-orange-400" },
            { name: "嬰變", stages: NORMAL, color: "text-rose-500" },
            { name: "問鼎", stages: NORMAL, color: "text-amber-500" },
            { name: "陰虛", stages: NORMAL, color: "text-indigo-500" },
            { name: "陽實", stages: NORMAL, color: "text-yellow-500" },
            { name: "窺涅", stages: NORMAL, color: "text-cyan-400" },
            { name: "淨涅", stages: NORMAL, color: "text-sky-400" },
            { name: "碎涅", stages: NORMAL, color: "text-indigo-400" },
            { name: "空涅", stages: NORMAL, color: "text-blue-600" },
            { name: "空靈", stages: NORMAL, color: "text-purple-600" },
            { name: "空玄", stages: NORMAL, color: "text-rose-600" },
            { name: "空劫", stages: ["大尊初期", "大尊中期", "大尊後期", "金尊", "天尊", "躍天尊"], color: "text-red-700" },
            { name: "半步踏天", stages: ["第一橋", "第二橋", "第三橋", "第四橋", "第五橋", "第六橋", "第七橋", "第八橋"], color: "text-yellow-500" },
            { name: "踏天境", stages: ["第九橋(永恆)"], color: "text-yellow-200" }
        ];

        const ALL_STAGES = REALMS.flatMap(r => r.stages.map(s => ({ name: r.name, sub: s, color: r.color })));

        // 升級積分計算：越高階越難 (指數級)
        const getNextExp = (idx) => {
            if (idx < 15) return 50 + idx * 20; // 凝氣期很快
            return Math.floor(200 * Math.pow(1.18, idx - 14) + 20 * Math.pow(idx, 2));
        };

        const getRealmByExp = (exp) => {
            let total = 0;
            for (let i = 0; i < ALL_STAGES.length; i++) {
                const req = getNextExp(i);
                if (exp < total + req) return { ...ALL_STAGES[i], idx: i, current: total, next: total + req };
                total += req;
            }
            return { ...ALL_STAGES[ALL_STAGES.length - 1], idx: ALL_STAGES.length - 1, current: total, next: Infinity };
        };

        // ==========================================
        // 2. 智慧分類功能
        // ==========================================
        const guessCat = (zh) => {
            const map = {
                "動作": ["跑", "跳", "走", "看", "說", "打", "取", "動", "修"],
                "情緒": ["怒", "喜", "憂", "傷", "愛", "恨", "驚", "恐"],
                "天氣": ["風", "雨", "雷", "電", "雲", "雪", "晴", "氣"],
                "物品": ["桌", "椅", "筆", "劍", "器", "具", "服", "物"],
                "植物": ["花", "草", "樹", "林", "木", "葉", "藥"],
                "稱謂": ["師", "兄", "弟", "父", "母", "尊", "王", "人"]
            };
            for (let k in map) { if (map[k].some(x => zh.includes(x))) return k; }
            return "其他";
        };

        // ==========================================
        // 3. 主應用核心
        // ==========================================
        const App = () => {
            const [view, setView] = useState('hall'); // hall, register, dashboard, trial, training, admin
            const [users, setUsers] = useState([]);
            const [currentUser, setCurrentUser] = useState(null);
            const [words, setWords] = useState([]);
            const [batches, setBatches] = useState([]);
            const [settings, setSettings] = useState({
                maxRounds: 3, qPerRound: 10, maxErrors: 3, adminPw: "123456"
            });

            // 初始讀取 (LocalStorage)
            useEffect(() => {
                const localData = {
                    users: JSON.parse(localStorage.getItem('xni_users') || '[]'),
                    words: JSON.parse(localStorage.getItem('xni_words') || '[]'),
                    batches: JSON.parse(localStorage.getItem('xni_batches') || '[]'),
                    settings: JSON.parse(localStorage.getItem('xni_settings') || 'null')
                };
                if (localData.users) setUsers(localData.users);
                if (localData.words) setWords(localData.words);
                if (localData.batches) setBatches(localData.batches);
                if (localData.settings) setSettings(localData.settings);
            }, []);

            // 數據儲存輔助
            const saveData = (u, w, b, s) => {
                if (u) { setUsers(u); localStorage.setItem('xni_users', JSON.stringify(u)); }
                if (w) { setWords(w); localStorage.setItem('xni_words', JSON.stringify(w)); }
                if (b) { setBatches(b); localStorage.setItem('xni_batches', JSON.stringify(b)); }
                if (s) { setSettings(s); localStorage.setItem('xni_settings', JSON.stringify(s)); }
            };

            const renderContent = () => {
                switch(view) {
                    case 'hall': return <Hall users={users} setView={setView} onLogin={(u) => { setCurrentUser(u); setView('dashboard'); }} />;
                    case 'register': return <Register onBack={() => setView('hall')} onDone={(u) => { saveData([...users, u]); setView('hall'); }} />;
                    case 'dashboard': return <Dashboard user={currentUser} settings={settings} setView={setView} words={words} onLogout={() => { setCurrentUser(null); setView('hall'); }} onUpdate={(u) => saveData(users.map(x => x.name === u.name ? u : x))} />;
                    case 'trial': return <Trial words={words} settings={settings} user={currentUser} setView={setView} onUpdate={(u) => saveData(users.map(x => x.name === u.name ? u : x))} />;
                    case 'training': return <Training words={words} user={currentUser} setView={setView} onUpdate={(u) => saveData(users.map(x => x.name === u.name ? u : x))} />;
                    case 'admin': return <AdminPanel settings={settings} setSettings={(s) => saveData(null,null,null,s)} words={words} setWords={(w) => saveData(null,w,null,null)} batches={batches} setBatches={(b) => saveData(null,null,b,null)} users={users} setUsers={(u)=>saveData(u)} setView={setView} />;
                    default: return <div className="p-10 text-center">正在神遊中...</div>;
                }
            };

            return (
                <div className="relative min-h-screen">
                    <div className="bead-effect"></div>
                    <div className="relative z-10 max-w-md mx-auto min-h-screen flex flex-col">
                        {renderContent()}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. 子組件：修士魂碑大廳 (初始頁面)
        // ==========================================
        const Hall = ({ users, setView, onLogin }) => {
            const [target, setTarget] = useState(null);
            const [pw, setPw] = useState("");

            const handleLogin = () => {
                if (pw === target.pw) {
                    onLogin(target);
                } else {
                    alert("密語有誤，神魂無法契合！");
                }
            };

            return (
                <div className="p-6 flex flex-col h-screen">
                    <header className="text-center py-10 space-y-2">
                        <h1 className="text-5xl font-calligraphy gold-text">仙魂碑大廳</h1>
                        <p className="text-slate-500 text-xs tracking-[0.4em]">點擊魂碑，喚醒神識</p>
                    </header>

                    <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                        {users.map((u, i) => {
                            const realm = getRealmByExp(u.exp);
                            return (
                                <div key={i} onClick={() => { setTarget(u); setPw(""); }} className="tablet-item glass p-4 rounded-xl cursor-pointer flex items-center space-x-4">
                                    <div className="w-12 h-12 rounded-full overflow-hidden border border-yellow-500/30">
                                        <img src={u.avatar} className="w-full h-full object-cover" />
                                    </div>
                                    <div className="flex-1">
                                        <div className="flex justify-between">
                                            <h3 className="font-bold text-lg">{u.name}</h3>
                                            <span className="text-xs text-slate-500 font-mono">積分: {u.exp}</span>
                                        </div>
                                        <p className={`text-[11px] font-black uppercase ${realm.color}`}>{realm.name}・{realm.sub}</p>
                                    </div>
                                </div>
                            );
                        })}

                        <button onClick={() => setView('register')} className="w-full py-6 border-2 border-dashed border-slate-700 rounded-xl flex flex-col items-center justify-center text-slate-500 hover:text-yellow-500 transition-all">
                            <i data-lucide="user-plus" className="mb-2"></i>
                            <span className="text-xs font-bold uppercase">註冊新修士</span>
                        </button>
                    </div>

                    {target && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
                            <div className="glass w-full max-w-xs p-8 rounded-3xl text-center space-y-6 animate-in zoom-in">
                                <h3 className="text-xl font-bold">喚醒 {target.name} 的神識</h3>
                                <input type="password" placeholder="輸入神識密語" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center focus:border-yellow-500 outline-none" value={pw} onChange={e => setPw(e.target.value)} autoFocus onKeyUp={e => e.key === 'Enter' && handleLogin()} />
                                <div className="flex space-x-2">
                                    <button onClick={() => setTarget(null)} className="flex-1 py-3 text-slate-500 text-sm">取消</button>
                                    <button onClick={handleLogin} className="flex-2 btn-gold p-3 px-8">確認進入</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 5. 子組件：註冊修士
        // ==========================================
        const Register = ({ onBack, onDone }) => {
            const [form, setForm] = useState({ name: "", pw: "", avatar: "" });

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setForm({ ...form, avatar: ev.target.result });
                    reader.readAsDataURL(file);
                }
            };

            const submit = () => {
                if (!form.name || !form.pw || !form.avatar) return alert("姓名、密碼與頭像缺一不可！");
                onDone({
                    ...form,
                    exp: 0,
                    stats: { rounds: 0, lastDate: new Date().toDateString(), spiritCount: 0 }
                });
            };

            return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen space-y-8">
                    <h2 className="text-3xl font-calligraphy gold-text">初登仙冊</h2>
                    <div className="relative group">
                        <div className="w-32 h-32 rounded-full overflow-hidden border-2 border-yellow-500 shadow-xl bg-slate-800">
                            {form.avatar ? <img src={form.avatar} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-xs text-slate-500">頭像</div>}
                        </div>
                        <input type="file" id="up" hidden onChange={handleFile} accept="image/*" />
                        <label htmlFor="up" className="absolute bottom-0 right-0 p-2 btn-gold rounded-full cursor-pointer"><i data-lucide="camera" size={16}></i></label>
                    </div>

                    <div className="w-full space-y-4">
                        <input type="text" placeholder="修士名號" className="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none focus:border-yellow-500" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                        <input type="password" placeholder="神識密語" className="w-full bg-slate-900 p-4 rounded-xl border border-white/5 outline-none focus:border-yellow-500" value={form.pw} onChange={e => setForm({...form, pw: e.target.value})} />
                    </div>

                    <div className="w-full flex space-x-4">
                        <button onClick={onBack} className="flex-1 btn-slate p-4">返回</button>
                        <button onClick={submit} className="flex-2 btn-gold p-4">烙印名號</button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 6. 子組件：修士洞府 (主畫面)
        // ==========================================
        const Dashboard = ({ user, settings, setView, words, onLogout, onUpdate }) => {
            const realm = getRealmByExp(user.exp);
            const nextLvlPoints = realm.next - realm.current;
            const currentPointsInLvl = user.exp - realm.current;
            const progress = (currentPointsInLvl / nextLvlPoints) * 100;

            // 每日重置
            useEffect(() => {
                const today = new Date().toDateString();
                if (user.stats.lastDate !== today) {
                    user.stats.rounds = 0;
                    user.stats.spiritCount = 0;
                    user.stats.lastDate = today;
                    onUpdate(user);
                }
            }, []);

            return (
                <div className="p-6 flex flex-col space-y-6 pb-24">
                    <header className="flex justify-between items-center mt-4">
                        <div className="flex items-center space-x-3">
                            <img src={user.avatar} className="w-14 h-14 rounded-full border-2 border-yellow-500 object-cover" />
                            <div>
                                <h2 className="text-xl font-bold">{user.name}</h2>
                                <p className={`text-[11px] font-black uppercase ${realm.color}`}>{realm.name}・{realm.sub}</p>
                            </div>
                        </div>
                        <button onClick={() => setView('admin')} className="p-3 glass rounded-full text-yellow-500 border border-yellow-500/20"><i data-lucide="shield-check"></i></button>
                    </header>

                    {/* 修煉進度 */}
                    <div className="glass p-6 rounded-2xl space-y-4">
                        <div className="flex justify-between items-end">
                            <span className="text-[10px] text-slate-500 uppercase tracking-widest">當前修為</span>
                            <span className="text-xs font-mono text-yellow-500">{user.exp.toLocaleString()} / {realm.next.toLocaleString()}</span>
                        </div>
                        <div className="w-full h-3 bg-slate-900 rounded-full overflow-hidden p-0.5 border border-white/5">
                            <div className="h-full bg-gradient-to-r from-yellow-700 to-yellow-400 rounded-full progress-glow transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                        </div>
                        <p className="text-[10px] text-center text-slate-500">距離突破至下一個境界還需 {realm.next - user.exp} 積分</p>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass p-4 rounded-xl text-center">
                            <p className="text-[10px] text-slate-500 uppercase">今日試煉</p>
                            <p className="text-xl font-black text-emerald-400">{user.stats.rounds} / {settings.maxRounds}</p>
                        </div>
                        <div className="glass p-4 rounded-xl text-center">
                            <p className="text-[10px] text-slate-500 uppercase">時光屋累積</p>
                            <p className="text-xl font-black text-blue-400">{user.stats.spiritCount} 題</p>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <button onClick={() => setView('trial')} className="w-full h-24 glass rounded-3xl flex items-center justify-between px-8 border-yellow-500/20 hover:border-yellow-500/50 transition-all group">
                            <div>
                                <h3 className="text-xl font-bold gold-text">三輪試煉</h3>
                                <p className="text-[10px] text-slate-500">每日突破，可獲得大量積分</p>
                            </div>
                            <div className="w-12 h-12 btn-gold rounded-full flex items-center justify-center text-black"><i data-lucide="sword"></i></div>
                        </button>

                        <button onClick={() => setView('training')} className="w-full h-24 glass rounded-3xl flex items-center justify-between px-8 border-blue-500/20 hover:border-blue-500/50 transition-all group">
                            <div>
                                <h3 className="text-xl font-bold text-blue-400">天逆空間</h3>
                                <p className="text-[10px] text-slate-500">不計分修煉，隨時磨練神識</p>
                            </div>
                            <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-black"><i data-lucide="zap"></i></div>
                        </button>
                    </div>

                    <button onClick={onLogout} className="text-slate-600 text-xs tracking-widest mt-4">神魂離體 (登出)</button>
                </div>
            );
        };

        // ==========================================
        // 7. 子組件：三輪試煉 (Trial)
        // ==========================================
        const Trial = ({ words, settings, user, setView, onUpdate }) => {
            const [round, setRound] = useState(1);
            const [step, setStep] = useState(0);
            const [qList, setQList] = useState([]);
            const [errors, setErrors] = useState([]);
            const [isRes, setIsRes] = useState(false);
            const [mode, setMode] = useState('choice'); // choice, spell
            const [spellIn, setSpellIn] = useState("");
            const [showFb, setShowFb] = useState(null);

            useEffect(() => {
                if (words.length < 10) { alert("仙冊不足 10 個單字！"); return setView('dashboard'); }
                if (user.stats.rounds >= settings.maxRounds) { alert("今日次數已達上限！"); return setView('dashboard'); }
                startRound();
            }, []);

            const startRound = () => {
                const picked = [...words].sort(() => 0.5 - Math.random()).slice(0, settings.qPerRound);
                setQList(picked); setStep(0); setErrors([]); setIsRes(false);
                setMode(Math.random() > 0.5 ? 'choice' : 'spell');
            };

            const handleAns = (isOk) => {
                if (showFb) return;
                if (isOk) {
                    setShowFb('ok');
                    user.exp += 15;
                } else {
                    setShowFb('no');
                    setErrors(p => [...p, qList[step]]);
                }

                setTimeout(() => {
                    setShowFb(null); setSpellIn("");
                    if (step + 1 < qList.length) { setStep(step + 1); }
                    else { handleRoundEnd(); }
                }, 600);
            };

            const handleRoundEnd = () => {
                const errCount = errors.length + (showFb === 'no' ? 1 : 0);
                if (errCount === 0) {
                    if (round < settings.maxRounds) {
                        alert("通關成功，進入下一輪！"); setRound(round + 1); startRound();
                    } else { finish(true); }
                } else if (errCount <= settings.maxErrors && !isRes) {
                    alert("敗部復活重生！需拼寫對所有錯誤單字。");
                    setIsRes(true); setQList([...errors]); setErrors([]); setStep(0); setMode('spell');
                } else {
                    alert("道心受損，試煉失敗！"); finish(false);
                }
            };

            const finish = (ok) => {
                user.stats.rounds += 1; onUpdate(user); setView('dashboard');
            };

            const cur = qList[step];
            if (!cur) return null;

            return (
                <div className="p-6 flex flex-col min-h-screen">
                    <header className="flex justify-between items-center mb-8">
                        <span className="text-xs text-slate-500 font-bold uppercase tracking-tighter">輪 {round} - 進度 {step+1}/{qList.length}</span>
                        {isRes && <span className="bg-red-500 px-2 py-1 rounded text-[10px] font-black uppercase">復活中</span>}
                    </header>
                    <div className="flex-1 flex flex-col items-center justify-center space-y-12">
                        <div className="text-center space-y-2">
                            <p className="text-slate-500 text-xs font-bold uppercase">{cur.cat || "修煉"}</p>
                            <h2 className="text-5xl font-bold tracking-tighter">{mode === 'choice' ? cur.en : cur.zh}</h2>
                        </div>
                        {mode === 'choice' ? (
                            <div className="w-full grid gap-4">
                                {words.slice(0, 3).concat(cur).sort(() => 0.5 - Math.random()).map((o, i) => (
                                    <button key={i} onClick={() => handleAns(o.en === cur.en)} className={`w-full py-5 glass rounded-2xl font-bold transition-all border-2 ${showFb && o.en === cur.en ? 'border-emerald-500' : 'border-transparent'}`}>{o.zh}</button>
                                ))}
                            </div>
                        ) : (
                            <input autoFocus className="w-full bg-transparent border-b-4 border-slate-700 text-4xl text-center outline-none focus:border-yellow-500 transition-all" value={spellIn} onChange={e => { setSpellIn(e.target.value); if(e.target.value.toLowerCase() === cur.en.toLowerCase()) handleAns(true); }} />
                        )}
                    </div>
                    {showFb && <div className={`fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-8xl font-black ${showFb==='ok'?'text-emerald-500':'text-red-500'} pointer-events-none z-50`}>{showFb==='ok'?'✓':'✗'}</div>}
                </div>
            );
        };

        // ==========================================
        // 8. 子組件：時光屋 (Training)
        // ==========================================
        const Training = ({ words, user, setView, onUpdate }) => {
            const [cur, setCur] = useState(null);
            const [mode, setMode] = useState('choice');

            useEffect(() => { next(); }, []);
            const next = () => {
                setCur(words[Math.floor(Math.random() * words.length)]);
                setMode(Math.random() > 0.5 ? 'choice' : 'spell');
            };

            const ans = (ok) => {
                if (ok) { user.stats.spiritCount += 1; onUpdate(user); }
                next();
            };

            if (!cur) return null;
            return (
                <div className="p-6 flex flex-col min-h-screen">
                    <header className="flex justify-between items-center">
                        <button onClick={() => setView('dashboard')} className="text-slate-500"><i data-lucide="arrow-left"></i></button>
                        <span className="text-blue-400 font-bold tracking-widest">時光屋累積: {user.stats.spiritCount} 題</span>
                    </header>
                    <div className="flex-1 flex flex-col items-center justify-center space-y-12">
                        <h2 className="text-5xl font-bold">{mode === 'choice' ? cur.en : cur.zh}</h2>
                        {mode === 'choice' ? (
                            <div className="w-full space-y-3">{words.slice(0, 3).concat(cur).sort(()=>0.5-Math.random()).map((o,i)=>(<button key={i} onClick={()=>ans(o.en===cur.en)} className="w-full py-5 glass rounded-xl font-bold">{o.zh}</button>))}</div>
                        ) : (
                            <input autoFocus className="w-full bg-transparent border-b-4 border-blue-500 text-4xl text-center outline-none" onKeyUp={e => e.key === 'Enter' && ans(e.target.value.toLowerCase() === cur.en.toLowerCase())} />
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 9. 子組件：仙界主宰 (Admin)
        // ==========================================
        const AdminPanel = ({ settings, setSettings, words, setWords, batches, setBatches, users, setUsers, setView }) => {
            const [isAuth, setIsAuth] = useState(false);
            const [pw, setPw] = useState("");

            const handleCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const content = ev.target.result;
                    const lines = content.split('\n').filter(l => l.trim());
                    const bid = Date.now();
                    const news = lines.map(l => {
                        const [en, pos, zh] = l.split(',');
                        if (!en || !zh) return null;
                        return { en: en.trim(), pos: pos.trim(), zh: zh.trim(), cat: guessCat(zh.trim()) };
                    }).filter(x => x);

                    const newWords = [...words];
                    news.forEach(n => {
                        const existIdx = newWords.findIndex(w => w.en.toLowerCase() === n.en.toLowerCase());
                        if (existIdx !== -1) {
                            if (!newWords[existIdx].zh.includes(n.zh)) newWords[existIdx].zh += `; ${n.zh}`;
                        } else {
                            newWords.push({ ...n, bid, mastery: 0 });
                        }
                    });

                    setWords(newWords);
                    localStorage.setItem('xni_words', JSON.stringify(newWords));
                    const newBatches = [...batches, { id: bid, date: new Date().toLocaleString(), count: news.length }];
                    setBatches(newBatches);
                    localStorage.setItem('xni_batches', JSON.stringify(newBatches));
                    alert(`成功感悟 ${news.length} 卷經書！`);
                };
                reader.readAsText(file);
            };

            const delBatch = (bid) => {
                if (confirm("確定要焚毀此批經書嗎？")) {
                    const nWords = words.filter(w => w.bid !== bid);
                    setWords(nWords);
                    localStorage.setItem('xni_words', JSON.stringify(nWords));
                    const nBatches = batches.filter(b => b.id !== bid);
                    setBatches(nBatches);
                    localStorage.setItem('xni_batches', JSON.stringify(nBatches));
                }
            };

            if (!isAuth) return (
                <div className="p-8 flex flex-col items-center justify-center min-h-screen space-y-6">
                    <h2 className="text-2xl font-bold gold-text">主宰密令</h2>
                    <input type="password" placeholder="輸入主宰密碼" className="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-center" value={pw} onChange={e => setPw(e.target.value)} onKeyUp={e=>e.key==='Enter' && (pw===settings.adminPw?setIsAuth(true):alert("密碼錯誤"))} />
                    <button onClick={() => pw === settings.adminPw ? setIsAuth(true) : alert("密碼錯誤")} className="w-full py-4 btn-gold">進入後台</button>
                    <button onClick={() => setView('dashboard')} className="text-slate-500 text-sm">返回洞府</button>
                </div>
            );

            return (
                <div className="p-6 flex flex-col space-y-8 overflow-y-auto h-screen pb-20">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-bold gold-text uppercase">仙界主宰</h2><button onClick={() => setView('dashboard')} className="p-2 btn-slate rounded-full"><i data-lucide="arrow-left"></i></button></div>

                    <section className="glass p-6 rounded-2xl space-y-4">
                        <h3 className="text-xs font-black text-emerald-500 uppercase tracking-widest border-b border-white/5 pb-2">載入仙冊 (CSV)</h3>
                        <p className="text-[10px] text-slate-500 uppercase">格式: 英文,詞性,中文</p>
                        <input type="file" id="csv-file" hidden accept=".csv" onChange={handleCSV} />
                        <label htmlFor="csv-file" className="w-full py-4 bg-emerald-600 rounded-xl flex items-center justify-center space-x-2 cursor-pointer active:scale-95 transition-all text-black font-black uppercase"><i data-lucide="file-up"></i><span>選取 CSV 檔案</span></label>
                    </section>

                    <section className="glass p-6 rounded-2xl space-y-4">
                        <h3 className="text-xs font-black text-blue-400 uppercase tracking-widest border-b border-white/5 pb-2">經書批次管理</h3>
                        <div className="space-y-2">
                            {batches.map(b => (
                                <div key={b.id} className="flex justify-between items-center text-[10px] bg-slate-900/50 p-3 rounded-lg border border-white/5">
                                    <span>{b.date} ({b.count}題)</span>
                                    <button onClick={() => delBatch(b.id)} className="text-red-500 font-bold px-2 py-1 border border-red-500/20 rounded">焚毀</button>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="glass p-6 rounded-2xl space-y-4">
                        <h3 className="text-xs font-black text-purple-400 uppercase tracking-widest border-b border-white/5 pb-2">修士管理</h3>
                        {users.map((u, i) => (
                            <div key={i} className="flex justify-between items-center text-xs">
                                <span>{u.name} (Exp: {u.exp})</span>
                                <div className="space-x-2">
                                    <button onClick={() => { const np = prompt("輸入新密碼"); if(np){ u.pw=np; setUsers([...users]); localStorage.setItem('xni_users', JSON.stringify(users)); } }} className="text-blue-400 px-2 py-1 border border-blue-400/20 rounded">密碼</button>
                                    <button onClick={() => { if(confirm(`逐出 ${u.name}？`)){ const nUsers = users.filter(x => x.name !== u.name); setUsers(nUsers); localStorage.setItem('xni_users', JSON.stringify(nUsers)); } }} className="text-red-500 px-2 py-1 border border-red-500/20 rounded">逐出</button>
                                </div>
                            </div>
                        ))}
                    </section>

                    <section className="glass p-6 rounded-2xl space-y-4">
                        <h3 className="text-xs font-black text-yellow-500 uppercase tracking-widest border-b border-white/5 pb-2">法則設定</h3>
                        <div className="space-y-4 text-xs">
                            <div className="flex justify-between items-center"><span>每日挑戰輪次</span><input type="number" className="w-16 bg-slate-900 border border-white/10 rounded px-2 py-1" value={settings.maxRounds} onChange={e => { const s = {...settings, maxRounds: parseInt(e.target.value)}; setSettings(s); localStorage.setItem('xni_settings', JSON.stringify(s)); }} /></div>
                            <div className="flex justify-between items-center"><span>主宰密碼修改</span><input type="text" className="w-24 bg-slate-900 border border-white/10 rounded px-2 py-1 text-center" value={settings.adminPw} onChange={e => { const s = {...settings, adminPw: e.target.value}; setSettings(s); localStorage.setItem('xni_settings', JSON.stringify(s)); }} /></div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
