<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="修仙單字傳">
    <meta name="mobile-web-app-capable" content="yes">
    <title>單字記憶傳說：仙逆</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.json" crossorigin="use-credentials">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(()=>{});
            });
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc };
        window.firebaseLoaded = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #020617; /* 極深藍色底 */
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .font-xianxia { font-family: 'Noto Serif TC', serif; }
        
        /* 琉璃法寶質感 */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: inset 0 0 20px rgba(99, 102, 241, 0.05), 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* 鎏金文字體 */
        .text-gold-glow {
            background: linear-gradient(to bottom, #fde047, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }

        /* 修仙按鈕質感 */
        .btn-xianxia {
            background: linear-gradient(135deg, #d97706 0%, #a16207 100%);
            border: 1px solid #fde047;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.4), inset 0 0 10px rgba(253, 224, 71, 0.5);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .btn-xianxia:hover {
            box-shadow: 0 0 25px rgba(217, 119, 6, 0.7), inset 0 0 15px rgba(253, 224, 71, 0.8);
        }
        
        /* 靈力特效按鈕 */
        .btn-spiritual {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            border: 1px solid #818cf8;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4), inset 0 0 10px rgba(129, 140, 248, 0.5);
            color: #fff;
        }
        .btn-spiritual:hover {
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.7), inset 0 0 15px rgba(129, 140, 248, 0.8);
        }
    </style>
</head>
<body class="font-sans text-slate-200 selection:bg-indigo-500/50 overscroll-none min-h-screen relative overflow-x-hidden">
    <!-- 頂級修仙手遊的背景氛圍：靈氣光暈 -->
    <div class="fixed inset-0 pointer-events-none z-[-1]">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-900/30 blur-[120px]"></div>
        <div class="absolute top-[40%] left-[30%] w-[40%] h-[40%] rounded-full bg-emerald-900/10 blur-[100px]"></div>
        <!-- 模擬星辰/靈氣粒子背景圖 (可選) -->
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 mix-blend-overlay"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = '' }) => (
            <span className={`material-symbols-rounded ${className}`} style={{ fontSize: size }}>{name}</span>
        );

        const INITIAL_WORDS = [
            { id: 1, word: 'to', pos: 'prep.', translation: '向', category: 'Unit 37' },
            { id: 2, word: 'title', pos: 'n.', translation: '標題;頭銜', category: 'Unit 37' },
            { id: 3, word: 'toast', pos: 'n.', translation: '吐司', category: 'Unit 37' },
            { id: 4, word: 'today', pos: 'n.', translation: '今天', category: 'Unit 37' },
            { id: 5, word: 'toe', pos: 'n.', translation: '腳趾', category: 'Unit 37' }
        ];

        const INTERVALS = [0, 1, 3, 7, 14, 30];
        
        // =========================================
        // 🐉 仙逆修為境界動態產生器 (Dark Mode 琉璃玉牌配色)
        // =========================================
        const MAIN_RANKS = [
            { name: "凝氣", color: "text-slate-300", bg: "bg-slate-800/80 border border-slate-600 shadow-[0_0_8px_rgba(71,85,105,0.5)]" }, 
            { name: "築基", color: "text-emerald-300", bg: "bg-emerald-900/60 border border-emerald-500/50 shadow-[0_0_10px_rgba(16,185,129,0.3)]" },
            { name: "結丹", color: "text-cyan-300", bg: "bg-cyan-900/60 border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.3)]" },
            { name: "元嬰", color: "text-blue-300", bg: "bg-blue-900/60 border border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.3)]" },
            { name: "化神", color: "text-indigo-300", bg: "bg-indigo-900/60 border border-indigo-500/50 shadow-[0_0_10px_rgba(99,102,241,0.4)]" },
            { name: "嬰變", color: "text-violet-300", bg: "bg-violet-900/60 border border-violet-500/50 shadow-[0_0_10px_rgba(139,92,246,0.4)]" },
            { name: "問鼎", color: "text-fuchsia-300", bg: "bg-fuchsia-900/60 border border-fuchsia-500/50 shadow-[0_0_10px_rgba(217,70,239,0.4)]" },
            { name: "陰虛", color: "text-pink-300", bg: "bg-pink-900/60 border border-pink-500/50 shadow-[0_0_10px_rgba(236,72,153,0.4)]", single: true },
            { name: "陽實", color: "text-rose-300", bg: "bg-rose-900/60 border border-rose-500/50 shadow-[0_0_10px_rgba(244,63,94,0.4)]", single: true },
            { name: "窺涅", color: "text-red-400", bg: "bg-red-900/60 border border-red-500/60 shadow-[0_0_12px_rgba(239,68,68,0.5)]" },
            { name: "淨涅", color: "text-orange-400", bg: "bg-orange-900/60 border border-orange-500/60 shadow-[0_0_12px_rgba(249,115,22,0.5)]" },
            { name: "碎涅", color: "text-amber-400", bg: "bg-amber-900/60 border border-amber-500/60 shadow-[0_0_15px_rgba(245,158,11,0.5)]" },
            { name: "空靈", color: "text-yellow-300", bg: "bg-yellow-900/60 border border-yellow-500/60 shadow-[0_0_15px_rgba(234,179,8,0.6)]" }, 
            { name: "空玄", color: "text-yellow-200", bg: "bg-yellow-800/80 border border-yellow-400/80 shadow-[0_0_20px_rgba(250,204,21,0.7)]" },
            { name: "空劫", color: "text-yellow-100 font-bold", bg: "bg-yellow-700/80 border border-yellow-300 shadow-[0_0_25px_rgba(253,224,71,0.8)]" }
        ];
        const SUB_RANKS = ["前期", "中期", "後期", "大圓滿"];

        const RANKS_DB = [{ title: '凡人', score: 0, color: 'text-slate-400', bg: 'bg-slate-800/80 border border-slate-700' }];
        let rankIndex = 1;
        MAIN_RANKS.forEach(mr => {
            if (mr.single) {
                RANKS_DB.push({ title: mr.name, score: Math.floor(150 * rankIndex + 12 * Math.pow(rankIndex, 3)), color: mr.color, bg: mr.bg });
                rankIndex++;
            } else {
                SUB_RANKS.forEach(sr => {
                    RANKS_DB.push({ title: mr.name + sr, score: Math.floor(150 * rankIndex + 12 * Math.pow(rankIndex, 3)), color: mr.color, bg: mr.bg });
                    rankIndex++;
                });
            }
        });
        RANKS_DB.push({ title: '踏天境', score: Math.floor(150 * rankIndex + 12 * Math.pow(rankIndex, 3)), color: 'text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-yellow-400 to-yellow-200 font-black drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]', bg: 'bg-slate-950 border-2 border-yellow-400 shadow-[0_0_30px_rgba(250,204,21,1)]' });

        const getRankInfo = (score) => {
            let currentRank = RANKS_DB[0];
            for (let i = 0; i < RANKS_DB.length; i++) {
                if (score >= RANKS_DB[i].score) currentRank = RANKS_DB[i];
                else break;
            }
            const nextRank = RANKS_DB.find(r => r.score > score);
            return { ...currentRank, nextScore: nextRank ? nextRank.score : null };
        };

        const generateBlanks = (word) => {
            return word.split('').map(c => /[a-zA-Z]/.test(c) ? '_' : c).join('');
        };

        function MainApp({ db, appId, authUser }) {
            const { collection, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } = window.FirebaseLib;

            const [view, setView] = useState('login'); 
            const [virtualDate, setVirtualDate] = useState(Date.now());
            const [currentUserId, setCurrentUserId] = useState(null);
            
            const [globalWords, setGlobalWords] = useState([]);
            const [lastImportBatchId, setLastImportBatchId] = useState(null);
            const [users, setUsers] = useState([]);
            const [userWordStats, setUserWordStats] = useState({});
            
            const [settings, setSettings] = useState({ newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 });
            const [parentPassword, setParentPassword] = useState("123456"); 
            
            const [studyMode, setStudyMode] = useState('flashcard'); 
            const [isPracticeMode, setIsPracticeMode] = useState(false);
            const [isReviveMode, setIsReviveMode] = useState(false);
            const [studyQueue, setStudyQueue] = useState([]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [cardStartTime, setCardStartTime] = useState(0);
            const [recallDuration, setRecallDuration] = useState(null);
            const [showResult, setShowResult] = useState(null); 
            const [spellInput, setSpellInput] = useState('');
            
            const sessionMistakesRef = useRef(0);
            const sessionMissedWords = useRef([]); 

            const [newUserName, setNewUserName] = useState('');
            const [newUserPassword, setNewUserPassword] = useState('');
            const [newUserAvatar, setNewUserAvatar] = useState(null);
            
            const [passwordModalUser, setPasswordModalUser] = useState(null);
            const [inputPassword, setInputPassword] = useState('');
            const [passwordError, setPasswordError] = useState(false);

            const [isLibraryAdmin, setIsLibraryAdmin] = useState(false);
            const [showLibraryLogin, setShowLibraryLogin] = useState(false);
            const [libraryUnlockCode, setLibraryUnlockCode] = useState('');
            const [libraryUnlockError, setLibraryUnlockError] = useState(false);
            const [manualWord, setManualWord] = useState({ word: '', pos: '', translation: '', category: '' });

            const [localSettings, setLocalSettings] = useState({ newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 });
            const [isSettingsUnlocked, setIsSettingsUnlocked] = useState(false);
            const [settingsUnlockCode, setSettingsUnlockCode] = useState('');
            const [settingsUnlockError, setSettingsUnlockError] = useState(false);
            const [newParentPwd, setNewParentPwd] = useState('');
            const [smartText, setSmartText] = useState('');
            const [isImporting, setIsImporting] = useState(false);

            useEffect(() => {
                if(!db || !appId) return;
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config');
                const unsub = onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.globalWords) setGlobalWords(data.globalWords);
                        if (data.lastImportBatchId !== undefined) setLastImportBatchId(data.lastImportBatchId);
                        if (data.settings) {
                            setSettings(data.settings);
                            setLocalSettings(data.settings);
                        }
                        if (data.parentPassword) setParentPassword(data.parentPassword);
                    } else {
                        setDoc(ref, { 
                            globalWords: INITIAL_WORDS, 
                            settings: { newWordsPerBatch: 10, maxBatchesPerDay: 3, maxReviewsPerBatch: 20 },
                            parentPassword: "123456",
                            lastImportBatchId: null
                        });
                    }
                });
                return () => unsub();
            }, [db, appId]);

            useEffect(() => {
                if(!db || !appId) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const unsub = onSnapshot(q, (snap) => {
                    const arr = [];
                    snap.forEach(d => arr.push(d.data()));
                    setUsers(arr);
                });
                return () => unsub();
            }, [db, appId]);

            useEffect(() => {
                if (!currentUserId || !db) return; 
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', currentUserId);
                const unsub = onSnapshot(ref, (snap) => {
                    if (snap.exists()) {
                        setUserWordStats(prev => ({ ...prev, [currentUserId]: snap.data().words }));
                    } else {
                        const initialStats = globalWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null }));
                        setDoc(ref, { words: initialStats });
                    }
                });
                return () => unsub();
            }, [db, appId, currentUserId, globalWords]);

            const currentUser = useMemo(() => users.find(u => u.id === currentUserId), [users, currentUserId]);
            const currentWords = useMemo(() => userWordStats[currentUserId] || [], [userWordStats, currentUserId]);

            const todayStr = useMemo(() => new Date(virtualDate).toDateString(), [virtualDate]);
            const currentBatches = currentUser?.lastStudyDate === todayStr ? currentUser.dailyBatches : 0;

            const { dueReviewsTotal, failedWordsTotal, newWordsAvailable, masteredWords } = useMemo(() => {
                let reviews = currentWords.filter(w => w.status === 'learning' && w.nextReview <= virtualDate && w.level > 0);
                let failed = currentWords.filter(w => w.status === 'learning' && w.nextReview <= virtualDate && w.level === 0);
                let newWords = currentWords.filter(w => w.status === 'new');
                let mastered = currentWords.filter(w => w.status === 'mastered');
                return { dueReviewsTotal: reviews, failedWordsTotal: failed, newWordsAvailable: newWords, masteredWords: mastered.length };
            }, [currentWords, virtualDate]);

            const dueReviewsPreview = useMemo(() => [...dueReviewsTotal].sort(() => 0.5 - Math.random()).slice(0, settings.maxReviewsPerBatch), [dueReviewsTotal, settings]);
            const reviveWordsPreview = useMemo(() => [...failedWordsTotal].sort(() => 0.5 - Math.random()).slice(0, 3), [failedWordsTotal]);
            const newWordsPreview = useMemo(() => {
                return currentBatches === 0 ? [...newWordsAvailable].sort(() => 0.5 - Math.random()).slice(0, settings.newWordsPerBatch) : [];
            }, [currentBatches, newWordsAvailable, settings]);

            const dashboardQueueTotal = useMemo(() => {
                return [...dueReviewsPreview, ...reviveWordsPreview, ...newWordsPreview];
            }, [dueReviewsPreview, reviveWordsPreview, newWordsPreview]);

            const handleSmartImport = async (rawText) => {
                if (!rawText.trim()) return false;
                try {
                    const existingWordsSet = new Set(globalWords.map(w => w.word.trim().toLowerCase()));
                    let newWords = [];
                    let currentMaxId = globalWords.length > 0 ? Math.max(...globalWords.map(w => w.id)) : 0;
                    const batchId = Date.now().toString();

                    const fullText = rawText.replace(/\n/g, '  ');
                    const unitChunks = fullText.split(/(?=2000\s*單?\s*Unit\s*\d+|Unit\s*\d+)/i);

                    unitChunks.forEach(chunk => {
                        const unitMatch = chunk.match(/Unit\s*(\d+)/i);
                        let currentUnit = unitMatch ? `Unit ${unitMatch[1].padStart(2, '0')}` : 'Unit 未知';
                        const tokens = chunk.split(/(?:\s|^)\b([1-9]|[1-4][0-9]|50)\s+(?=[a-zA-Z])/);
                        
                        for (let i = 1; i < tokens.length; i += 2) {
                            const content = tokens[i+1];
                            const engMatch = content.match(/^([a-zA-Z\-\'\s]+)/);
                            if (!engMatch) continue;
                            const word = engMatch[1].trim();
                            const posMatch = content.match(/\(([a-z\.\/]+)\)/);
                            const pos = posMatch ? posMatch[1] : '';
                            const transMatch = content.match(/([\u4e00-\u9fa5]+[^\w\s]*)/);
                            const translation = transMatch ? transMatch[1].replace(/\s+/g, '') : '無翻譯';

                            if (word.length > 0 && !existingWordsSet.has(word.toLowerCase())) {
                                currentMaxId++;
                                newWords.push({ id: currentMaxId, word, pos, translation, category: currentUnit, batchId });
                                existingWordsSet.add(word.toLowerCase());
                            }
                        }
                    });

                    if (newWords.length === 0) return 0;

                    const updatedGlobal = [...globalWords, ...newWords];
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal, lastImportBatchId: batchId });
                    
                    for (const u of users) {
                        const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                        const snap = await getDoc(uRef);
                        if(snap.exists()) {
                            const currentW = snap.data().words;
                            const addedW = newWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null, batchId }));
                            await updateDoc(uRef, { words: [...currentW, ...addedW] });
                        }
                    }
                    return newWords.length;
                } catch (err) {
                    console.error(err);
                    return -1;
                }
            };

            const handleCsvImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const text = event.target.result;
                    const rows = text.split(/\r?\n/);
                    const newWords = [];
                    const existingWordsSet = new Set(globalWords.map(w => w.word.trim().toLowerCase()));
                    let currentMaxId = globalWords.length > 0 ? Math.max(...globalWords.map(w => w.id)) : 0;
                    const batchId = Date.now().toString();

                    rows.forEach((row) => {
                        const cols = row.split(',').map(c => c.trim());
                        if (cols.length >= 4 && cols[0] && cols[0] !== '單字' && cols[0] !== 'word') {
                            const wordText = cols[0];
                            if (!existingWordsSet.has(wordText.toLowerCase())) {
                                currentMaxId++;
                                newWords.push({ id: currentMaxId, word: wordText, pos: cols[1], translation: cols[2], category: cols[3], batchId });
                                existingWordsSet.add(wordText.toLowerCase());
                            }
                        }
                    });

                    if (newWords.length > 0) {
                        const updatedGlobal = [...globalWords, ...newWords];
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal, lastImportBatchId: batchId });
                        
                        for (const u of users) {
                            const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                            const snap = await getDoc(uRef);
                            if(snap.exists()) {
                                const currentW = snap.data().words;
                                const addedW = newWords.map(w => ({ ...w, status: 'new', level: 0, nextReview: null, batchId }));
                                await updateDoc(uRef, { words: [...currentW, ...addedW] });
                            }
                        }
                        alert(`🎉 成功匯入 ${newWords.length} 個新單字法寶！重複的部分已自動濾除。`);
                    } else {
                        alert('⚠️ 匯入失敗：請確認 CSV 格式，或所有單字均已存在。');
                    }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            const handleUndoLastImport = async () => {
                if (!lastImportBatchId) return alert("沒有可復原的匯入紀錄！");
                if (!window.confirm("確定要【時光倒流 (復原最後一次匯入)】嗎？這將刪除上一批匯入的所有單字。")) return;

                const updatedGlobal = globalWords.filter(w => w.batchId !== lastImportBatchId);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { 
                    globalWords: updatedGlobal,
                    lastImportBatchId: null 
                });

                for (const u of users) {
                    const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                    const snap = await getDoc(uRef);
                    if (snap.exists()) {
                        const currentW = snap.data().words;
                        const updatedW = currentW.filter(w => w.batchId !== lastImportBatchId);
                        await updateDoc(uRef, { words: updatedW });
                    }
                }
                alert("已成功復原最後一次匯入！");
            };

            const handleNuclearReset = async () => {
                if (!window.confirm("🚨 毀天滅地警告：這將會刪除【所有單字】（包含預設的 10 題測試單字）！\n法寶庫將變成完全空白的狀態。\n\n確定要執行大掃除嗎？")) return;

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: [], lastImportBatchId: null });

                for (const u of users) {
                    const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id);
                    const snap = await getDoc(uRef);
                    if (snap.exists()) {
                        await updateDoc(uRef, { words: [] });
                    }
                }
                alert("🧹 陣法已重置！法寶庫現在空空如也，請重新匯入單字。");
            };

            const handleAdminResetPassword = async (targetUserId) => {
                const newPwd = prompt("請輸入該修士的新神識密碼：");
                if (newPwd !== null && newPwd.trim() !== "") {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', targetUserId), { password: newPwd.trim() });
                    alert("神識密碼重設成功！");
                }
            };

            const handleDeleteUser = async (targetUserId, targetUserName) => {

                const time = recallDuration || (Date.now() - cardStartTime); 
                const currentWord = studyQueue[currentCardIndex];
                
                let newLevel = currentWord.level; 
                let newStatus = currentWord.status === 'new' ? 'learning' : currentWord.status;

                    if (currentWord.nextReview) overdueDays = Math.floor((virtualDate - currentWord.nextReview) / (24 * 60 * 60 * 1000));

                    if (isCorrect) {
                        if (fromSpelling || time <= 2000) { grade = 'S'; basePoints = 50; comment = fromSpelling ? '完美刻印！' : '劍氣如虹，瞬間秒殺！'; newLevel = Math.min(INTERVALS.length - 1, newLevel + 2); }

                let actualPoints = basePoints;

                }

                const daysToAdd = INTERVALS[newLevel];
                const nextReviewTime = virtualDate + (daysToAdd * 24 * 60 * 60 * 1000);

                                        <div className={`text-7xl md:text-9xl font-xianxia font-black mb-4 ${showResult.grade === 'S' ? 'text-transparent bg-clip-text bg-gradient-to-b from-yellow-200 to-amber-500 drop-shadow-[0_0_20px_rgba(250,204,21,0.8)]' : showResult.grade === 'A' ? 'text-transparent bg-clip-text bg-gradient-to-b from-blue-300 to-indigo-500 drop-shadow-[0_0_15px_rgba(99,102,241,0.8)]' : showResult.grade === 'B' ? 'text-transparent bg-clip-text bg-gradient-to-b from-emerald-300 to-teal-500 drop-shadow-[0_0_15px_rgba(16,185,129,0.8)]' : 'text-transparent bg-clip-text bg-gradient-to-b from-rose-400 to-red-600 drop-shadow-[0_0_15px_rgba(225,29,72,0.8)]'}`}>{showResult.grade} 級</div>

                                </div>
                            ) : (
                                <div onClick={() => { if (!isFlipped && !showResult) { setIsFlipped(true); setRecallDuration(Date.now() - cardStartTime); } }} className={`w-full h-[60vh] md:h-[500px] lg:h-[600px] rounded-[2rem] md:rounded-[3rem] transition-all duration-500 flex flex-col items-center justify-center p-8 md:p-12 text-center relative overflow-hidden preserve-3d cursor-pointer ${isFlipped ? 'glass-panel border-t border-indigo-400 shadow-[0_0_40px_rgba(99,102,241,0.2)]' : 'bg-slate-900 border-2 border-slate-700 shadow-[inset_0_0_50px_rgba(0,0,0,0.8),0_10px_30px_rgba(0,0,0,0.5)] hover:border-indigo-500/50'} ${showResult ? 'opacity-50 scale-95 blur-md' : ''}`}>

                            <div className="grid md:grid-cols-3 gap-6">
                                <div className="bg-slate-900/80 p-5 rounded-2xl shadow-inner border border-indigo-500/30 col-span-1 md:col-span-2">
                                    <h4 className="font-bold text-indigo-200 mb-4 flex items-center gap-2 drop-shadow-sm"><Icon name="edit_square" size={20} className="text-indigo-400"/> 手動煉製法寶 (單字)</h4>
                                    <div className="space-y-3">
                                        <div className="flex flex-col md:flex-row gap-2">
                                            <input type="text" placeholder="單字 (必填)" value={manualWord.word} onChange={e=>setManualWord({...manualWord, word: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-950 rounded-xl border border-indigo-500/30 focus:border-yellow-400 text-white focus:outline-none transition-colors" />
                                            <input type="text" placeholder="詞性 (如 n.)" value={manualWord.pos} onChange={e=>setManualWord({...manualWord, pos: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-950 rounded-xl border border-indigo-500/30 focus:border-yellow-400 text-white focus:outline-none transition-colors" />
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-2">
                                            <input type="text" placeholder="中文翻譯 (必填)" value={manualWord.translation} onChange={e=>setManualWord({...manualWord, translation: e.target.value})} className="w-full md:w-1/2 px-4 py-3 bg-slate-950 rounded-xl border border-indigo-500/30 focus:border-yellow-400 text-white focus:outline-none transition-colors" />

                                    <div className="absolute -bottom-6 -right-6 text-indigo-400 opacity-20"><Icon name="upload_file" size={120} /></div>
                                    <div className="relative z-10">
                                        <h4 className="font-black mb-2 flex items-center gap-2 tracking-widest text-yellow-300"><Icon name="upload_file" size={20}/> 萬劍歸宗 (CSV)</h4>
                                        <p className="text-xs text-indigo-200 mb-6 leading-relaxed">
                                            將 CSV 靈卷投入陣法，自動過濾重複。<br/>
                                            格式：<span className="font-mono bg-indigo-950/80 text-yellow-200 px-1.5 py-0.5 rounded border border-indigo-500/50 block mt-1">單字,詞性,中文,分類</span>
                                        </p>
                                    </div>
                                    <label className="relative z-10 w-full btn-xianxia font-black py-3 px-4 rounded-xl cursor-pointer transition-all text-center text-sm tracking-widest">
                                        <input type="file" accept=".csv" className="hidden" onChange={handleCsvImport} />
                                        奉上 CSV 靈卷
                                    </label>
                                </div>
                            </div>

                            <div className="mt-6 flex flex-col md:flex-row gap-4">
                                <div className="flex-1 bg-amber-900/30 border border-amber-500/40 p-5 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4 shadow-inner">
                                    <div>
                                        <h4 className="font-bold text-amber-400 mb-1 flex items-center gap-2"><Icon name="undo" size={20}/> 時光倒流</h4>
                                        <p className="text-xs text-amber-200/70">若萬劍歸宗陣法失誤，可精準抽掉上一批法寶。</p>
                                    </div>
                                    <button onClick={handleUndoLastImport} disabled={!lastImportBatchId} className={`w-full md:w-auto font-bold py-3 px-6 rounded-xl transition-colors text-sm whitespace-nowrap tracking-widest ${lastImportBatchId ? 'bg-amber-600/80 text-amber-100 border border-amber-400 hover:bg-amber-500 shadow-[0_0_15px_rgba(217,119,6,0.4)]' : 'bg-slate-800 text-slate-600 border border-slate-700 cursor-not-allowed'}`}>
                                        撤回上次入庫
                                    </button>
                                </div>
                                <div className="flex-1 bg-rose-900/30 border border-rose-500/40 p-5 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4 shadow-inner">
                                    <div>
                                        <h4 className="font-bold text-rose-400 mb-1 flex items-center gap-2"><Icon name="delete_sweep" size={20}/> 毀天滅地</h4>
                                        <p className="text-xs text-rose-200/70">將法寶庫徹底歸零，包含預設字，回到鴻蒙未判。</p>
                                    </div>
                                    <button onClick={handleNuclearReset} className="w-full md:w-auto bg-rose-800/80 border border-rose-500 text-rose-100 font-bold py-3 px-6 rounded-xl hover:bg-rose-700 transition-colors shadow-[0_0_15px_rgba(225,29,72,0.4)] text-sm whitespace-nowrap tracking-widest">
                                        粉碎所有法寶
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="mb-8 mt-4 flex items-end justify-between">
                        <div>
                            <h2 className="text-3xl md:text-4xl font-xianxia font-black text-gold-glow mb-2 tracking-widest">萬界法寶庫</h2>
                            <p className="text-indigo-300 font-medium md:text-lg">已收錄: <span className="text-yellow-400 font-black">{globalWords.length}</span> 卷 / 終極目標: 8000 卷</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                        {currentWords.map(word => (
                            <div key={word.id} className={`glass-panel p-5 md:p-6 rounded-2xl flex items-center justify-between transition-all hover:shadow-[0_0_15px_rgba(99,102,241,0.2)] hover:border-indigo-400/50 ${word.level === 0 && word.status === 'learning' ? 'border-rose-500/50 bg-rose-900/10' : ''}`}>
                                <div>
                                    <div className="font-bold text-slate-100 text-xl md:text-2xl flex items-center gap-2 mb-2 tracking-wider">
                                        {word.word}
                                        {word.status === 'mastered' && <Icon name="star" size={20} className="text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]" />}
                                        {word.status === 'new' && <span className="bg-slate-800 border border-slate-600 text-slate-400 text-[10px] md:text-xs px-2 py-0.5 rounded font-black uppercase tracking-widest">尚未煉化</span>}
                                        {word.level === 0 && word.status === 'learning' && <span className="bg-rose-900/60 border border-rose-500/50 text-rose-300 text-[10px] md:text-xs px-2 py-0.5 rounded font-black uppercase tracking-widest shadow-[0_0_5px_rgba(225,29,72,0.5)]">走火入魔</span>}
                                    </div>
                                    <div className="text-sm md:text-base text-indigo-200 font-medium"><span className="text-yellow-300 mr-2 bg-indigo-950/80 border border-indigo-500/30 px-2 py-0.5 rounded">{word.pos}</span>{word.translation}</div>
                                </div>
                                <div className="flex flex-col items-end gap-2">
                                    {word.status === 'mastered' ? <span className="text-sm font-black bg-gradient-to-r from-yellow-500 to-amber-600 text-slate-900 px-4 py-2 rounded-full shadow-[0_0_10px_rgba(217,119,6,0.6)] border border-yellow-200 tracking-widest">已精通</span> : word.status === 'new' ? <span className="text-sm font-bold text-slate-500 tracking-widest">{word.category}</span> : (
                                        <div className="flex flex-col items-end">
                                            <span className="text-[10px] md:text-xs text-indigo-400 font-bold mb-1 uppercase tracking-widest">下次回歸</span>
                                            <span className={`text-sm font-black px-3 py-1.5 rounded-lg border ${word.nextReview <= virtualDate ? 'bg-rose-900/50 text-rose-300 border-rose-500/50 shadow-[0_0_8px_rgba(225,29,72,0.3)]' : 'bg-indigo-900/50 text-indigo-300 border-indigo-500/30'}`}>{word.nextReview <= virtualDate ? '今日待命' : formatDate(word.nextReview)}</span>
                                        </div>
                                    )}
                                    {isLibraryAdmin && (
                                        <button onClick={async () => { if (!window.confirm("確定粉碎此法寶？")) return; const updatedGlobal = globalWords.filter(w => w.id !== word.id); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config'), { globalWords: updatedGlobal }); for (const u of users) { const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'wordStats', u.id); const snap = await getDoc(uRef); if (snap.exists()) { const currentW = snap.data().words; const updatedW = currentW.filter(w => w.id !== word.id); await updateDoc(uRef, { words: updatedW }); } } }} className="text-rose-400 hover:text-rose-300 bg-rose-900/30 border border-rose-500/30 hover:bg-rose-800/60 p-2 rounded-lg transition-colors mt-2" title="粉碎法寶">
                                            <Icon name="delete" size={20} />
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                        {globalWords.length === 0 && (
                            <div className="col-span-1 md:col-span-2 py-12 text-center text-indigo-400 font-bold glass-panel rounded-3xl border-2 border-dashed border-indigo-500/30 tracking-widest">
                                <Icon name="inventory_2" size={48} className="mx-auto mb-3 opacity-50" />
                                寶庫空虛，等待掌門恩賜
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {view === 'login' && renderLogin()}
                    {view === 'dashboard' && renderDashboard()}
                    {view === 'settings' && renderSettings()}
                    {view === 'lobby' && renderLobby()}
                    {view === 'study' && renderStudy()}
                    {view === 'result' && renderResult()}
                    {view === 'library' && renderLibrary()}

                    {view !== 'study' && view !== 'login' && view !== 'result' && view !== 'settings' && (
                        <div className="fixed bottom-0 left-0 right-0 pointer-events-none flex justify-center z-40 pb-4 md:pb-8 px-4">
                            <div className="bg-slate-900/90 backdrop-blur-xl border-t border-indigo-500/30 p-2 px-4 md:px-8 flex justify-between items-center w-full max-w-md md:max-w-xl rounded-[2rem] shadow-[0_-10px_40px_rgba(79,70,229,0.15)] pointer-events-auto">
                                <button onClick={() => setView('dashboard')} className={`flex-1 flex flex-col items-center p-2 md:p-3 transition-all duration-300 rounded-2xl ${view === 'dashboard' ? 'text-yellow-400 bg-indigo-900/50 scale-105 shadow-[0_0_15px_rgba(250,204,21,0.2)]' : 'text-indigo-400 hover:text-yellow-200 hover:bg-slate-800'}`}><Icon name="psychology" size={28} className={view === 'dashboard' ? 'drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]' : ''}/><span className="text-[10px] md:text-xs font-black mt-1 tracking-widest">本心</span></button>
                                <button onClick={() => setView('lobby')} className={`flex-1 flex flex-col items-center p-2 md:p-3 transition-all duration-300 rounded-2xl mx-1 ${view === 'lobby' ? 'text-yellow-400 bg-indigo-900/50 scale-105 shadow-[0_0_15px_rgba(250,204,21,0.2)]' : 'text-indigo-400 hover:text-yellow-200 hover:bg-slate-800'}`}><Icon name="landscape" size={28} className={view === 'lobby' ? 'drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]' : ''}/><span className="text-[10px] md:text-xs font-black mt-1 tracking-widest">仙榜</span></button>
                                <button onClick={() => setView('library')} className={`flex-1 flex flex-col items-center p-2 md:p-3 transition-all duration-300 rounded-2xl ${view === 'library' ? 'text-yellow-400 bg-indigo-900/50 scale-105 shadow-[0_0_15px_rgba(250,204,21,0.2)]' : 'text-indigo-400 hover:text-yellow-200 hover:bg-slate-800'}`}><Icon name="menu_book" size={28} className={view === 'library' ? 'drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]' : ''}/><span className="text-[10px] md:text-xs font-black mt-1 tracking-widest">法寶</span></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Boot() {
            const [loaded, setLoaded] = useState(window.firebaseLoaded);
            const [user, setUser] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!loaded) {
                    const handler = () => setLoaded(true);
                    window.addEventListener('firebase-ready', handler);
                    return () => window.removeEventListener('firebase-ready', handler);
                }
            }, [loaded]);

            useEffect(() => {
                if (loaded) {
                    const initAuth = async () => {
                        try {
                            const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseLib;
                            
                            // 👇 ========================================================
                            const myFirebaseConfig = {
                                apiKey: "AIzaSyAtvZjyKKRsfbbRPt-OI85isFuua6EV1YQ",
  authDomain: "vocab-2000.firebaseapp.com",
  projectId: "vocab-2000",
  storageBucket: "vocab-2000.firebasestorage.app",
  messagingSenderId: "459452518715",
  appId: "1:459452518715:web:2842926df8a8d73831a71e"
                            };
                            // 👆 ========================================================

                            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myFirebaseConfig;
                            const app = initializeApp(config);
                            const auth = getAuth(app);

                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                            onAuthStateChanged(auth, setUser);
                        } catch (e) {
                            setError(e.message);
                        }
                    };
                    initAuth();
                }
            }, [loaded]);

            if (error) return <div className="min-h-screen bg-slate-950 flex items-center justify-center font-bold text-rose-500 drop-shadow-md">陣法崩潰: {error}</div>;
            if (!user) return <div className="min-h-screen bg-slate-950 flex flex-col gap-4 items-center justify-center font-xianxia font-bold text-indigo-400 text-xl tracking-widest"><Icon name="settings_system_daydream" size={64} className="animate-spin drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]" /> 正在匯聚天地靈氣...</div>;

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-family-vocab-db';
            return <MainApp db={window.FirebaseLib.getFirestore()} appId={appId} authUser={user} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Boot />);
    </script>
</body>
</html>
